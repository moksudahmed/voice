<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ESPN Auto Broadcast System</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #020713;
    color: white;
    overflow: hidden;
}

/* =========================
   HEADER
========================= */
.header {
    height: 50px;
    background: #0b1220;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    font-weight: bold;
    border-bottom: 1px solid #1f2a44;
}

.live {
    color: red;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0.3; }
}

/* =========================
   LAYOUT
========================= */
.container {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: calc(100vh - 50px);
}

/* =========================
   MATCH LIST
========================= */
.sidebar {
    background: #0c1426;
    overflow-y: auto;
    border-right: 1px solid #1e2b45;
    padding: 10px;
}

.match {
    background: rgba(255,255,255,0.05);
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.match:hover {
    background: rgba(255,255,255,0.12);
}

.match.active {
    border-left: 4px solid #00ff99;
}

/* =========================
   BROADCAST SCREEN
========================= */
.screen {
    position: relative;
    background: radial-gradient(circle at bottom, #020817, #000);
    overflow: hidden;
}

/* =========================
   ESPN SCORE BUG
========================= */
.scorebug {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0,0,0,0.85);
    padding: 14px;
    border-radius: 10px;
    min-width: 200px;
    border: 1px solid #1f2a44;
}

.team {
    font-size: 12px;
    opacity: 0.8;
}

.score {
    font-size: 28px;
    font-weight: bold;
    color: gold;
}

/* =========================
   LOWER THIRD GRAPHICS
========================= */
.lower-third {
    position: absolute;
    bottom: 120px;
    left: -500px;
    background: rgba(0,0,0,0.8);
    padding: 14px;
    border-left: 4px solid red;
    border-radius: 8px;
    transition: 0.5s;
    max-width: 60%;
}

.lower-third.show {
    left: 20px;
}

/* =========================
   TICKER
========================= */
.ticker {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: black;
    color: #00ff99;
    padding: 10px;
    overflow: hidden;
}

.ticker span {
    display: inline-block;
    padding-left: 100%;
    white-space: nowrap;
    animation: scroll 12s linear infinite;
}

@keyframes scroll {
    100% { transform: translateX(-100%); }
}

/* =========================
   REPLAY
========================= */
.replay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    font-size: 40px;
    opacity: 0;
    transition: 0.3s;
}

.replay.show {
    opacity: 1;
}

/* =========================
   FLASH EFFECT
========================= */
.flash {
    animation: flash 0.4s;
}

@keyframes flash {
    0% { filter: brightness(1); }
    50% { filter: brightness(2); }
    100% { filter: brightness(1); }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div>🏆 ESPN AUTO BROADCAST ENGINE</div>
    <div class="live">● LIVE WORLD FEED</div>
</div>

<div class="container">

    <!-- MATCH LIST -->
    <div class="sidebar" id="matchList">
        Loading matches...
    </div>

    <!-- BROADCAST SCREEN -->
    <div class="screen">

        <!-- SCORE BUG -->
        <div class="scorebug">
            <div class="team" id="matchTitle">NO MATCH</div>
            <div class="score" id="score">0/0</div>
        </div>

        <!-- LOWER THIRD -->
        <div class="lower-third" id="lower">
            Waiting for AI director...
        </div>

        <!-- REPLAY -->
        <div class="replay" id="replay">REPLAY</div>

        <!-- TICKER -->
        <div class="ticker">
            <span id="ticker">
                ESPN AUTO BROADCAST SYSTEM ACTIVE • AI DIRECTOR ENABLED •
            </span>
        </div>

    </div>

</div>

<script>

/* =========================
   STATE ENGINE
========================= */
let currentMatch = null;

/* =========================
   LOAD MATCHES (FROM BACKEND)
========================= */
async function loadMatches() {
    try {
        const res = await fetch("/matches");
        const data = await res.json();

        renderMatches(data);

        // AUTO SELECT FIRST MATCH (ESPN FEATURE)
        if (data.length > 0) {
            selectMatch(data[0], document.querySelector(".match"));
        }

    } catch (err) {
        document.getElementById("matchList").innerHTML =
            "❌ Backend /matches not found";
    }
}

/* =========================
   RENDER MATCHES
========================= */
function renderMatches(matches) {
    const box = document.getElementById("matchList");
    box.innerHTML = "";

    matches.forEach((m, i) => {
        const div = document.createElement("div");
        div.className = "match";
        div.innerText = m.title || m;

        div.onclick = () => selectMatch(m, div);

        box.appendChild(div);
    });
}

/* =========================
   ESPN DIRECTOR ENGINE
========================= */
function selectMatch(match, el) {

    document.querySelectorAll(".match")
        .forEach(m => m.classList.remove("active"));

    el.classList.add("active");

    currentMatch = match;

    let title = match.title || match;

    document.getElementById("matchTitle").innerText = title;

    triggerLowerThird("LIVE: " + title);
    updateTicker(title);
}

/* =========================
   AI BROADCAST DIRECTOR
========================= */
function aiDirector(event) {

    let lower = document.getElementById("lower");

    if (event.includes("six")) {
        triggerFlash();
        showReplay("SIX HIT");
        triggerLowerThird("BIG SIX!");
    }

    if (event.includes("wicket")) {
        triggerFlash();
        showReplay("WICKET");
        triggerLowerThird("WICKET FALLEN!");
    }

    if (event.includes("four")) {
        triggerFlash();
    }
}

/* =========================
   GRAPHICS ENGINE
========================= */
function triggerLowerThird(text) {
    let lt = document.getElementById("lower");
    lt.innerText = text;
    lt.classList.add("show");

    setTimeout(() => lt.classList.remove("show"), 2500);
}

/* =========================
   TICKER ENGINE
========================= */
function updateTicker(text) {
    document.getElementById("ticker").innerText =
        "🔥 " + text + " • " +
        document.getElementById("ticker").innerText;
}

/* =========================
   SCORE ENGINE (SIMULATION HOOK)
========================= */
function updateScore(score) {
    document.getElementById("score").innerText = score;
}

/* =========================
   VISUAL FX
========================= */
function triggerFlash() {
    document.querySelector(".screen").classList.add("flash");
    setTimeout(() => {
        document.querySelector(".screen").classList.remove("flash");
    }, 300);
}

/* =========================
   REPLAY ENGINE
========================= */
function showReplay(text) {
    let r = document.getElementById("replay");
    r.innerText = text;
    r.classList.add("show");

    setTimeout(() => r.classList.remove("show"), 1200);
}

/* =========================
   SIMULATED LIVE FEED (REMOVE IN PRODUCTION)
========================= */
setInterval(() => {
    const events = [
        "SIX massive hit",
        "FOUR through cover",
        "WICKET bowled!",
        "DOT ball pressure building"
    ];

    let event = events[Math.floor(Math.random() * events.length)];
    aiDirector(event);

}, 4000);

/* =========================
   INIT
========================= */
loadMatches();

</script>

</body>
</html>
