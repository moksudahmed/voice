<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ICC Master Control Room - Global Feed</title>

<style>
/* =========================
   GLOBAL THEME
========================= */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #050814;
    color: #ffffff;
    overflow: hidden;
}

/* =========================
   HEADER BAR
========================= */
.header {
    height: 50px;
    background: #0b1220;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    font-weight: bold;
    border-bottom: 1px solid #1f2a44;
}

.live {
    color: #ff3b3b;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0.3; }
}

/* =========================
   MAIN LAYOUT
========================= */
.container {
    display: grid;
    grid-template-columns: 360px 1fr;
    height: calc(100vh - 50px);
}

/* =========================
   MATCH LIST PANEL
========================= */
.panel {
    background: #0c1426;
    border-right: 1px solid #1e2b45;
    overflow-y: auto;
    padding: 10px;
}

.match {
    background: rgba(255,255,255,0.05);
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s ease;
    font-size: 14px;
}

.match:hover {
    background: rgba(255,255,255,0.12);
}

.match.active {
    border-left: 4px solid #00ff99;
    background: rgba(0,255,153,0.08);
}

/* =========================
   BROADCAST SCREEN
========================= */
.screen {
    position: relative;
    background: radial-gradient(circle at bottom, #020817, #000);
    overflow: hidden;
}

/* =========================
   SCORE BUG (TV STYLE)
========================= */
.scorebug {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0,0,0,0.85);
    padding: 14px 18px;
    border-radius: 10px;
    border: 1px solid #1f2a44;
    min-width: 180px;
}

#matchTitle {
    font-size: 14px;
    opacity: 0.9;
}

.score {
    font-size: 28px;
    font-weight: bold;
    color: gold;
    margin-top: 5px;
}

/* =========================
   COMMENTARY BOX
========================= */
.commentary {
    position: absolute;
    bottom: 120px;
    left: 20px;
    background: rgba(0,0,0,0.75);
    padding: 14px 16px;
    border-left: 4px solid #ff3b3b;
    border-radius: 6px;
    max-width: 60%;
    font-size: 14px;
}

/* =========================
   LIVE TICKER
========================= */
.ticker {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: #000;
    color: #00ff99;
    padding: 10px;
    overflow: hidden;
    border-top: 1px solid #1f2a44;
}

.ticker span {
    display: inline-block;
    padding-left: 100%;
    white-space: nowrap;
    animation: scroll 14s linear infinite;
}

@keyframes scroll {
    100% { transform: translateX(-100%); }
}

/* =========================
   LOADING STATE
========================= */
.loading {
    padding: 12px;
    opacity: 0.7;
    font-size: 13px;
}

/* =========================
   EMPTY STATE
========================= */
.empty {
    padding: 12px;
    opacity: 0.5;
    font-size: 13px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div>🌍 ICC MASTER CONTROL ROOM (GLOBAL FEED)</div>
    <div class="live">● LIVE SYSTEM</div>
</div>

<!-- MAIN -->
<div class="container">

    <!-- MATCH PANEL -->
    <div class="panel" id="matchList">
        <div class="loading">Loading CREX matches...</div>
    </div>

    <!-- BROADCAST SCREEN -->
    <div class="screen">

        <!-- SCOREBUG -->
        <div class="scorebug">
            <div id="matchTitle">No Match Selected</div>
            <div class="score" id="score">0/0</div>
        </div>

        <!-- COMMENTARY -->
        <div class="commentary" id="commentary">
            Waiting for live match feed...
        </div>

        <!-- TICKER -->
        <div class="ticker">
            <span id="ticker">
                ICC GLOBAL CONTROL ROOM ACTIVE • LOADING LIVE DATA •
            </span>
        </div>

    </div>
</div>

<script>

/* =========================
   STATE
========================= */
let matchesCache = [];

/* =========================
   LOAD MATCHES (BACKEND READY)
========================= */
async function loadMatches() {
    const panel = document.getElementById("matchList");

    try {
        // IMPORTANT: should be your backend endpoint
        const res = await fetch("/matches");
        const data = await res.json();

        matchesCache = data || [];

        if (!matchesCache.length) {
            panel.innerHTML = `<div class="empty">No live matches found</div>`;
            return;
        }

        renderMatches(matchesCache);

    } catch (err) {
        panel.innerHTML = `
            <div class="empty">
                ❌ Failed to load matches<br>
                (Backend /matches API required)
            </div>
        `;
    }
}

/* =========================
   RENDER MATCHES
========================= */
function renderMatches(list) {
    const panel = document.getElementById("matchList");
    panel.innerHTML = "";

    list.forEach(match => {
        const div = document.createElement("div");
        div.className = "match";
        div.innerText = match.title || match;

        div.onclick = () => selectMatch(match, div);

        panel.appendChild(div);
    });
}

/* =========================
   SELECT MATCH (DIRECTOR MODE)
========================= */
function selectMatch(match, el) {

    document.querySelectorAll(".match")
        .forEach(m => m.classList.remove("active"));

    el.classList.add("active");

    const title = match.title || match;

    document.getElementById("matchTitle").innerText = title;
    document.getElementById("commentary").innerText =
        "LIVE FEED: " + title;

    document.getElementById("ticker").innerText =
        "🔥 " + title + " • " +
        document.getElementById("ticker").innerText;
}

/* =========================
   INIT SYSTEM
========================= */
loadMatches();

</script>

</body>
</html>
