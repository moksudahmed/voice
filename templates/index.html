<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPL Broadcast Pro</title>

<style>
/* =========================
   STADIUM BACKGROUND
========================= */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden;
    background: radial-gradient(circle at center, #0f172a 0%, #000 80%);
}

/* moving light effect */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0,255,150,0.05), transparent);
    animation: stadiumLight 8s infinite linear;
}

@keyframes stadiumLight {
    0% { transform: translate(-30%, -30%); }
    50% { transform: translate(10%, 10%); }
    100% { transform: translate(-30%, -30%); }
}

/* =========================
   HEADER
========================= */
.header {
    height: 55px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.live {
    color: #ff2d2d;
    font-weight: bold;
}

/* =========================
   SCOREBOARD (TV STYLE)
========================= */
.scoreboard {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;

    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(14px);

    border-radius: 16px;
    padding: 14px;
    border: 1px solid rgba(255,255,255,0.1);

    box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

.score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.team {
    font-weight: bold;
    font-size: 16px;
}

.score {
    font-size: 34px;
    font-weight: bold;
    text-align: center;
    color: #22c55e;
}

.sub {
    font-size: 12px;
    opacity: 0.8;
}

/* =========================
   LOWER THIRD (COMMENTARY)
========================= */
.lower-third {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 70%;

    background: linear-gradient(90deg, #111827, #1f2937);
    padding: 10px 20px;
    border-radius: 10px;

    font-size: 14px;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);

    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translate(-50%, 20px); }
    to { opacity: 1; transform: translate(-50%, 0); }
}

/* =========================
   TICKER (LIVE NEWS STYLE)
========================= */
.ticker {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111827;
    padding: 6px;
    overflow: hidden;
}

.ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: ticker 15s linear infinite;
}

@keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

/* =========================
   BOUNDARY CINEMATIC EFFECT
========================= */
.boundary {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 70px;
    font-weight: bold;
    opacity: 0;
    text-shadow: 0 0 40px gold;
    animation: explode 2s ease;
}

@keyframes explode {
    0% { transform: scale(0.5); opacity: 0; }
    40% { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(1); opacity: 0; }
}

/* =========================
   PLAYER CARD
========================= */
.player-card {
    position: fixed;
    right: 20px;
    top: 120px;
    width: 200px;
    background: rgba(0,0,0,0.7);
    padding: 10px;
    border-radius: 10px;
}

.player-card h4 {
    margin: 0;
}

/* =========================
   CONTROL PANEL
========================= */
.panel {
    position: fixed;
    left: 0;
    top: 55px;
    width: 280px;
    height: calc(100% - 55px);
    background: rgba(0,0,0,0.85);
    padding: 10px;
}

button, input {
    width: 100%;
    margin: 6px 0;
    padding: 10px;
    border-radius: 6px;
    border: none;
}
</style>
</head>

<body>

<div class="header">
    <div>🏏 IPL BROADCAST PRO</div>
    <div class="live">● LIVE</div>
</div>

<!-- SCOREBOARD -->
<div class="scoreboard">
    <div class="score-row">
        <div class="team" id="teamA">MI</div>
        <div class="sub" id="overs">10.2 OV</div>
        <div class="team" id="teamB">SRH</div>
    </div>

    <div class="score" id="score">102/2</div>

    <div class="score-row">
        <div class="sub">CRR 9.8</div>
        <div class="sub" id="event">Waiting...</div>
    </div>
</div>

<!-- LOWER THIRD -->
<div class="lower-third" id="commentary">
🎙 Welcome to IPL Live Broadcast
</div>

<!-- TICKER -->
<div class="ticker">
    <span id="ticker">Live IPL action • Real-time commentary • Stadium experience</span>
</div>

<!-- PLAYER CARD -->
<div class="player-card">
    <h4 id="playerName">Rohit Sharma</h4>
    <div id="playerRuns">45 (28)</div>
</div>

<!-- CONTROL PANEL -->
<div class="panel">
    <input id="url" placeholder="Match URL">
    <button onclick="start()">Start Match</button>
    <button onclick="force()">Force Start</button>
</div>

<script>
let ws = new WebSocket("ws://127.0.0.1:8000/ws");

ws.onmessage = (e) => {
    updateUI(e.data);
};

/* =========================
   UPDATE UI
========================= */
function updateUI(msg){
    document.getElementById("commentary").innerText = msg;
    document.getElementById("event").innerText = msg;
    document.getElementById("ticker").innerText = msg;

    if(msg.includes("SIX")) showBoundary("🔥 SIX");
    if(msg.includes("FOUR")) showBoundary("⚡ FOUR");
}

/* =========================
   BOUNDARY EFFECT
========================= */
function showBoundary(text){
    let el = document.createElement("div");
    el.className = "boundary";
    el.innerText = text;

    document.body.appendChild(el);

    setTimeout(()=>el.remove(),2000);
}

/* =========================
   ACTIONS
========================= */
function start(){
    ws.send("start:"+document.getElementById("url").value);
}

function force(){
    ws.send("force:"+document.getElementById("url").value);
}
</script>

</body>
</html>
