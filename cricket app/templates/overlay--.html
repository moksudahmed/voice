<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ultra Live Cricket Broadcast</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
  href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap"
  rel="stylesheet"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --cyan:#00eaff;
  --gold:#ffd84d;
  --red:#ff1744;
  --bg:#030812;
  --glass:rgba(255,255,255,.05);
}

body{
  background:#000;
  overflow:hidden;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
}

/* =====================================================
BACKGROUND
===================================================== */

.background{
  position:fixed;
  inset:0;
  z-index:-5;
  overflow:hidden;
}

.background img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.4) saturate(1.15);
  animation:zoomBg 25s linear infinite alternate;
}

@keyframes zoomBg{
  from{
    transform:scale(1.05);
  }
  to{
    transform:scale(1.18);
  }
}

.overlay{
  position:fixed;
  inset:0;
  z-index:-4;

  background:
    radial-gradient(circle at center,
      rgba(0,234,255,.08),
      transparent 35%
    ),
    linear-gradient(
      to bottom,
      rgba(0,0,0,.55),
      rgba(0,0,0,.25),
      rgba(0,0,0,.85)
    );
}

/* =====================================================
PARTICLES
===================================================== */

.particles{
  position:fixed;
  inset:0;
  z-index:-3;
  overflow:hidden;
}

.particle{
  position:absolute;
  width:4px;
  height:4px;
  border-radius:50%;
  background:rgba(255,255,255,.55);

  animation:floatParticle linear infinite;
}

@keyframes floatParticle{

  from{
    transform:translateY(110vh);
    opacity:0;
  }

  10%{
    opacity:1;
  }

  to{
    transform:translateY(-100px);
    opacity:0;
  }

}

/* =====================================================
LAYOUT
===================================================== */

.broadcast{
  width:100%;
  height:100vh;

  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* =====================================================
TOP BAR
===================================================== */

.top-bar{
  position:relative;

  height:120px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 35px;

  background:
    linear-gradient(
      180deg,
      rgba(3,10,18,.97),
      rgba(3,10,18,.7)
    );

  border-bottom:2px solid rgba(0,234,255,.25);

  backdrop-filter:blur(18px);

  overflow:hidden;
}

.top-bar::before{
  content:"";

  position:absolute;
  inset:0;

  background:
    linear-gradient(
      90deg,
      transparent,
      rgba(0,234,255,.08),
      transparent
    );

  animation:scanline 5s linear infinite;
}

@keyframes scanline{

  from{
    transform:translateX(-100%);
  }

  to{
    transform:translateX(100%);
  }

}

.left-top{
  display:flex;
  flex-direction:column;
  gap:6px;
  z-index:2;
}

.teams{
  font-size:40px;
  font-weight:900;
  text-transform:uppercase;
}

.match-info{
  color:var(--cyan);
  font-size:15px;
  font-weight:700;
}

.overs{
  color:#d1d5db;
  font-size:15px;
}

/* =====================================================
CENTER SCORE
===================================================== */

.score-wrap{
  position:absolute;

  left:50%;
  top:50%;

  transform:translate(-50%,-50%);

  display:flex;
  align-items:center;
  gap:18px;
}

.score{
  font-size:78px;
  font-weight:900;
  font-family:'Orbitron',sans-serif;
  color:var(--gold);

  text-shadow:
    0 0 18px rgba(255,216,77,.8),
    0 0 45px rgba(255,216,77,.35);

  animation:scorePulse 2s infinite;
}

@keyframes scorePulse{

  0%,100%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.04);
  }

}

.live-pill{
  padding:10px 20px;

  border-radius:50px;

  background:
    linear-gradient(
      135deg,
      #ff0033,
      #ff5e5e
    );

  font-weight:900;
  letter-spacing:2px;

  box-shadow:
    0 0 20px rgba(255,0,0,.5);

  animation:blink 1s infinite;
}

@keyframes blink{

  0%,100%{
    opacity:1;
  }

  50%{
    opacity:.5;
  }

}

/* =====================================================
RIGHT STATS
===================================================== */

.right-top{
  display:flex;
  gap:16px;
  z-index:2;
}

.stat-card{
  min-width:135px;

  padding:12px 16px;

  border-radius:18px;

  background:rgba(255,255,255,.04);

  border:1px solid rgba(0,234,255,.18);

  backdrop-filter:blur(12px);
}

.stat-label{
  font-size:11px;
  letter-spacing:2px;
  color:#9ca3af;

  margin-bottom:5px;
}

.stat-value{
  font-size:24px;
  font-weight:900;
  color:var(--cyan);
}

/* =====================================================
MIDDLE
===================================================== */

.middle{
  flex:1;
  position:relative;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* =====================================================
TEAM FLAGS
===================================================== */

.versus{
  position:absolute;
  top:45px;

  display:flex;
  align-items:center;
  gap:120px;
}

.team-side{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
}

.team-ring{
  position:relative;
}

.team-ring::before{
  content:"";

  position:absolute;
  inset:-10px;

  border-radius:50%;
  border:2px solid rgba(0,234,255,.4);

  animation:rotateRing 8s linear infinite;
}

@keyframes rotateRing{

  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }

}

.team-flag{
  width:145px;
  height:145px;

  border-radius:50%;
  object-fit:cover;

  border:5px solid rgba(255,255,255,.2);

  box-shadow:
    0 0 30px rgba(0,234,255,.35),
    0 0 80px rgba(0,234,255,.1);
}

.team-name{
  font-size:32px;
  font-weight:900;
}

.vs{
  font-size:90px;
  font-family:'Orbitron',sans-serif;
  font-weight:900;
  color:var(--gold);

  text-shadow:
    0 0 30px rgba(255,216,77,.5);
}

/* =====================================================
COMMENTARY
===================================================== */

.commentary-wrap{
  position:absolute;
  bottom:180px;

  width:100%;

  display:flex;
  justify-content:center;
}

.commentary-box{
  width:50%;

  padding:24px 30px;

  border-radius:28px;

  background:
    linear-gradient(
      135deg,
      rgba(8,15,25,.96),
      rgba(18,30,45,.9)
    );

  border:1px solid rgba(0,234,255,.16);

  backdrop-filter:blur(18px);

  overflow:hidden;
  position:relative;

  box-shadow:
    0 0 40px rgba(0,0,0,.45),
    0 0 60px rgba(0,234,255,.08);
}

.commentary-box::before{
  content:"";

  position:absolute;
  inset:0;

  background:
    linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,.06),
      transparent
    );

  animation:shine 4s linear infinite;
}

@keyframes shine{

  from{
    transform:translateX(-100%);
  }

  to{
    transform:translateX(100%);
  }

}

.commentary-head{
  display:flex;
  align-items:center;
  gap:12px;

  margin-bottom:12px;
}

.live-dot{
  width:12px;
  height:12px;

  border-radius:50%;
  background:#ff0033;

  box-shadow:0 0 15px #ff0033;

  animation:liveDot 1s infinite;
}

@keyframes liveDot{

  0%,100%{
    transform:scale(1);
  }

  50%{
    transform:scale(.7);
  }

}

.commentary-label{
  color:var(--cyan);
  letter-spacing:3px;
  font-size:13px;
  font-weight:900;
}

.commentary{
  font-size:30px;
  font-weight:800;
  line-height:1.5;
  min-height:50px;
}

/* =====================================================
EVENT SCREEN
===================================================== */

.event-screen{
  position:absolute;
  inset:0;

  display:flex;
  justify-content:center;
  align-items:center;

  pointer-events:none;
  z-index:50;
}

.event{
  display:none;

  font-size:180px;
  font-weight:900;
  font-family:'Orbitron',sans-serif;

  animation:eventZoom 1s ease forwards;
}

.event.four{
  color:#00f7ff;

  text-shadow:
    0 0 30px #00f7ff,
    0 0 90px #00f7ff;
}

.event.six{
  color:#ffd84d;

  text-shadow:
    0 0 30px #ffd84d,
    0 0 90px orange;
}

.event.wicket{
  color:#ff1744;

  text-shadow:
    0 0 30px #ff1744,
    0 0 90px darkred;
}

@keyframes eventZoom{

  0%{
    transform:scale(.2) rotate(-10deg);
    opacity:0;
    filter:blur(15px);
  }

  40%{
    opacity:1;
    filter:blur(0);
  }

  100%{
    transform:scale(1);
    opacity:1;
  }

}

/* =====================================================
FLASH
===================================================== */

.flash{
  position:absolute;
  inset:0;

  background:
    radial-gradient(
      circle,
      rgba(255,0,0,.25),
      rgba(120,0,0,.8)
    );

  opacity:0;
  pointer-events:none;

  z-index:40;
}

.flash.active{
  animation:redFlash .9s ease;
}

@keyframes redFlash{

  0%{
    opacity:0;
  }

  20%{
    opacity:1;
  }

  50%{
    opacity:.3;
  }

  80%{
    opacity:1;
  }

  100%{
    opacity:0;
  }

}

/* =====================================================
TIMELINE
===================================================== */

.timeline{
  position:absolute;
  left:50%;
  bottom:12px;

  transform:translateX(-50%);

  width:96%;

  display:flex;
  gap:14px;

  overflow-x:auto;
}

.timeline::-webkit-scrollbar{
  display:none;
}

.over-card{
  min-width:220px;

  padding:16px;

  border-radius:22px;

  background:rgba(8,15,25,.85);

  border:1px solid rgba(0,234,255,.15);

  backdrop-filter:blur(10px);
}

.over-head{
  display:flex;
  justify-content:space-between;

  margin-bottom:14px;
}

.over-title{
  color:var(--cyan);
  font-weight:900;
}

.over-total{
  color:var(--gold);
  font-weight:900;
}

.balls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.ball{
  width:36px;
  height:36px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  font-weight:900;

  animation:pop .4s ease;
}

@keyframes pop{

  from{
    transform:scale(.2);
    opacity:0;
  }

  to{
    transform:scale(1);
    opacity:1;
  }

}

.ball-0{
  background:#374151;
}

.ball-1,
.ball-2,
.ball-3{
  background:#2563eb;
}

.ball-4{
  background:#00b894;
  box-shadow:0 0 18px rgba(0,255,170,.4);
}

.ball-6{
  background:#f59e0b;
  box-shadow:0 0 18px rgba(255,170,0,.4);
}

.ball-W{
  background:#ff1744;
  box-shadow:0 0 18px rgba(255,0,60,.5);
}

/* =====================================================
BOTTOM PLAYERS
===================================================== */

.bottom{
  height:205px;

  padding:22px 30px;

  background:
    linear-gradient(
      to top,
      rgba(2,8,15,.98),
      rgba(2,8,15,.82)
    );

  border-top:2px solid rgba(0,234,255,.2);

  backdrop-filter:blur(20px);
}

.players{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
}

.player-card{
  flex:1;

  display:flex;
  align-items:center;
  gap:18px;

  min-width:0;

  padding:18px;

  border-radius:26px;

  background:rgba(255,255,255,.04);

  border:1px solid rgba(255,255,255,.07);

  position:relative;
  overflow:hidden;

  transition:.3s;
}

.player-card:hover{
  transform:translateY(-3px);
}

.player-card::before{
  content:"";

  position:absolute;
  inset:0;

  background:
    linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,.04),
      transparent
    );

  animation:shine 5s linear infinite;
}

.player-image-wrap{
  position:relative;
  flex-shrink:0;
}

.player-image-wrap::before{
  content:"";

  position:absolute;
  inset:-6px;

  border-radius:50%;

  border:2px solid rgba(0,234,255,.35);

  animation:rotateRing 7s linear infinite;
}

.player-img{
  width:100px;
  height:100px;

  border-radius:50%;
  object-fit:cover;

  border:4px solid rgba(255,255,255,.15);

  background:#111827;
}

.player-role{
  position:absolute;
  bottom:-8px;
  left:50%;

  transform:translateX(-50%);

  background:var(--cyan);

  color:#000;

  padding:4px 10px;

  border-radius:20px;

  font-size:11px;
  font-weight:900;
  letter-spacing:1px;
}

.player-details{
  flex:1;
  min-width:0;
}

.player-name{
  font-size:26px;
  font-weight:900;

  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.player-stats{
  margin-top:8px;

  color:var(--gold);

  font-size:30px;
  font-weight:900;

  font-family:'Orbitron',sans-serif;
}

.player-extra{
  margin-top:6px;

  color:#cbd5e1;
  font-size:14px;
}

/* =====================================================
RESPONSIVE
===================================================== */

@media(max-width:1200px){

  .players{
    flex-direction:column;
  }

  .bottom{
    height:auto;
  }

}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="background">
  <img src="/static/stadium.jpg" alt="">
</div>

<div class="overlay"></div>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- MAIN -->
<div class="broadcast">

  <!-- TOP -->
  <div class="top-bar">

    <div class="left-top">

      <div class="teams" id="teams">

      </div>

      <div class="match-info" id="match_info">

      </div>

    </div>

      <div class="score" id="score">

      </div>

      </div>

    </div>

    <div class="right-top">

      <div class="stat-card">

        <div class="stat-label">
          CRR
        </div>

        <div class="stat-value" id="crr">
          0.00
        </div>

      </div>

      <div class="stat-card">

        <div class="stat-label">

          >

          </div>

          </div>

      <!-- BOWLER -->

<!-- AUDIO -->
<audio id="crowdShock" src="/static/crowd_shock.mp3"></audio>
<audio id="crowdCheer" src="/static/crowd_cheer.mp3"></audio>
<audio id="batCrack" src="/static/bat_crack.mp3"></audio>

<script>

/* =====================================================
WEBSOCKET
===================================================== */

const ws =
  new WebSocket("ws://127.0.0.1:8000/ws");

/* =====================================================
STATE
===================================================== */

let lastEventTime = 0;

/* =====================================================
HELPERS
===================================================== */

function setText(id,value){

  const el =
    document.getElementById(id);

  if(!el) return;

  el.innerText =
    value ?? "-";

}

function setImg(id,src){

  const el =
    document.getElementById(id);

  if(!el) return;

  el.src =
    src || "/static/player.png";

}

function playSound(id){

  const audio =
    document.getElementById(id);

  if(!audio) return;

  audio.currentTime = 0;

  audio.play().catch(()=>{});

}

/* =====================================================
PARTICLES
===================================================== */

function createParticles(){

  const container =
    document.getElementById("particles");

  for(let i=0;i<70;i++){

    const p =
      document.createElement("div");

    p.className = "particle";

    p.style.left =
      Math.random()*100 + "%";

    p.style.animationDuration =
      (5 + Math.random()*12) + "s";

    p.style.animationDelay =
      Math.random()*5 + "s";

    p.style.opacity =
      Math.random();

    container.appendChild(p);

  }

}

createParticles();

/* =====================================================
TIMELINE
===================================================== */

function renderTimeline(overs){

  const box =
    document.getElementById("timeline");

  box.innerHTML = "";

  if(!Array.isArray(overs))
    return;

  overs.slice(-5).forEach(over=>{

    const card =
      document.createElement("div");

    card.className =
      "over-card";

    const balls =
      (over.balls || [])
      .map(ball=>{

        let cls =
          `ball-${ball}`;

        if(ball === "W"){
          cls = "ball-W";
        }

        return `
          <div class="ball ${cls}">
            ${ball}
          </div>
        `;

      }).join("");

    card.innerHTML = `
      <div class="over-head">

        <div class="over-title">
          ${over.over || ""}
        </div>

        <div class="over-total">
          ${over.total || ""}
        </div>

      </div>

      <div class="balls">
        ${balls}
      </div>
    `;

    box.appendChild(card);

  });

}

/* =====================================================
EVENTS
===================================================== */

function flash(){

  const el =
    document.getElementById("flash");

  el.classList.remove("active");

  void el.offsetWidth;

  el.classList.add("active");

}

function showEvent(type){

  const el =
    document.getElementById(
      type.toLowerCase()
    );

  if(!el) return;

  el.style.display = "block";

  el.style.animation = "none";

  void el.offsetWidth;

  el.style.animation =
    "eventZoom 1s ease forwards";

  if(type === "FOUR"){

    playSound("crowdCheer");

  }

  if(type === "SIX"){

    playSound("crowdCheer");

  }

  if(type === "WICKET"){

    flash();

    playSound("crowdShock");

    setTimeout(()=>{

      playSound("batCrack");

    },120);

  }

  setTimeout(()=>{

    el.style.display = "none";

  },2500);

}

/* =====================================================
AUTO DETECT
===================================================== */

function detectEvent(resultBoxes){

  if(!resultBoxes)
    return null;

  const text =
    resultBoxes.join(" ").toUpperCase();

  if(
    text.includes("WICKET") ||
    text.includes("BOWLED") ||
    text.includes("LBW") ||
    text.includes("CAUGHT")
  ){
    return "WICKET";
  }

  if(
    text.includes(" 6 ") ||
    text.includes("SIX")
  ){
    return "SIX";
  }

  if(
    text.includes(" 4 ") ||
    text.includes("FOUR")
  ){
    return "FOUR";
  }

  return null;

}

/* =====================================================
WEBSOCKET DATA HANDLER
===================================================== */

ws.onmessage = (event) => {

  try {

    const d = JSON.parse(event.data);

    console.log("LIVE DATA:", d);

    /* =====================================================
    SAFE DEFAULTS
    ===================================================== */
    console.log(d.flags.team_a_name)
    const teamA =
      d.flags.team_a_name || "TEAM A";

    const teamB =
      d.flags.team_b_name || "TEAM B";

    const score =
      d.score || "0/0";

    const overs =
      d.overs || "0.0";

    const crr =
      d.crr || "0.00";

    const partnership =
      d.partnership || "0 (0)";

    const commentary =
      d.commentary ||
      "Live Match In Progress...";

    const flags =
      d.flags || {};

    const livePlayers =
      d.live_players || {};

    const batsmen =
      livePlayers.batsmen || [];

    const bowler =
      livePlayers.bowler || null;

    /* =====================================================
    TOP SECTION
    ===================================================== */

    setText(
      "teams",
      `${flags.team_a_name} vs ${flags.team_b_name}`
    );

    setText(
      "match_info",
      flags.match_info || "LIVE MATCH"
    );

    setText(
      "score",
      score
    );

    setText(
      "overs",
      `${overs} Overs`
    );

    setText(
      "crr",
      crr
    );

    setText(
      "partnership",
      partnership
    );

/* =====================================================
  COMMENTARY
  ===================================================== */

  let commentaryText =
    "Live Match In Progress";

  if(d.commentary){

    commentaryText =
      d.commentary;

  }else if(
    d.result_boxes &&
    d.result_boxes.length
  ){

    commentaryText =
      d.result_boxes.join(" • ");

  }else if(d.last_wicket){

    commentaryText =
      `Last Wicket: ${d.last_wicket}`;

  }

  setText(
    "commentary",
    commentaryText
  );


    /* =====================================================
    TEAM SECTION
    ===================================================== */

    setText(
      "team_a_mid",
      teamA
    );

    setText(
      "team_b_mid",
      teamB
    );

    setImg(
      "flag_a",
      flags.team_a_flag ||
      "/static/default_a.png"
    );

    setImg(
      "flag_b",
      flags.team_b_flag ||
      "/static/default_b.png"
    );

    /* =====================================================
    STRIKER
    ===================================================== */

    if (batsmen.length > 0) {

      const striker =
        batsmen[0];

      setText(
        "striker",
        striker.name || "-"
      );

      setText(
        "s_runs",
        `${striker.runs || 0} (${striker.balls || 0})`
      );

      setImg(
        "striker_img",
        striker.image ||
        "/static/player.png"
      );

    } else {

      setText(
        "striker",
        "-"
      );

      setText(
        "s_runs",
        "0 (0)"
      );

      setImg(
        "striker_img",
        "/static/player.png"
      );

    }

    /* =====================================================
    NON STRIKER
    ===================================================== */

    if (batsmen.length > 1) {

      const nonStriker =
        batsmen[1];

      setText(
        "non_striker",
        nonStriker.name || "-"
      );

      setText(
        "ns_runs",
        `${nonStriker.runs || 0} (${nonStriker.balls || 0})`
      );

      setImg(
        "non_striker_img",
        nonStriker.image ||
        "/static/player.png"
      );

    } else {

      setText(
        "non_striker",
        "-"
      );

      setText(
        "ns_runs",
        "0 (0)"
      );

      setImg(
        "non_striker_img",
        "/static/player.png"
      );

    }

    /* =====================================================
    BOWLER
    ===================================================== */

    if (bowler) {

      setText(
        "bowler",
        bowler.name || "-"
      );

      const bowlingFigure =
        `${bowler.wickets || 0}/${bowler.runs || 0} • ${bowler.overs || "0.0"} OV`;

      setText(
        "bowler_fig",
        bowlingFigure
      );

      setImg(
        "bowler_img",
        bowler.image ||
        "/static/player.png"
      );

    } else {

      setText(
        "bowler",
        "-"
      );

      setText(
        "bowler_fig",
        "0/0 • 0.0 OV"
      );

      setImg(
        "bowler_img",
        "/static/player.png"
      );

    }

    /* =====================================================
    OVERS TIMELINE
    ===================================================== */

    renderTimeline(
      d.overs_timeline || []
    );

    /* =====================================================
    EVENT DETECTION
    ===================================================== */

    const eventType =
      d.event || null;

    const eventTime =
      d.event_time ||
      d.updated ||
      Date.now();

    if (
      eventType &&
      eventTime !== lastEventTime
    ) {

      lastEventTime =
        eventTime;

      showEvent(
        eventType
      );

    }

  } catch (error) {

    console.error(
      "WebSocket Parse Error:",
      error
    );

  }

};
