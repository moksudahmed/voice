<title>Ultra Cinematic Cricket Broadcast</title>

/* =========================================================
RESET
========================================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --cyan:#00e5ff;
    --yellow:#ffd84d;
    --green:#00ff88;
    --red:#ff1744;
    --white:#ffffff;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    background:#000;
    color:#fff;
}

/* =========================================================
BACKGROUND
========================================================= */

.video-bg{
    position:fixed;
    inset:0;
    z-index:-30;
    overflow:hidden;
}

.video-bg video{
    width:100%;
    height:100%;
    object-fit:cover;

    filter:
    brightness(.35)
    saturate(1.2)
    contrast(1.15);

    transform:scale(1.06);
}

.video-overlay{
    position:fixed;
    inset:0;
    z-index:-29;

    background:
    linear-gradient(
        to bottom,
        rgba(0,0,0,.35),
        rgba(0,0,0,.15),
        rgba(0,0,0,.85)
    ),
    radial-gradient(
        circle at center,
        rgba(0,229,255,.12),
        transparent 50%
    );
}

/* =========================================================
LIGHTS
========================================================= */

.light{
    position:fixed;
    width:550px;
    height:550px;
    border-radius:50%;
    filter:blur(140px);
    opacity:.30;
    z-index:-28;
    animation:lightMove 12s infinite alternate ease-in-out;
}

.light1{
    background:#00e5ff;
    top:-120px;
    left:-120px;
}

.light2{
    background:#ff0080;
    bottom:-120px;
    right:-120px;
    animation-delay:2s;
}

.light3{
    background:#ffd84d;
    top:30%;
    left:38%;
    animation-delay:4s;
}

@keyframes lightMove{
    from{
        transform:translateY(0) scale(1);
    }
    to{
        transform:translateY(40px) scale(1.08);
    }
}

/* =========================================================
PARTICLES
========================================================= */

#particles{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:-27;
}

.particle{
    position:absolute;
    width:4px;
    height:4px;
    border-radius:50%;
    background:#fff;
    opacity:.55;
    animation:floatParticle linear infinite;
}

@keyframes floatParticle{

    from{
        transform:
        translateY(100vh)
        scale(0);
    }

    to{
        transform:
        translateY(-10vh)
        scale(1);
    }
}

/* =========================================================
LAYOUT
========================================================= */

.broadcast{
    width:100%;
    height:100vh;
    padding:18px;

    display:flex;
    flex-direction:column;
    gap:18px;
}

/* =========================================================
TOP BAR
========================================================= */

.top-bar{
    width:100%;
    min-height:135px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 35px;

    border-radius:34px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    box-shadow:
    0 10px 40px rgba(0,0,0,.4);
}

.left-top{
    display:flex;
    flex-direction:column;
    gap:5px;
}

.teams{
    font-size:42px;
    font-weight:900;
    text-transform:uppercase;
}

.match-info{
    font-size:15px;
    font-weight:700;
    color:var(--cyan);
}

.overs{
    font-size:14px;
    color:#ddd;
}

/* =========================================================
CENTER SCORE
========================================================= */

.center-wrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
}

.center-score{
    display:flex;
    align-items:center;
    gap:18px;
}

.score{
    font-size:95px;
    font-weight:900;

    font-family:'Orbitron',sans-serif;

    background:
    linear-gradient(
        90deg,
        #fff,
        #ffe600,
        #ff9800
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
    0 0 30px rgba(255,200,0,.45);

    animation:pulse 2s infinite;
}

@keyframes pulse{

    0%,100%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.03);
    }
}

.live{
    padding:14px 24px;

    border-radius:50px;

    background:
    linear-gradient(
        135deg,
        #ff1744,
        #ff5d5d
    );

    font-size:18px;
    font-weight:900;
    letter-spacing:2px;

    box-shadow:
    0 0 25px rgba(255,0,80,.55);

    animation:blink 1s infinite;
}

@keyframes blink{

    0%,100%{
        opacity:1;
    }

    50%{
        opacity:.65;
    }
}

/* =========================================================
TARGET BOX
========================================================= */

.target-box{
    padding:10px 26px;

    border-radius:50px;

    background:
    linear-gradient(
        135deg,
        rgba(255,216,77,.20),
        rgba(255,152,0,.10)
    );

    border:1px solid rgba(255,216,77,.30);

    backdrop-filter:blur(12px);

    font-size:18px;
    font-weight:800;
    letter-spacing:1px;

    color:#fff;

    box-shadow:
    0 0 25px rgba(255,216,77,.15);
}

#targetScore{
    color:var(--yellow);

    font-size:28px;

    font-family:'Orbitron',sans-serif;
    font-weight:900;

    margin-left:8px;

    text-shadow:
    0 0 20px rgba(255,216,77,.55);
}

/* =========================================================
RIGHT STATS
========================================================= */

.right-top{
    display:flex;
    gap:18px;
}

.stat{
    min-width:150px;

    padding:16px 20px;

    border-radius:24px;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.15),
        rgba(255,255,255,.05)
    );

    border:1px solid rgba(255,255,255,.08);

    text-align:center;
}

.stat-label{
    font-size:12px;
    letter-spacing:2px;
    color:#ddd;
    margin-bottom:8px;
}

.stat-value{
    font-size:28px;
    font-weight:900;
    color:var(--cyan);
}

/* =========================================================
MIDDLE
========================================================= */

.middle{
    flex:1;
    position:relative;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* =========================================================
VERSUS
========================================================= */

.versus{
    position:inherit;

    bottom:150px;

    display:flex;
    align-items:flex-start;
    gap:354px;

    z-index:2;
}

.team{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
}

.team-logo{
    width:180px;
    height:180px;

    object-fit:cover;
    border-radius:50%;

    border:6px solid rgba(255,255,255,.22);

    box-shadow:
    0 0 40px rgba(255,255,255,.2),
    0 0 90px rgba(0,229,255,.18);

    animation:logoFloat 4s infinite ease-in-out;
}

@keyframes logoFloat{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }
}

.team-name{
    font-size:34px;
    font-weight:900;
}

.vs{
    font-size:84px;

    font-family:'Orbitron',sans-serif;
    font-weight:900;

    background:
    linear-gradient(
        180deg,
        #fff,
        #ffe600,
        #ff9800
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* =========================================================
COMMENTARY
========================================================= */

.commentary-wrap{
    position:absolute;

    bottom:150px;

    width:150%;

    display:flex;
    justify-content:center;

    z-index:1;
}

.commentary-box{
    width:26%;

    padding:28px 36px;

    border-radius:34px;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.16),
        rgba(255,255,255,.05)
    );

    border:1px solid rgba(255,255,255,.1);

    backdrop-filter:blur(20px);

    box-shadow:
    0 10px 40px rgba(0,0,0,.35);
}

.commentary-head{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:14px;
}

.live-dot{
    width:14px;
    height:14px;
    border-radius:50%;
    background:#ff1744;

    box-shadow:
    0 0 18px #ff1744;

    animation:dotBlink 1s infinite;
}

@keyframes dotBlink{

    0%,100%{
        transform:scale(1);
    }

    50%{
        transform:scale(.7);
    }
}

.commentary-label{
    font-size:14px;
    font-weight:900;
    letter-spacing:3px;
    color:var(--cyan);
}

.commentary{
    font-size:34px;
    font-weight:800;
    line-height:1.5;
}

/* =========================================================
BOTTOM PLAYERS
========================================================= */

.bottom{
    width:100%;
    min-height:210px;

    padding:22px;

    border-radius:34px;

    background:rgba(255,255,255,.12);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(20px);
}

.players{
    display:flex;
    gap:20px;
}

.player{
    flex:1;

    display:flex;
    align-items:center;
    gap:18px;

    padding:20px;

    border-radius:28px;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.16),
        rgba(255,255,255,.05)
    );
}

.player img{
    width:110px;
    height:110px;

    border-radius:50%;
    object-fit:cover;

    border:4px solid rgba(255,255,255,.2);
}

.player-details{
    flex:1;
}

.player-role{
    display:inline-block;

    padding:6px 14px;

    border-radius:20px;

    background:var(--cyan);

    color:#000;

    font-size:12px;
    font-weight:900;

    margin-bottom:10px;
}

.player-name{
    font-size:28px;
    font-weight:900;
}

.player-score{
    margin-top:6px;

    font-size:38px;

    font-family:'Orbitron',sans-serif;
    font-weight:900;

    color:var(--yellow);
}

.player-extra{
    margin-top:6px;
    font-size:14px;
    color:#eee;
}

/* =========================================================
EVENT POPUP
========================================================= */

.event-screen{
    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    pointer-events:none;
}

.event-popup{
    font-size:200px;
    font-family:'Orbitron',sans-serif;
    font-weight:900;

    animation:eventAnim 1s ease forwards;
}

@keyframes eventAnim{

    0%{
        transform:scale(.2);
        opacity:0;
        filter:blur(20px);
    }

    100%{
        transform:scale(1);
        opacity:1;
        filter:blur(0);
    }
}

/* =========================================================
TIMELINE
========================================================= */

.timeline{
    position:absolute;

    bottom:15px;
    left:50%;

    transform:translateX(-50%);

    width:96%;

    display:flex;
    gap:15px;

    overflow-x:auto;

    padding-bottom:4px;
}

.timeline::-webkit-scrollbar{
    display:none;
}

.timeline-card{
    min-width:230px;

    padding:18px;

    border-radius:24px;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.16),
        rgba(255,255,255,.05)
    );

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(15px);
}

.timeline-head{
    display:flex;
    justify-content:space-between;

    margin-bottom:12px;

    font-weight:800;
}

.timeline-over{
    color:var(--cyan);
}

.timeline-total{
    color:var(--yellow);
}

.timeline-balls{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.ball{
    width:38px;
    height:38px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-weight:900;
    color:#fff;
}

/* =========================================================
RESPONSIVE
========================================================= */

@media(max-width:1400px){

    .versus{
        gap:120px;
    }

    .team-logo{
        width:150px;
        height:150px;
    }

    .vs{
        font-size:90px;
    }

    .commentary{
        font-size:28px;
    }

    .score{
        font-size:70px;
    }
}


</style>
</head>

<script>
/* =========================================================
PARTICLES GENERATION
========================================================= */

const particlesContainer = document.getElementById("particles");

function createParticles(count = 80) {

    if (!particlesContainer) return;

    for (let i = 0; i < count; i++) {

        const p = document.createElement("div");
        p.className = "particle";

        p.style.left = Math.random() * 100 + "%";
        p.style.animationDuration = (6 + Math.random() * 10) + "s";
        p.style.animationDelay = Math.random() * 5 + "s";

        particlesContainer.appendChild(p);
    }
}

createParticles();

/* =========================================================
WEBSOCKET CONNECTION
========================================================= */

const ws = new WebSocket("ws://127.0.0.1:8000/ws");

let lastEventTime = 0;

/* =========================================================
DOM HELPERS
========================================================= */

function setText(selector, value) {

    const el = document.querySelector(selector);
    if (!el) return;

    el.innerText = (value !== undefined && value !== null) ? value : "-";
}

function setImage(selector, src, fallback = "/static/player.png") {

    const el = document.querySelector(selector);
    if (!el) return;

    el.src = src || fallback;
}

function playSound(id) {

    const audio = document.getElementById(id);
    if (!audio) return;

    audio.currentTime = 0;
    audio.play().catch(() => {});
}

/* =========================================================
EVENT DISPLAY SYSTEM
========================================================= */

function showEvent(type) {

    const screen = document.querySelector(".event-screen");
    if (!screen) return;

    let color = "#00e5ff";

    if (type === "SIX") {
        color = "#ffd84d";
        playSound("crowdCheer");
    }

    if (type === "FOUR") {
        color = "#00ff88";
        playSound("crowdCheer");
    }

    if (type === "WICKET") {
        color = "#ff1744";
        playSound("crowdShock");
    }

    screen.innerHTML = `
        <div class="event-popup"
            style="
                color:${color};
                text-shadow:0 0 30px ${color}, 0 0 90px ${color};
            ">
            ${type}
        </div>
    `;

    setTimeout(() => {
        screen.innerHTML = "";
    }, 2000);
}

/* =========================================================
TIMELINE RENDER
========================================================= */

function renderTimeline(overs = []) {

    const timeline = document.querySelector(".timeline");
    if (!timeline) return;

    timeline.innerHTML = "";

    if (!Array.isArray(overs)) return;

    const lastOvers = overs.slice(-5);

    lastOvers.forEach(over => {

        let ballsHTML = "";

        (over.balls || []).forEach(ball => {

            let bg = "#374151";

            if (ball == 4) bg = "#00c853";
            if (ball == 6) bg = "#ff9800";
            if (ball === "W") bg = "#ff1744";

            ballsHTML += `
                <div class="ball" style="background:${bg}">
                    ${ball}
                </div>
            `;
        });

        timeline.innerHTML += `
            <div class="timeline-card">

                <div class="timeline-head">
                    <div class="timeline-over">${over.over || ""}</div>
                    <div class="timeline-total">${over.total || ""}</div>
                </div>

                <div class="timeline-balls">
                    ${ballsHTML}
                </div>

            </div>
        `;
    });
}

/* =========================================================
EVENT DETECTOR (FOUR / SIX / WICKET)
========================================================= */

function detectEvent(boxes) {

    if (!boxes || !Array.isArray(boxes)) return null;

    const text = boxes.join(" ").toUpperCase();

    if (text.includes("WICKET") || text.includes("BOWLED")) return "WICKET";

    if (text.includes("SIX") || text.includes(" 6 ")) return "SIX";

    if (text.includes("FOUR") || text.includes(" 4 ")) return "FOUR";

    return null;
}

/* =========================================================
WEBSOCKET MESSAGE HANDLER
========================================================= */

ws.onmessage = (event) => {

    try {

        const d = JSON.parse(event.data);

        const flags = d.flags || {};
        const livePlayers = d.live_players || {};

        const batsmen = livePlayers.batsmen || [];
        const bowler = livePlayers.bowler || null;
        console.log(d)
        /* =========================
        TOP BAR
        ========================= */

        setText(".teams",
            `${flags.team_a_name || "TEAM A"} vs ${flags.team_b_name || "TEAM B"}`
        );

        setText(".match-info", flags.match_info || "LIVE MATCH");
        setText(".overs", `${d.overs || "0.0"} Overs`);
        setText(".score", d.score || "0/0");

        setText("#crr", d.crr || "0.00");
        setText("#partnership", d.partnership || "0(0)");

        /* =========================
        TARGET
        ========================= */

        setText("#targetScore", d.target || d.target_score || "");

        /* =========================
        TEAM FLAGS
        ========================= */

        setText("#teamA", flags.team_a_name || "TEAM A");
        setText("#teamB", flags.team_b_name || "TEAM B");

        setImage("#teamAFlag", flags.team_a_flag);
        setImage("#teamBFlag", flags.team_b_flag);

        /* =========================
        COMMENTARY
        ========================= */

        setText("#commentary",
            d.commentary || "LIVE MATCH IN PROGRESS"
        );

        /* =========================
        STRIKER
        ========================= */

        if (batsmen[0]) {

            setText("#strikerName", batsmen[0].name);
            setText("#strikerScore",
                `${batsmen[0].runs || 0} (${batsmen[0].balls || 0})`
            );

            setImage("#strikerImg", batsmen[0].image);
        }

        /* =========================
        NON STRIKER
        ========================= */

        if (batsmen[1]) {

            setText("#nonStrikerName", batsmen[1].name);
            setText("#nonStrikerScore",
                `${batsmen[1].runs || 0} (${batsmen[1].balls || 0})`
            );

            setImage("#nonStrikerImg", batsmen[1].image);
        }

        /* =========================
        BOWLER
        ========================= */

        if (bowler) {

            setText("#bowlerName", bowler.name);
            setText("#bowlerScore",
                `${bowler.figures}`
            );

            setImage("#bowlerImg", bowler.image);
        }

        /* =========================
        TIMELINE
        ========================= */

        renderTimeline(d.overs_timeline || []);

        /* =========================
        EVENT DETECTION
        ========================= */

        let eventType = d.event || null;

        if (!eventType) {
            eventType = detectEvent(d.result_boxes || []);
        }

        const eventTime = d.event_time || d.updated || Date.now();

        if (eventType && eventTime !== lastEventTime) {

            lastEventTime = eventTime;
            showEvent(eventType);
        }

    } catch (err) {
        console.error("WS ERROR:", err);
    }
};

/* =========================================================
WEBSOCKET STATUS
========================================================= */

ws.onopen = () => {
    console.log("WEBSOCKET CONNECTED");
};

ws.onclose = () => {
    console.log("WEBSOCKET DISCONNECTED");
};

ws.onerror = (err) => {
    console.log("SOCKET ERROR:", err);
};

</script>

</body>
</html>
