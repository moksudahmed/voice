<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultra Cinematic Cricket Broadcast</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- =========================================================
VIDEO BG
========================================================= -->

<div class="video-bg">
    <video autoplay muted loop playsinline>
        <source src="/static/11755921-uhd_4096_2160.mp4" type="video/mp4">
    </video>
</div>

<div class="video-overlay"></div>

<div class="light light1"></div>
<div class="light light2"></div>
<div class="light light3"></div>

<div id="particles"></div>

<!-- =========================================================
MAIN
========================================================= -->

<div class="broadcast">

    <!-- TOP BAR -->

    <div class="top-bar">

        <div class="left-top">

            <div class="teams">
                INDIA vs AUSTRALIA
            </div>

            <div class="match-info">
                ICC WORLD CUP 2026
            </div>

            <div class="overs">
                0.0 Overs
            </div>

        </div>

        <!-- CENTER -->

        <div class="center-wrapper">

            <div class="center-score">

                <div class="score">
                    0/0
                </div>

                <div class="live">
                    LIVE
                </div>

            </div>

            <!-- TARGET IMPLEMENTED -->

            <div class="target-box">

                
                <span id="targetScore">
                   
                </span>

            </div>

        </div>

        <!-- RIGHT -->

        <div class="right-top">

            <div class="stat">

                <div class="stat-label">
                    CRR
                </div>

                <div class="stat-value" id="crr">
                    0.00
                </div>

            </div>

            <div class="stat">

                <div class="stat-label">
                    PARTNERSHIP
                </div>

                <div class="stat-value" id="partnership">
                    0(0)
                </div>

            </div>

        </div>

    </div>

    <!-- MIDDLE -->

    <div class="middle">

        <div class="versus">

            <div class="team">

                <img
                class="team-logo"
                id="teamAFlag"
                src="/static/default_a.png">

                <div class="team-name" id="teamA">
                    TEAM A
                </div>

            </div>

            <div class="vs">
                VS
            </div>

            <div class="team">

                <img
                class="team-logo"
                id="teamBFlag"
                src="/static/default_b.png">

                <div class="team-name" id="teamB">
                    TEAM B
                </div>

            </div>

        </div>

        <!-- COMMENTARY -->

        <div class="commentary-wrap">

            <div class="commentary-box">

                <div class="commentary-head">

                    <div class="live-dot"></div>

                    <div class="commentary-label">
                        LIVE COMMENTARY
                    </div>

                </div>

                <div class="commentary" id="commentary">
                    Match Starting...
                </div>

            </div>

        </div>

        <!-- EVENT -->

        <div class="event-screen"></div>

        <!-- TIMELINE -->

        <div class="timeline"></div>

    </div>

    <!-- BOTTOM -->

    <div class="bottom">

        <div class="players">

            <!-- STRIKER -->

            <div class="player">

                <img id="strikerImg" src="/static/player.png">

                <div class="player-details">

                    <div class="player-role">
                        STRIKER
                    </div>

                    <div class="player-name" id="strikerName">
                        -
                    </div>

                    <div class="player-score" id="strikerScore">
                        0 (0)
                    </div>

                    <div class="player-extra">
                        Batting
                    </div>

                </div>

            </div>

            <!-- NON STRIKER -->

            <div class="player">

                <img id="nonStrikerImg" src="/static/player.png">

                <div class="player-details">

                    <div class="player-role">
                        NON STRIKER
                    </div>

                    <div class="player-name" id="nonStrikerName">
                        -
                    </div>

                    <div class="player-score" id="nonStrikerScore">
                        0 (0)
                    </div>

                    <div class="player-extra">
                        Batting
                    </div>

                </div>

            </div>

            <!-- BOWLER -->

            <div class="player">

                <img id="bowlerImg" src="/static/player.png">

                <div class="player-details">

                    <div class="player-role">
                        BOWLER
                    </div>

                    <div class="player-name" id="bowlerName">
                        -
                    </div>

                    <div class="player-score" id="bowlerScore">
                        0/0
                    </div>

                    <div class="player-extra">
                        Bowling
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- =========================================================
AUDIO
========================================================= -->

<audio id="crowdCheer" src="/static/crowd_cheer.mp3"></audio>
<audio id="crowdShock" src="/static/crowd_shock.mp3"></audio>

<!-- =========================================================
SCRIPT
========================================================= -->
<script src="/static/script.js"></script>

</body>
</html>
