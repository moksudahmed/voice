<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ultra Cinematic Cricket Broadcast</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --cyan:#00e5ff;
    --yellow:#ffd84d;
    --green:#00ff88;
    --red:#ff1744;
    --white:#ffffff;

}

body{

    width:100%;
    height:100vh;

    overflow:hidden;

    font-family:'Poppins',sans-serif;

    background:#000;

    color:white;

}

/* =========================================================
CINEMATIC VIDEO BACKGROUND
========================================================= */

.video-bg{

    position:fixed;
    inset:0;

    z-index:-20;

    overflow:hidden;

}

.video-bg video{

    width:100%;
    height:100%;

    object-fit:cover;

    filter:
    brightness(.35)
    saturate(1.25)
    contrast(1.15);

    transform:scale(1.08);

}

/* =========================================================
DARK OVERLAY
========================================================= */

.video-overlay{

    position:fixed;
    inset:0;

    z-index:-19;

    background:

    linear-gradient(
        to bottom,
        rgba(0,0,0,.35),
        rgba(0,0,0,.15),
        rgba(0,0,0,.7)
    ),

    radial-gradient(
        circle at center,
        rgba(0,229,255,.15),
        transparent 45%
    );

}

/* =========================================================
MOVING LIGHTS
========================================================= */

.light{

    position:fixed;

    width:500px;
    height:500px;

    border-radius:50%;

    filter:blur(140px);

    opacity:.35;

    z-index:-18;

    animation:moveLight 12s infinite alternate ease-in-out;

}

.light1{

    background:#00e5ff;

    top:-100px;
    left:-100px;

}

.light2{

    background:#ff2f92;

    bottom:-100px;
    right:-100px;

    animation-delay:2s;

}

.light3{

    background:#ffd84d;

    top:35%;
    left:40%;

    animation-delay:4s;

}

@keyframes moveLight{

    from{
        transform:translateY(0) scale(1);
    }

    to{
        transform:translateY(45px) scale(1.1);
    }

}

/* =========================================================
FLOATING PARTICLES
========================================================= */

#particles{

    position:fixed;
    inset:0;

    overflow:hidden;

    z-index:-17;

}

.particle{

    position:absolute;

    width:4px;
    height:4px;

    border-radius:50%;

    background:white;

    opacity:.6;

    animation:floatParticle linear infinite;

}

@keyframes floatParticle{

    from{

        transform:
        translateY(100vh)
        scale(0);

    }

    to{

        transform:
        translateY(-10vh)
        scale(1);

    }

}

/* =========================================================
LAYOUT
========================================================= */

.broadcast{

    width:100%;
    height:100vh;

    padding:18px;

    display:flex;
    flex-direction:column;
    justify-content:space-between;

}

/* =========================================================
TOP BAR
========================================================= */

.top-bar{

    width:100%;
    height:120px;

    padding:0 35px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    border-radius:35px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    box-shadow:
    0 10px 40px rgba(0,0,0,.4);

}

.left-top{

    display:flex;
    flex-direction:column;
    gap:6px;

}

.teams{

    font-size:42px;
    font-weight:900;

    text-transform:uppercase;

}

.match-info{

    color:var(--cyan);

    font-size:15px;
    font-weight:700;

}

.overs{

    font-size:14px;
    color:#ddd;

}

.center-score{

    display:flex;
    align-items:center;
    gap:18px;

}

.score{

    font-size:95px;

    font-weight:900;

    font-family:'Orbitron',sans-serif;

    background:
    linear-gradient(
        90deg,
        #fff,
        #ffe600,
        #ff9800
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
    0 0 30px rgba(255,200,0,.45);

    animation:pulse 2s infinite;

}

@keyframes pulse{

    0%,100%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.04);
    }

}

.live{

    padding:14px 24px;

    border-radius:50px;

    background:
    linear-gradient(
        135deg,
        #ff1744,
        #ff6b6b
    );

    font-size:18px;
    font-weight:900;

    letter-spacing:2px;

    box-shadow:
    0 0 25px rgba(255,0,80,.5);

    animation:blink 1s infinite;

}

@keyframes blink{

    0%,100%{
        opacity:1;
    }

    50%{
        opacity:.65;
    }

}

.right-top{

    display:flex;
    gap:18px;

}

.stat{

    min-width:150px;

    padding:16px 20px;

    border-radius:22px;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.16),
        rgba(255,255,255,.06)
    );

    border:1px solid rgba(255,255,255,.08);

    text-align:center;

}

.stat-label{

    font-size:12px;

    letter-spacing:2px;

    color:#ddd;

    margin-bottom:8px;

}

.stat-value{

    font-size:28px;
    font-weight:900;

    color:var(--cyan);

}

/* =========================================================
MIDDLE
========================================================= */

.middle{

    flex:1;

    position:relative;

    display:flex;
    justify-content:center;
    align-items:center;

}

/* =========================================================
VERSUS
========================================================= */

.versus{

    display:flex;
    align-items:center;
    gap:130px;

}

.team{

    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;

}

.team-logo{

    width:180px;
    height:180px;

    border-radius:50%;

    object-fit:cover;

    border:6px solid rgba(255,255,255,.22);

    box-shadow:
    0 0 40px rgba(255,255,255,.2),
    0 0 90px rgba(0,229,255,.18);

    animation:floatLogo 4s infinite ease-in-out;

}

@keyframes floatLogo{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

}

.team-name{

    font-size:34px;
    font-weight:900;

}

.vs{

    font-size:120px;

    font-family:'Orbitron',sans-serif;
    font-weight:900;

    background:
    linear-gradient(
        180deg,
        #fff,
        #ffe600,
        #ff9800
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

}

/* =========================================================
COMMENTARY
========================================================= */

.commentary-wrap{

    position:absolute;

    bottom:170px;

    width:100%;

    display:flex;
    justify-content:center;

}

.commentary-box{

    width:65%;

    padding:28px 35px;

    border-radius:35px;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.16),
        rgba(255,255,255,.06)
    );

    border:1px solid rgba(255,255,255,.1);

    backdrop-filter:blur(20px);

}

.commentary-head{

    display:flex;
    align-items:center;
    gap:12px;

    margin-bottom:14px;

}

.live-dot{

    width:14px;
    height:14px;

    border-radius:50%;

    background:#ff1744;

    box-shadow:
    0 0 18px #ff1744;

    animation:dotBlink 1s infinite;

}

@keyframes dotBlink{

    0%,100%{
        transform:scale(1);
    }

    50%{
        transform:scale(.7);
    }

}

.commentary-label{

    color:var(--cyan);

    font-size:14px;
    font-weight:900;

    letter-spacing:3px;

}

.commentary{

    font-size:36px;
    font-weight:800;

    line-height:1.4;

}

/* =========================================================
BOTTOM PLAYERS
========================================================= */

.bottom{

    width:100%;
    height:210px;

    border-radius:35px;

    background:rgba(255,255,255,.12);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    padding:22px;

}

.players{

    display:flex;
    gap:20px;

}

.player{

    flex:1;

    display:flex;
    align-items:center;
    gap:18px;

    padding:20px;

    border-radius:28px;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.16),
        rgba(255,255,255,.05)
    );

}

.player img{

    width:110px;
    height:110px;

    border-radius:50%;

    object-fit:cover;

    border:4px solid rgba(255,255,255,.2);

}

.player-details{

    flex:1;

}

.player-role{

    display:inline-block;

    padding:6px 14px;

    border-radius:20px;

    background:var(--cyan);

    color:#000;

    font-size:12px;
    font-weight:900;

    margin-bottom:10px;

}

.player-name{

    font-size:28px;
    font-weight:900;

}

.player-score{

    margin-top:6px;

    font-size:38px;

    font-family:'Orbitron',sans-serif;
    font-weight:900;

    color:var(--yellow);

}

.player-extra{

    margin-top:6px;

    font-size:14px;

    color:#eee;

}

/* =========================================================
EVENT POPUP
========================================================= */

.event-screen{

    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    pointer-events:none;

}

.event-popup{

    font-size:200px;
    font-family:'Orbitron',sans-serif;
    font-weight:900;

    animation:eventAnim 1s ease forwards;

}

@keyframes eventAnim{

    0%{
        transform:scale(.2);
        opacity:0;
        filter:blur(20px);
    }

    100%{
        transform:scale(1);
        opacity:1;
        filter:blur(0);
    }

}

/* =========================================================
TIMELINE
========================================================= */

.timeline{

    position:absolute;

    bottom:10px;
    left:50%;

    transform:translateX(-50%);

    width:95%;

    display:flex;
    gap:15px;

    overflow-x:auto;

}

.timeline::-webkit-scrollbar{

    display:none;

}

.timeline-card{

    min-width:230px;

    padding:18px;

    border-radius:24px;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.16),
        rgba(255,255,255,.05)
    );

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(15px);

}

.timeline-head{

    display:flex;
    justify-content:space-between;

    margin-bottom:12px;

    font-weight:800;

}

.timeline-over{

    color:var(--cyan);

}

.timeline-total{

    color:var(--yellow);

}

.timeline-balls{

    display:flex;
    flex-wrap:wrap;
    gap:8px;

}

.ball{

    width:38px;
    height:38px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-weight:900;

    color:white;

}

</style>
</head>

<body>

<!-- =========================================================
CINEMATIC STADIUM VIDEO BACKGROUND
========================================================= -->

<div class="video-bg">

    <video autoplay muted loop playsinline>

        <!-- Replace with your own stadium video -->
        <source
        src="https://cdn.coverr.co/videos/coverr-cricket-stadium-1564842163313?download=1080p"
        type="video/mp4">

    </video>

</div>

<div class="video-overlay"></div>

<div class="light light1"></div>
<div class="light light2"></div>
<div class="light light3"></div>

<div id="particles"></div>

<!-- =========================================================
MAIN
========================================================= -->

<div class="broadcast">

    <!-- TOP -->
    <div class="top-bar">

        <div class="left-top">

            <div class="teams">
                INDIA vs AUSTRALIA
            </div>

            <div class="match-info">
                ICC WORLD CUP 2026
            </div>

            <div class="overs">
                0.0 Overs
            </div>

        </div>

        <div class="center-score">

            <div class="score">
                0/0
            </div>

            <div class="live">
                LIVE
            </div>

        </div>

        <div class="right-top">

            <div class="stat">

                <div class="stat-label">
                    CRR
                </div>

                <div class="stat-value" id="crr">
                    0.00
                </div>

            </div>

            <div class="stat">

                <div class="stat-label">
                    PARTNERSHIP
                </div>

                <div class="stat-value" id="partnership">
                    0(0)
                </div>

            </div>

        </div>

    </div>

    <!-- MIDDLE -->
    <div class="middle">

        <div class="versus">

            <div class="team">

                <img
                class="team-logo"
                id="teamAFlag"
                src="/static/default_a.png">

                <div class="team-name" id="teamA">
                    TEAM A
                </div>

            </div>

            <div class="vs">
                VS
            </div>

            <div class="team">

                <img
                class="team-logo"
                id="teamBFlag"
                src="/static/default_b.png">

                <div class="team-name" id="teamB">
                    TEAM B
                </div>

            </div>

        </div>

        <!-- COMMENTARY -->
        <div class="commentary-wrap">

            <div class="commentary-box">

                <div class="commentary-head">

                    <div class="live-dot"></div>

                    <div class="commentary-label">
                        LIVE COMMENTARY
                    </div>

                </div>

                <div class="commentary" id="commentary">
                    Match Starting...
                </div>

            </div>

        </div>

        <!-- EVENT -->
        <div class="event-screen"></div>

        <!-- TIMELINE -->
        <div class="timeline"></div>

    </div>

    <!-- BOTTOM -->
    <div class="bottom">

        <div class="players">

            <!-- STRIKER -->
            <div class="player">

                <img id="strikerImg" src="/static/player.png">

                <div class="player-details">

                    <div class="player-role">
                        STRIKER
                    </div>

                    <div class="player-name" id="strikerName">
                        -
                    </div>

                    <div class="player-score" id="strikerScore">
                        0 (0)
                    </div>

                    <div class="player-extra">
                        Batting
                    </div>

                </div>

            </div>

            <!-- NON STRIKER -->
            <div class="player">

                <img id="nonStrikerImg" src="/static/player.png">

                <div class="player-details">

                    <div class="player-role">
                        NON STRIKER
                    </div>

                    <div class="player-name" id="nonStrikerName">
                        -
                    </div>

                    <div class="player-score" id="nonStrikerScore">
                        0 (0)
                    </div>

                    <div class="player-extra">
                        Batting
                    </div>

                </div>

            </div>

            <!-- BOWLER -->
            <div class="player">

                <img id="bowlerImg" src="/static/player.png">

                <div class="player-details">

                    <div class="player-role">
                        BOWLER
                    </div>

                    <div class="player-name" id="bowlerName">
                        -
                    </div>

                    <div class="player-score" id="bowlerScore">
                        0/0
                    </div>

                    <div class="player-extra">
                        Bowling
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- AUDIO -->
<audio id="crowdCheer" src="/static/crowd_cheer.mp3"></audio>
<audio id="crowdShock" src="/static/crowd_shock.mp3"></audio>

<script>

/* =========================================================
PARTICLES
========================================================= */

const particles =
document.getElementById("particles");

for(let i=0;i<80;i++){

    const p =
    document.createElement("div");

    p.className = "particle";

    p.style.left =
    Math.random()*100 + "%";

    p.style.animationDuration =
    (6 + Math.random()*10) + "s";

    p.style.animationDelay =
    Math.random()*5 + "s";

    particles.appendChild(p);

}

/* =========================================================
WEBSOCKET
========================================================= */

const ws =
new WebSocket("ws://127.0.0.1:8000/ws");

let lastEventTime = 0;

/* =========================================================
HELPERS
========================================================= */

function setText(selector,value){

    const el =
    document.querySelector(selector);

    if(el){

        el.innerText =
        value ?? "-";

    }

}

function setImage(selector,src){

    const el =
    document.querySelector(selector);

    if(el){

        el.src =
        src || "/static/player.png";

    }

}

function playSound(id){

    const audio =
    document.getElementById(id);

    if(!audio) return;

    audio.currentTime = 0;

    audio.play().catch(()=>{});

}

/* =========================================================
SHOW EVENT
========================================================= */

function showEvent(type){

    const screen =
    document.querySelector(".event-screen");

    let color = "#00e5ff";

    if(type === "SIX"){

        color = "#ffd84d";

        playSound("crowdCheer");

    }

    if(type === "WICKET"){

        color = "#ff1744";

        playSound("crowdShock");

    }

    screen.innerHTML = `

        <div
        class="event-popup"
        style="
            color:${color};
            text-shadow:
            0 0 30px ${color},
            0 0 90px ${color};
        ">
            ${type}!
        </div>

    `;

    setTimeout(()=>{

        screen.innerHTML = "";

    },2500);

}

/* =========================================================
TIMELINE
========================================================= */

function renderTimeline(overs){

    const timeline =
    document.querySelector(".timeline");

    timeline.innerHTML = "";

    if(!Array.isArray(overs))
        return;

    overs.slice(-5).forEach(over=>{

        let ballsHTML = "";

        (over.balls || []).forEach(ball=>{

            let bg = "#374151";

            if(ball == 4)
                bg = "#00c853";

            if(ball == 6)
                bg = "#ff9800";

            if(ball == "W")
                bg = "#ff1744";

            ballsHTML += `
                <div class="ball"
                style="background:${bg}">
                    ${ball}
                </div>
            `;

        });

        timeline.innerHTML += `

            <div class="timeline-card">

                <div class="timeline-head">

                    <div class="timeline-over">
                        ${over.over || ""}
                    </div>

                    <div class="timeline-total">
                        ${over.total || ""}
                    </div>

                </div>

                <div class="timeline-balls">
                    ${ballsHTML}
                </div>

            </div>

        `;

    });

}

/* =========================================================
DETECT EVENT
========================================================= */

function detectEvent(boxes){

    if(!boxes)
        return null;

    const text =
    boxes.join(" ").toUpperCase();

    if(
        text.includes("WICKET") ||
        text.includes("BOWLED")
    ){
        return "WICKET";
    }

    if(
        text.includes("SIX") ||
        text.includes(" 6 ")
    ){
        return "SIX";
    }

    if(
        text.includes("FOUR") ||
        text.includes(" 4 ")
    ){
        return "FOUR";
    }

    return null;

}

/* =========================================================
WEBSOCKET DATA
========================================================= */

ws.onmessage = (event)=>{

    try{

        const d =
        JSON.parse(event.data);

        console.log(d);

        const flags =
        d.flags || {};

        const livePlayers =
        d.live_players || {};

        const batsmen =
        livePlayers.batsmen || [];

        const bowler =
        livePlayers.bowler || null;

        /* TOP */

        setText(
            ".teams",
            `${flags.team_a_name || "TEAM A"} vs ${flags.team_b_name || "TEAM B"}`
        );

        setText(
            ".match-info",
            flags.match_info || "LIVE MATCH"
        );

        setText(
            ".overs",
            `${d.overs || "0.0"} Overs`
        );

        setText(
            ".score",
            d.score || "0/0"
        );

        setText(
            "#crr",
            d.crr || "0.00"
        );

        setText(
            "#partnership",
            d.partnership || "0(0)"
        );

        /* TEAMS */

        setText(
            "#teamA",
            flags.team_a_name || "TEAM A"
        );

        setText(
            "#teamB",
            flags.team_b_name || "TEAM B"
        );

        setImage(
            "#teamAFlag",
            flags.team_a_flag
        );

        setImage(
            "#teamBFlag",
            flags.team_b_flag
        );

        /* COMMENTARY */

        let commentary =
        "LIVE MATCH IN PROGRESS";

        if(d.commentary){

            commentary =
            d.commentary;

        }

        setText(
            "#commentary",
            commentary
        );

        /* STRIKER */

        if(batsmen[0]){

            setText(
                "#strikerName",
                batsmen[0].name
            );

            setText(
                "#strikerScore",
                `${batsmen[0].runs || 0} (${batsmen[0].balls || 0})`
            );

            setImage(
                "#strikerImg",
                batsmen[0].image
            );

        }

        /* NON STRIKER */

        if(batsmen[1]){

            setText(
                "#nonStrikerName",
                batsmen[1].name
            );

            setText(
                "#nonStrikerScore",
                `${batsmen[1].runs || 0} (${batsmen[1].balls || 0})`
            );

            setImage(
                "#nonStrikerImg",
                batsmen[1].image
            );

        }

        /* BOWLER */

        if(bowler){

            setText(
                "#bowlerName",
                bowler.name
            );

            setText(
                "#bowlerScore",
                `${bowler.wickets || 0}/${bowler.runs || 0}`
            );

            setImage(
                "#bowlerImg",
                bowler.image
            );

        }

        /* TIMELINE */

        renderTimeline(
            d.overs_timeline || []
        );

        /* EVENT */

        let eventType =
        d.event || null;

        if(!eventType){

            eventType =
            detectEvent(
                d.result_boxes || []
            );

        }

        const eventTime =
        d.event_time ||
        d.updated ||
        Date.now();

        if(
            eventType &&
            eventTime !== lastEventTime
        ){

            lastEventTime =
            eventTime;

            showEvent(
                eventType
            );

        }

    }
    catch(err){

        console.error(err);

    }

};

/* =========================================================
SOCKET STATUS
========================================================= */

ws.onopen = ()=>{

    console.log(
        "WEBSOCKET CONNECTED"
    );

};

ws.onclose = ()=>{

    console.log(
        "WEBSOCKET DISCONNECTED"
    );

};

ws.onerror = (err)=>{

    console.log(
        "SOCKET ERROR:",
        err
    );

};

</script>

</body>
</html>
