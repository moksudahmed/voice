<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Cinematic Cricket Broadcast</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cyan: #00e5ff;
            --yellow: #ffd84d;
            --green: #00ff88;
            --red: #ff1744;
            --purple: #9d4edd;
            --orange: #ff6d00;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: 'Poppins', sans-serif;
        }

        /* =========================================================
        BACKGROUND
        ========================================================= */

        .video-bg {
            position: fixed;
            inset: 0;
            z-index: -30;
        }

        .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(.35) contrast(1.1) saturate(1.2);
            transform: scale(1.08);
        }

        .video-overlay {
            position: fixed;
            inset: 0;
            z-index: -29;
            background: linear-gradient(to bottom, rgba(0, 0, 0, .35), rgba(0, 0, 0, .15), rgba(0, 0, 0, .85));
        }

        /* =========================================================
        LIGHTS
        ========================================================= */

        .light {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(140px);
            opacity: .28;
            z-index: -28;
            animation: lightMove 12s infinite alternate;
        }

        .light1 {
            background: #00e5ff;
            top: -120px;
            left: -120px;
        }

        .light2 {
            background: #ff0080;
            right: -120px;
            bottom: -120px;
        }

        .light3 {
            background: #ffd84d;
            top: 30%;
            left: 40%;
        }

        @keyframes lightMove {
            from { transform: translateY(0); }
            to { transform: translateY(50px); }
        }

        /* =========================================================
        PARTICLES
        ========================================================= */

        #particles {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -27;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #fff;
            opacity: .55;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            from { transform: translateY(100vh) scale(0); }
            to { transform: translateY(-10vh) scale(1); }
        }

        /* =========================================================
        RAIN EFFECT
        ========================================================= */

        .rain-container {
            position: fixed;
            inset: 0;
            z-index: 999999997;
            pointer-events: none;
            overflow: hidden;
        }

        .rain-drop {
            position: absolute;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(173, 216, 230, 0.5));
            width: 2px;
            height: 15px;
            border-radius: 0 0 2px 2px;
            animation: rainFall linear infinite;
            opacity: 0.7;
        }

        @keyframes rainFall {
            from { transform: translateY(-10vh) rotate(0deg); }
            to { transform: translateY(100vh) rotate(5deg); }
        }

        .rain-light .rain-drop { opacity: 0.3; animation-duration: 1.2s; }
        .rain-medium .rain-drop { opacity: 0.6; animation-duration: 0.9s; }
        .rain-heavy .rain-drop { opacity: 0.9; animation-duration: 0.6s; }

        .rain-overlay {
            position: fixed;
            inset: 0;
            z-index: 999999996;
            pointer-events: none;
            background: linear-gradient(180deg, 
                rgba(100, 150, 200, 0.1) 0%,
                rgba(100, 150, 200, 0.05) 50%,
                rgba(100, 150, 200, 0.15) 100%);
        }

        .rain-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 999999999;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            padding: 30px 60px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid var(--cyan);
            animation: rainMessagePulse 1.5s ease infinite;
            pointer-events: none;
            box-shadow: 0 0 50px rgba(0, 229, 255, 0.3);
        }

        .rain-message h2 {
            font-size: 56px;
            font-family: 'Orbitron', sans-serif;
            color: var(--cyan);
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }

        .rain-message p { font-size: 20px; color: #fff; }

        @keyframes rainMessagePulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
            50% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
        }

        .rain-message.hide { animation: rainMessageFadeOut 0.5s ease forwards; }

        @keyframes rainMessageFadeOut {
            to { opacity: 0; transform: translate(-50%, -50%) scale(0.9); visibility: hidden; }
        }

        /* =========================================================
        LAYOUT
        ========================================================= */

        .broadcast {
            width: 100%;
            height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: opacity .35s ease, transform .35s ease;
            position: relative;
            z-index: 1;
        }

        .broadcast.hide-ui { opacity: 0; transform: scale(1.05); pointer-events: none; }

        /* =========================================================
        TOP BAR
        ========================================================= */

        .top-bar {
            width: 100%;
            min-height: 140px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 40px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .left-top { display: flex; flex-direction: column; gap: 8px; }
        .teams { font-size: 36px; font-weight: 900; background: linear-gradient(135deg, #fff, var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
        .match-info { font-size: 14px; font-weight: 700; color: var(--cyan); letter-spacing: 2px; text-transform: uppercase; }
        
        .overs {
            font-size: 20px; font-weight: 700; display: inline-block; padding: 6px 18px; border-radius: 30px;
            width: fit-content; background: linear-gradient(135deg, rgba(0, 229, 255, 0.2), rgba(0, 150, 255, 0.2));
            color: #00e5ff; text-shadow: 0 0 12px rgba(0, 229, 255, 0.6);
            border: 1px solid rgba(0, 229, 255, 0.4); backdrop-filter: blur(8px);
            letter-spacing: 0.5px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: subtlePulse 2s ease infinite;
        }

        @keyframes subtlePulse {
            0%, 100% { box-shadow: 0 0 5px rgba(0, 229, 255, 0.3); }
            50% { box-shadow: 0 0 15px rgba(0, 229, 255, 0.6); }
        }

        .center-wrapper { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .center-score { display: flex; align-items: center; gap: 20px; }
        .score { font-size: 85px; font-weight: 900; font-family: 'Orbitron', sans-serif; background: linear-gradient(135deg, #fff, #ffe600, #ff9800); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 30px rgba(255, 230, 0, 0.3); }
        .live { padding: 12px 28px; border-radius: 50px; background: linear-gradient(135deg, #ff1744, #ff5d5d); font-size: 16px; font-weight: 900; letter-spacing: 2px; animation: pulse 1.5s ease infinite; box-shadow: 0 0 20px rgba(255, 23, 68, 0.5); }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        
        .target-box { padding: 8px 28px; border-radius: 50px; background: linear-gradient(135deg, rgba(255, 216, 77, 0.2), rgba(255, 152, 0, 0.1)); border: 1px solid rgba(255, 216, 77, 0.4); }
        #targetScore { color: var(--yellow); font-size: 24px; font-weight: 900; font-family: 'Orbitron', sans-serif; }
        .right-top { display: flex; gap: 20px; }
        
        .stat { min-width: 160px; padding: 15px 20px; border-radius: 28px; background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05)); text-align: center; transition: transform 0.3s ease; }
        .stat:hover { transform: translateY(-5px); background: linear-gradient(135deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08)); }
        .stat-label { font-size: 12px; letter-spacing: 2px; margin-bottom: 8px; color: #aaa; text-transform: uppercase; }
        .stat-value { font-size: 28px; font-weight: 900; color: var(--cyan); font-family: 'Orbitron', sans-serif; }

        /* =========================================================
        MIDDLE
        ========================================================= */

        .middle { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        .versus { position: absolute; bottom: 180px; display: flex; align-items: flex-start; gap: 350px; }
        .team { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .team-logo { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; border: 4px solid rgba(255, 255, 255, 0.3); box-shadow: 0 0 30px rgba(0, 229, 255, 0.3); transition: transform 0.3s ease; }
        .team-logo:hover { transform: scale(1.05); }
        .team-name { font-size: 32px; font-weight: 900; background: linear-gradient(135deg, #fff, #ccc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .vs { font-size: 72px; font-family: 'Orbitron', sans-serif; font-weight: 900; background: linear-gradient(135deg, var(--cyan), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px rgba(0, 229, 255, 0.3); }
        
        .commentary-wrap { position: absolute; bottom: 160px; width: 100%; display: flex; justify-content: center; z-index: 2; }
        .commentary-box { width: 38%; padding: 30px 40px; border-radius: 40px; background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05)); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); }
        .commentary-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .live-dot { width: 12px; height: 12px; border-radius: 50%; background: #ff1744; animation: blink 1s ease infinite; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .commentary-label { font-size: 13px; font-weight: 900; letter-spacing: 3px; color: var(--cyan); text-transform: uppercase; }
        .commentary { font-size: 28px; font-weight: 700; line-height: 1.4; color: #fff; }

        /* =========================================================
        BOTTOM
        ========================================================= */

        .bottom { width: 100%; min-height: 240px; padding: 20px; border-radius: 40px; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .players { display: flex; gap: 25px; }
        
        .player { flex: 1; position: relative; display: flex; align-items: center; gap: 20px; padding: 20px; border-radius: 32px; background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.03)); transition: all 0.3s ease; border: 1px solid rgba(255, 255, 255, 0.08); }
        .player:hover { transform: translateY(-5px); background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05)); border-color: rgba(0, 229, 255, 0.3); }
        
        .player.striker-active { border: 2px solid var(--green); box-shadow: 0 0 30px rgba(0, 255, 136, 0.4); background: linear-gradient(135deg, rgba(0, 255, 136, 0.15), rgba(0, 255, 136, 0.05)); animation: strikerGlow 2s ease infinite; }
        
        @keyframes strikerGlow { 0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); border-color: rgba(0, 255, 136, 0.6); } 50% { box-shadow: 0 0 50px rgba(0, 255, 136, 0.6); border-color: rgba(0, 255, 136, 1); } }
        
        .player.non-striker-active { border: 1px solid rgba(255, 216, 77, 0.3); background: linear-gradient(135deg, rgba(255, 216, 77, 0.08), rgba(255, 216, 77, 0.02)); }
        .player img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--cyan); box-shadow: 0 0 20px rgba(0, 229, 255, 0.3); transition: all 0.3s ease; }
        .striker-active img { border-color: var(--green); box-shadow: 0 0 30px rgba(0, 255, 136, 0.5); }
        .player-role { display: inline-block; padding: 5px 14px; border-radius: 20px; background: linear-gradient(135deg, var(--cyan), #0099cc); color: #000; font-size: 11px; font-weight: 900; margin-bottom: 10px; letter-spacing: 1px; }
        .striker-active .player-role { background: linear-gradient(135deg, var(--green), #00aa55); color: #000; }
        .player-name { font-size: 24px; font-weight: 800; margin-bottom: 5px; }
        .player-score { margin-top: 8px; font-size: 32px; font-weight: 900; font-family: 'Orbitron', sans-serif; color: var(--yellow); }
        
        .on-strike-ribbon { position: absolute; top: -12px; right: -12px; background: linear-gradient(135deg, var(--green), #00aa55); color: #000; padding: 6px 18px; border-radius: 30px; font-size: 11px; font-weight: 900; transform: rotate(12deg); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); z-index: 3; letter-spacing: 1px; animation: ribbonPulse 1.5s ease infinite; }
        
        @keyframes ribbonPulse { 0%, 100% { transform: rotate(12deg) scale(1); } 50% { transform: rotate(12deg) scale(1.05); } }
        
        .bat-emoji { font-size: 14px; margin-right: 5px; display: inline-block; animation: batSwing 2s ease infinite; }
        
        @keyframes batSwing { 0%, 100% { transform: rotate(-15deg); } 50% { transform: rotate(15deg); } }
        
        .batting-stats { display: flex; gap: 15px; margin-top: 8px; }
        .stat-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; background: rgba(0, 0, 0, 0.6); color: var(--cyan); letter-spacing: 0.5px; }
        .striker-active .stat-badge { color: var(--green); background: rgba(0, 255, 136, 0.2); }
        .bowler-card { border-color: rgba(255, 23, 68, 0.3) !important; }
        .bowler-card .player-role { background: linear-gradient(135deg, var(--red), #cc0000); }

        /* =========================================================
        TIMELINE
        ========================================================= */

        .timeline { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 94%; display: flex; gap: 15px; overflow-x: auto; z-index: 3; }
        .timeline::-webkit-scrollbar { display: none; }
        .timeline-card { min-width: 240px; padding: 20px; border-radius: 28px; background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05)); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .timeline-card:hover { transform: translateY(-5px); background: linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.08)); }
        .timeline-head { display: flex; justify-content: space-between; margin-bottom: 14px; font-weight: 800; }
        .timeline-over { color: var(--cyan); font-size: 14px; }
        .timeline-total { color: var(--yellow); font-size: 14px; }
        .timeline-balls { display: flex; flex-wrap: wrap; gap: 10px; }
        .ball { width: 42px; height: 42px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 14px; transition: transform 0.2s ease; }
        .ball:hover { transform: scale(1.1); }

        /* =========================================================
        FULLSCREEN EVENT SYSTEM
        ========================================================= */

        .event-screen {
            position: fixed;
            inset: 0;
            z-index: 999999999;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity .3s ease, visibility .3s ease;
        }

        .event-screen.active {
            opacity: 1;
            visibility: visible;
        }

        .event-screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(0, 0, 0, .15), rgba(0, 0, 0, .95));
            backdrop-filter: blur(10px);
        }

        .event-popup {
            position: relative;
            z-index: 5;
            font-size: 220px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            letter-spacing: 15px;
            opacity: 0;
            transform: scale(0.1);
            animation: eventAnim 1.2s ease forwards;
        }

        .event-popup.six { color: #ffd84d; text-shadow: 0 0 30px #ffd84d, 0 0 80px #ff9800, 0 0 160px #ff9800, 0 0 240px #ff9800; }
        .event-popup.four { color: #00ff88; text-shadow: 0 0 30px #00ff88, 0 0 80px #00c853, 0 0 160px #00c853, 0 0 240px #00c853; }
        .event-popup.wicket { color: #ff1744; text-shadow: 0 0 30px #ff1744, 0 0 80px #ff0000, 0 0 160px #ff0000, 0 0 240px #ff0000; }

        @keyframes eventAnim {
            0% { opacity: 0; transform: scale(0.1) rotate(-10deg); filter: blur(25px); }
            40% { opacity: 1; transform: scale(1.2) rotate(2deg); filter: blur(0); }
            70% { transform: scale(0.95) rotate(-1deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        .six-flash { position: fixed; inset: 0; z-index: 999999998; background: radial-gradient(circle, rgba(255, 216, 77, 0.95), rgba(255, 216, 77, 0.05)); animation: flashFade 0.7s ease-out forwards; pointer-events: none; }
        .four-flash { position: fixed; inset: 0; z-index: 999999998; background: radial-gradient(circle, rgba(0, 255, 136, 0.95), rgba(0, 255, 136, 0.05)); animation: flashFade 0.7s ease-out forwards; pointer-events: none; }
        .wicket-flash { position: fixed; inset: 0; z-index: 999999998; background: radial-gradient(circle, rgba(255, 23, 68, 0.95), rgba(255, 23, 68, 0.05)); animation: flashFade 0.7s ease-out forwards; pointer-events: none; }
        .shake { animation: shake 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97) 3; }

        @keyframes shake { 0% { transform: translate(0); } 25% { transform: translate(-6px, 6px); } 50% { transform: translate(6px, -6px); } 75% { transform: translate(-6px, 6px); } 100% { transform: translate(0); } }
        @keyframes flashFade { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>

<body>

    <div class="video-bg">
        <video autoplay muted loop playsinline>
           <source src="/static/stadium.mp4" type="video/mp4">
        </video>
    </div>

    <div class="video-overlay"></div>
    <div class="light light1"></div>
    <div class="light light2"></div>
    <div class="light light3"></div>
    <div id="particles"></div>

    <div class="rain-container"></div>
    <div class="rain-overlay"></div>

    <div class="broadcast">
        <div class="top-bar">
            <div class="left-top">
                <div class="teams" id="teams">INDIA vs AUSTRALIA</div>
                <div class="match-info" id="matchInfo">ICC WORLD CUP 2026</div>
                <div class="overs" id="overs">0.0 Overs</div>
            </div>

            <div class="center-wrapper">
                <div class="center-score">
                    <div class="score" id="score">0/0</div>
                    <div class="live">LIVE</div>
                </div>
                <div class="target-box">
                    <span id="targetScore">0/0</span>
                </div>
            </div>

            <div class="right-top">
                <div class="stat">
                    <div class="stat-label">CURRENT RUN RATE</div>
                    <div class="stat-value" id="crr">0.00</div>
                </div>
                <div class="stat">
                    <div class="stat-label">PARTNERSHIP</div>
                    <div class="stat-value" id="partnership">0(0)</div>
                </div>
            </div>
        </div>

        <div class="middle">
            <div class="versus">
                <div class="team">
                    <img class="team-logo" id="teamAFlag" src="/static/default_a.png">
                    <div class="team-name" id="teamA">TEAM A</div>
                </div>
                <div class="vs">VS</div>
                <div class="team">
                    <img class="team-logo" id="teamBFlag" src="/static/default_b.png">
                    <div class="team-name" id="teamB">TEAM B</div>
                </div>
            </div>

            <div class="commentary-wrap">
                <div class="commentary-box">
                    <div class="commentary-head">
                        <div class="live-dot"></div>
                        <div class="commentary-label">LIVE COMMENTARY</div>
                    </div>
                    <div class="commentary" id="commentary">Match Starting...</div>
                </div>
            </div>

            <div class="timeline" id="timeline"></div>
        </div>

        <div class="bottom">
            <div class="players">
                <div class="player striker-active" id="strikerCard">
                    <div class="on-strike-ribbon">🏏 ON STRIKE</div>
                    <img id="strikerImg" src="/static/player.png">
                    <div class="player-details">
                        <div class="player-role"><span class="bat-emoji">🏏</span> STRIKER</div>
                        <div class="player-name" id="strikerName">-</div>
                        <div class="player-score" id="strikerScore">0 (0)</div>
                        <div class="batting-stats">
                            <span class="stat-badge">🔥 SR: <span id="strikerSr">0</span></span>
                            <span class="stat-badge">🎯 4s: <span id="strikerFours">0</span></span>
                            <span class="stat-badge">💥 6s: <span id="strikerSixes">0</span></span>
                        </div>
                    </div>
                </div>

                <div class="player non-striker-active" id="nonStrikerCard">
                    <img id="nonStrikerImg" src="/static/player.png">
                    <div class="player-details">
                        <div class="player-role"><span class="bat-emoji">🔄</span> NON STRIKER</div>
                        <div class="player-name" id="nonStrikerName">-</div>
                        <div class="player-score" id="nonStrikerScore">0 (0)</div>
                        <div class="batting-stats">
                            <span class="stat-badge">🔥 SR: <span id="nonStrikerSr">0</span></span>
                            <span class="stat-badge">🎯 4s: <span id="nonStrikerFours">0</span></span>
                            <span class="stat-badge">💥 6s: <span id="nonStrikerSixes">0</span></span>
                        </div>
                    </div>
                </div>

                <div class="player bowler-card" id="bowlerCard">
                    <img id="bowlerImg" src="/static/player.png">
                    <div class="player-details">
                        <div class="player-role">🎯 BOWLER</div>
                        <div class="player-name" id="bowlerName">-</div>
                        <div class="player-score" id="bowlerScore">0/0</div>
                        <div class="batting-stats">
                            <span class="stat-badge">📊 ECO: <span id="bowlerEco">0.00</span></span>
                            <span class="stat-badge">✨ Wkts: <span id="bowlerWickets">0</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="event-screen"></div>

    <script>
        // =========================================================
        // WEB AUDIO API - AUTOMATIC PLAYBACK (NO BUTTON REQUIRED)
        // =========================================================
        
        let audioContext = null;
        let audioUnlocked = false;
        let pendingSounds = [];
        let unlockAttempts = 0;
        
        // Play cheer sound
        function playCheerSound() {
            if (!audioContext || !audioUnlocked) return false;
            
            try {
                const now = audioContext.currentTime;
                
                // Main cheer chord (C, E, G)
                const frequencies = [523.25, 659.25, 783.99];
                frequencies.forEach(freq => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.frequency.value = freq;
                    gain.gain.value = 0.25;
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, now + 1.2);
                    osc.stop(now + 1.2);
                });
                
                // Crowd noise effect
                const bufferSize = 4096;
                const noiseNode = audioContext.createScriptProcessor(bufferSize, 1, 1);
                noiseNode.onaudioprocess = function(e) {
                    const output = e.outputBuffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        output[i] = (Math.random() * 2 - 1) * 0.08;
                    }
                };
                const noiseGain = audioContext.createGain();
                noiseNode.connect(noiseGain);
                noiseGain.connect(audioContext.destination);
                noiseGain.gain.setValueAtTime(0.15, now);
                noiseGain.gain.exponentialRampToValueAtTime(0.00001, now + 0.8);
                
                setTimeout(() => {
                    if (noiseNode) noiseNode.disconnect();
                }, 800);
                
                console.log("🔊 Playing CHEER sound");
                return true;
            } catch(e) {
                console.log("Cheer sound error:", e);
                return false;
            }
        }
        
        // Play shock sound
        function playShockSound() {
            if (!audioContext || !audioUnlocked) return false;
            
            try {
                const now = audioContext.currentTime;
                
                // Dramatic descending sound
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(110, now + 0.4);
                gain.gain.setValueAtTime(0.35, now);
                gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.6);
                osc.start();
                osc.stop(now + 0.6);
                
                // Thud effect
                const thudOsc = audioContext.createOscillator();
                const thudGain = audioContext.createGain();
                thudOsc.connect(thudGain);
                thudGain.connect(audioContext.destination);
                thudOsc.frequency.value = 80;
                thudGain.gain.setValueAtTime(0.25, now + 0.1);
                thudGain.gain.exponentialRampToValueAtTime(0.00001, now + 0.4);
                thudOsc.start(now + 0.1);
                thudOsc.stop(now + 0.4);
                
                console.log("🔊 Playing SHOCK sound");
                return true;
            } catch(e) {
                console.log("Shock sound error:", e);
                return false;
            }
        }
        
        // Main play sound function
        function playSound(type) {
            if (!audioContext) {
                console.log("🔇 Audio context not initialized");
                return;
            }
            
            if (!audioUnlocked) {
                console.log(`🔇 Audio locked, queueing: ${type}`);
                pendingSounds.push(type);
                // Try to unlock again
                if (unlockAttempts < 5) {
                    setTimeout(() => unlockAudio(), 500);
                }
                return;
            }
            
            if (type === "crowdCheer") {
                playCheerSound();
            } else if (type === "crowdShock") {
                playShockSound();
            }
        }
        
        // Initialize and unlock audio automatically
        function unlockAudio() {
            if (audioUnlocked) return true;
            
            unlockAttempts++;
            console.log(`🎵 Attempt ${unlockAttempts} to initialize audio...`);
            
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                // Create and play silent buffer to unlock
                const buffer = audioContext.createBuffer(1, 1, 22050);
                const source = audioContext.createBufferSource();
                source.buffer = buffer;
                source.connect(audioContext.destination);
                source.start();
                
                audioContext.resume().then(() => {
                    audioUnlocked = true;
                    console.log("✅ Audio unlocked successfully!");
                    
                    // Play any pending sounds
                    pendingSounds.forEach(sound => {
                        playSound(sound);
                    });
                    pendingSounds = [];
                }).catch(e => {
                    console.log("Audio resume error:", e);
                    if (unlockAttempts < 5) {
                        setTimeout(() => unlockAudio(), 1000);
                    }
                });
                
                return true;
            } catch(e) {
                console.log("Audio init error:", e);
                if (unlockAttempts < 5) {
                    setTimeout(() => unlockAudio(), 1000);
                }
                return false;
            }
        }
        
        // Auto unlock on page load
        document.addEventListener('DOMContentLoaded', () => {
            console.log("🎬 Page loaded, initializing audio...");
            // Slight delay to ensure page is ready
            setTimeout(() => unlockAudio(), 100);
        });
        
        // Also try on user interaction as fallback (any click/tap)
        document.body.addEventListener('click', function onClick() {
            if (!audioUnlocked) {
                console.log("🖱️ User interaction detected, unlocking audio...");
                unlockAudio();
            }
        });
        
        console.log("🎬 Cricket Broadcast Ready - Audio will initialize automatically");

        // PARTICLES SYSTEM
        const particlesContainer = document.getElementById("particles");

        function createParticles(count = 80) {
            if (!particlesContainer) return;
            for (let i = 0; i < count; i++) {
                const p = document.createElement("div");
                p.className = "particle";
                p.style.left = Math.random() * 100 + "%";
                p.style.animationDuration = (6 + Math.random() * 10) + "s";
                p.style.animationDelay = Math.random() * 5 + "s";
                particlesContainer.appendChild(p);
            }
        }
        createParticles();

        // RAIN ANIMATION SYSTEM
        let rainInterval = null;
        let isRaining = false;
        let currentRainIntensity = null;
        let rainTimeout = null;
        
        function createRainDrop(intensity = "medium") {
            const rainContainer = document.querySelector(".rain-container");
            if (!rainContainer) return;
            
            const drop = document.createElement("div");
            drop.className = "rain-drop";
            drop.style.left = Math.random() * 100 + "%";
            
            const height = 10 + Math.random() * 15;
            const width = 1 + Math.random() * 2;
            drop.style.height = height + "px";
            drop.style.width = width + "px";
            
            let duration;
            switch(intensity) {
                case "light": duration = 1.0 + Math.random() * 0.5; break;
                case "heavy": duration = 0.4 + Math.random() * 0.3; break;
                default: duration = 0.6 + Math.random() * 0.4;
            }
            drop.style.animationDuration = duration + "s";
            drop.style.animationDelay = Math.random() * 0.5 + "s";
            
            rainContainer.appendChild(drop);
            
            setTimeout(() => {
                if (drop && drop.remove) drop.remove();
            }, duration * 1000);
        }
        
        function startRain(intensity = "medium", duration = 30000) {
            if (isRaining) return;
            
            console.log(`🌧️ Starting rain animation with intensity: ${intensity}`);
            
            const rainContainer = document.querySelector(".rain-container");
            const rainOverlay = document.querySelector(".rain-overlay");
            if (!rainContainer) return;
            
            isRaining = true;
            currentRainIntensity = intensity;
            rainContainer.classList.add(`rain-${intensity}`);
            
            let overlayOpacity = intensity === "light" ? 0.08 : (intensity === "heavy" ? 0.25 : 0.15);
            rainOverlay.style.background = `linear-gradient(180deg, 
                rgba(100, 150, 200, ${overlayOpacity}) 0%,
                rgba(100, 150, 200, ${overlayOpacity * 0.5}) 50%,
                rgba(100, 150, 200, ${overlayOpacity * 1.5}) 100%)`;
            
            let dropCount = 0;
            const maxDrops = intensity === "light" ? 80 : (intensity === "heavy" ? 250 : 150);
            const dropsPerFrame = intensity === "light" ? 2 : (intensity === "heavy" ? 8 : 5);
            
            rainInterval = setInterval(() => {
                if (!isRaining) return;
                for (let i = 0; i < dropsPerFrame; i++) {
                    if (dropCount < maxDrops) {
                        createRainDrop(intensity);
                        dropCount++;
                    }
                }
                if (dropCount >= maxDrops) dropCount = Math.floor(maxDrops * 0.7);
            }, 50);
            
            showRainMessage(intensity);
            
            if (rainTimeout) clearTimeout(rainTimeout);
            rainTimeout = setTimeout(() => stopRain(), duration);
        }
        
        function stopRain() {
            if (!isRaining) return;
            
            console.log("☀️ Stopping rain animation");
            
            if (rainInterval) clearInterval(rainInterval);
            if (rainTimeout) clearTimeout(rainTimeout);
            
            isRaining = false;
            
            const rainContainer = document.querySelector(".rain-container");
            if (rainContainer) {
                while (rainContainer.firstChild) rainContainer.removeChild(rainContainer.firstChild);
                rainContainer.classList.remove("rain-light", "rain-medium", "rain-heavy");
            }
            
            hideRainMessage();
        }
        
        function showRainMessage(intensity) {
            hideRainMessage();
            const message = document.createElement("div");
            message.className = "rain-message";
            let intensityText = "", description = "";
            switch(intensity) {
                case "light": intensityText = "LIGHT RAIN"; description = "Play continues..."; break;
                case "heavy": intensityText = "HEAVY RAIN"; description = "Players heading off the field"; break;
                default: intensityText = "RAIN INTERRUPTION"; description = "Covers coming on";
            }
            message.innerHTML = `<h2>🌧️ ${intensityText}</h2><p>${description}</p>`;
            document.body.appendChild(message);
            setTimeout(() => {
                if (message) {
                    message.classList.add("hide");
                    setTimeout(() => message.remove(), 500);
                }
            }, 5000);
        }
        
        function hideRainMessage() {
            const msg = document.querySelector(".rain-message");
            if (msg) { 
                msg.classList.add("hide"); 
                setTimeout(() => msg.remove(), 500); 
            }
        }

        // RAIN WORD DETECTION
        function detectAndStartRain(text) {
            if (!text || typeof text !== 'string') return false;
            
            const rainKeywords = [
                'rain', 'raining', 'rainfall', 'rainy', 'downpour',
                'shower', 'showering', 'wet weather', 'rain delay',
                'drizzle', 'storm', 'thunderstorm', 'match stopped due to rain'
            ];
            
            const lowerText = text.toLowerCase();
            const hasRain = rainKeywords.some(keyword => lowerText.includes(keyword));
            
            if (hasRain) {
                console.log(`🌧️ RAIN DETECTED: "${text}"`);
                let intensity = "medium";
                if (lowerText.includes('heavy') || lowerText.includes('downpour')) intensity = "heavy";
                else if (lowerText.includes('light') || lowerText.includes('drizzle')) intensity = "light";
                startRain(intensity, 30000);
                return true;
            }
            
            const stopKeywords = ['rain stopped', 'rain has stopped', 'cleared up'];
            const hasStop = stopKeywords.some(keyword => lowerText.includes(keyword));
            if (hasStop && isRaining) {
                console.log(`☀️ RAIN STOPPING: "${text}"`);
                stopRain();
                return true;
            }
            
            return false;
        }

        // WEBSOCKET CONNECTION
        const ws = new WebSocket("ws://127.0.0.1:8000/ws");
        let lastEventTime = 0;
        let lastRainDetectionTime = 0;

        // HELPER FUNCTIONS
        function setText(selector, value) {
            const el = document.querySelector(selector);
            if (el) el.innerText = value ?? "-";
        }

        function setImage(selector, src, fallback = "/static/player.png") {
            const el = document.querySelector(selector);
            if (el) el.src = src || fallback;
        }

        function updateStrikerStats(player) {
            if (player) {
                setText("#strikerSr", player.strike_rate || player.sr || "0");
                setText("#strikerFours", player.fours || "0");
                setText("#strikerSixes", player.sixes || "0");
            }
        }

        function updateNonStrikerStats(player) {
            if (player) {
                setText("#nonStrikerSr", player.strike_rate || player.sr || "0");
                setText("#nonStrikerFours", player.fours || "0");
                setText("#nonStrikerSixes", player.sixes || "0");
            }
        }

        function updateBowlerStats(bowler) {
            if (bowler) {
                setText("#bowlerEco", bowler.economy || bowler.eco || "0.00");
                setText("#bowlerWickets", bowler.wickets || "0");
            }
        }

        // EVENT ENGINE
        let isEventRunning = false;

        function hideScoreboard() {
            document.querySelector(".broadcast")?.classList.add("hide-ui");
        }

        function showScoreboard() {
            document.querySelector(".broadcast")?.classList.remove("hide-ui");
        }

        function clearEvent() {
            const screen = document.querySelector(".event-screen");
            if (!screen) return;
            screen.innerHTML = "";
            screen.classList.remove("active");
            document.querySelectorAll('.four-flash, .six-flash, .wicket-flash').forEach(flash => flash.remove());
            document.body.classList.remove("shake");
            showScoreboard();
            isEventRunning = false;
        }

        function runEvent(type) {
            if (isEventRunning) return;
            isEventRunning = true;
            const screen = document.querySelector(".event-screen");
            if (!screen) return;
            
            screen.innerHTML = "";
            screen.classList.add("active");

            let className = "", sound = "", flashClass = "";

            switch(type) {
                case "FOUR": className = "four"; sound = "crowdCheer"; flashClass = "four-flash"; break;
                case "SIX": className = "six"; sound = "crowdCheer"; flashClass = "six-flash"; break;
                case "WICKET": className = "wicket"; sound = "crowdShock"; flashClass = "wicket-flash"; document.body.classList.add("shake"); break;
                default: isEventRunning = false; return;
            }

            const flash = document.createElement("div");
            flash.className = flashClass;
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 700);
            if (type === "WICKET") setTimeout(() => document.body.classList.remove("shake"), 700);

            const eventPopup = document.createElement("div");
            eventPopup.className = `event-popup ${className}`;
            eventPopup.innerText = type;
            screen.appendChild(eventPopup);

            requestAnimationFrame(() => { requestAnimationFrame(() => hideScoreboard()); });
            playSound(sound);
            setTimeout(() => clearEvent(), 2500);
        }

         function speak(text = "") {

                if (!text) {
                    console.log("No text provided for speech");
                    return;
                }

                speechSynthesis.cancel();

                const msg = new SpeechSynthesisUtterance(text);

                msg.lang = "bn-BD";
                msg.rate = 1.05;
                msg.pitch = 1.1;
                msg.volume = 1;

                speechSynthesis.speak(msg);
            }
        function showEvent(type) { if (type) runEvent(type); }

        // TIMELINE RENDERER
        function renderTimeline(overs = []) {
            const timeline = document.querySelector(".timeline");
            if (!timeline) return;
            timeline.innerHTML = "";
            overs.slice(-5).forEach(over => {
                let ballsHTML = "";
                (over.balls || []).forEach(ball => {
                    let bg = "#374151", textColor = "#fff";
                    if (ball == 4) { bg = "#00ff88"; textColor = "#000"; }
                    else if (ball == 6) { bg = "#ffd84d"; textColor = "#000"; }
                    else if (ball === "W") { bg = "#ff1744"; textColor = "#fff"; }
                    ballsHTML += `<div class="ball" style="background: ${bg}; color: ${textColor}">${ball}</div>`;
                });
                timeline.innerHTML += `<div class="timeline-card"><div class="timeline-head"><div class="timeline-over">${over.over || ""}</div><div class="timeline-total">${over.total || ""}</div></div><div class="timeline-balls">${ballsHTML}</div></div>`;
            });
        }

        // WEBSOCKET MESSAGE HANDLER
        ws.onmessage = (msg) => {
            try {
                const d = JSON.parse(msg.data);
                const flags = d.flags || {};
                const livePlayers = d.live_players || {};
                const batsmen = livePlayers.batsmen || [];
                const bowler = livePlayers.bowler || null;
                
                console.log("📡 Received:", d.batting);
                console.log("📡 Received:", d);
                
                // Rain detection
                if (d.commentary) {
                    const currentTime = Date.now();
                    if (currentTime - lastRainDetectionTime > 5000) {
                        if (detectAndStartRain(d.commentary)) {
                            lastRainDetectionTime = currentTime;
                        }
                    }
                }
                
                // Update UI
                setText("#teams", `${flags.team_a_name || "TEAM A"} vs ${flags.team_b_name || "TEAM B"}`);
                setText("#matchInfo", flags.match_info || "LIVE MATCH");
                setText("#overs", `${d.overs || "0.0"} Overs`);
                setText("#score", d.score || "0/0");
                setText("#crr", d.crr || "0.00");
                setText("#targetScore", d.target || "0/0");
                setText("#partnership", d.partnership || "0(0)");
                setText("#teamA", flags.team_a_name || "TEAM A");
                setText("#teamB", flags.team_b_name || "TEAM B");
                setImage("#teamAFlag", flags.team_a_flag);
                setImage("#teamBFlag", flags.team_b_flag);
                setText("#commentary", d.result_boxes || "LIVE MATCH");
                
                const teamName = d.batting.split(" ")[0];
                if (teamName != flags.team_a_name){                    
                    fielding=flags.team_a_name                  
                    setText("#teamA", flags.team_b_name || "TEAM B");
                    setText("#teamB", flags.team_a_name || "TEAM A");
                    setImage("#teamAFlag", flags.team_b_flag);
                    setImage("#teamBFlag", flags.team_a_flag);
                }

                if (batsmen[0]) {
                    setText("#strikerName", batsmen[0].name);
                    setText("#strikerScore", `${batsmen[0].runs || 0} (${batsmen[0].balls || 0})`);
                    setImage("#strikerImg", batsmen[0].image);
                    updateStrikerStats(batsmen[0]);
                }
                
                if (batsmen[1]) {
                    setText("#nonStrikerName", batsmen[1].name);
                    setText("#nonStrikerScore", `${batsmen[1].runs || 0} (${batsmen[1].balls || 0})`);
                    setImage("#nonStrikerImg", batsmen[1].image);
                    updateNonStrikerStats(batsmen[1]);
                }
                
                if (bowler) {
                    setText("#bowlerName", bowler.name);
                    setText("#bowlerScore", bowler.figures || `${bowler.runs_conceded || 0}/${bowler.wickets || 0}`);
                    setImage("#bowlerImg", bowler.image);
                    updateBowlerStats(bowler);
                }

                renderTimeline(d.overs_timeline || []);
                              
               speak("হ্যালো বাংলাদেশ"); 
                // ✅ SAFE
                if (d.commentary) {
                    speak(d.commentary);
                }
                // Event detection
                let eventType = d.event || null;
                
                if (d.result_boxes && !eventType) {
                    const boxValue = String(d.result_boxes).toUpperCase();
                    
                    if (boxValue === "4" || boxValue === "FOUR") {
                        eventType = "FOUR";
                        console.log("🎯 DETECTED: FOUR");
                    } else if (boxValue === "6" || boxValue === "SIX") {
                        eventType = "SIX";
                        console.log("🎯 DETECTED: SIX");
                    } else if (boxValue === "W" || boxValue === "WICKET" || boxValue === "OUT" || boxValue === "BOWLED" || boxValue === "CAUGHT" || boxValue === "RUN OUT") {
                        eventType = "WICKET";
                        console.log("🎯 DETECTED: WICKET");
                    }
                }
                
                const eventTime = d.event_time || Date.now();
                
                if (eventType && eventTime !== lastEventTime) {
                    lastEventTime = eventTime;
                    console.log("🚀 TRIGGERING EVENT:", eventType);
                    showEvent(eventType);
                }
                
            } catch (err) {
                console.error("WS ERROR:", err);
            }
        };

        ws.onopen = () => console.log("✅ WEBSOCKET CONNECTED");
        ws.onclose = () => console.log("❌ WEBSOCKET DISCONNECTED");
        ws.onerror = (e) => console.log("⚠️ SOCKET ERROR:", e);
    </script>

</body>
