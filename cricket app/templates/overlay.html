<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Live Cricket Overlay</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: transparent;
  overflow: hidden;
}

/* =========================
   MAIN CONTAINER
========================= */
.broadcast-container {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #0a1520, #1a1f2e);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* =========================
   TOP BAR
========================= */
.top-scorebar {
  background: linear-gradient(135deg, #1a1f2e, #0f1119);
  border-bottom: 2px solid #00f0ff;
  padding: 14px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.team-name {
  font-size: 2rem;
  font-weight: 800;
  color: #fff;
}

.score {
  font-size: 3rem;
  font-weight: 900;
  color: #ffd966;
  font-family: monospace;
}

.meta {
  font-size: 1rem;
  color: #ccc;
}

.live {
  background: #00f0ff;
  color: #000;
  padding: 6px 16px;
  border-radius: 20px;
  font-weight: bold;
  animation: blink 1.2s infinite;
}

@keyframes blink {
  50% { opacity: 0.5; }
}

/* =========================
   BOTTOM PANEL
========================= */
.bottom-panel {
  background: rgba(0,0,0,0.6);
  border-top: 2px solid #00f0ff;
  padding: 18px 28px;
  color: #fff;
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-between;
  margin-bottom: 12px;
}

.crr, .partnership {
  font-size: 1rem;
}

.highlight {
  color: #00f0ff;
  font-weight: bold;
}

/* BATTERS */
.batters {
  display: flex;
  gap: 30px;
  margin-bottom: 10px;
}

.batter {
  background: rgba(255,255,255,0.05);
  padding: 10px 16px;
  border-radius: 10px;
}

.batter strong {
  color: #fff;
  font-size: 1.1rem;
}

.runs {
  color: #ffd966;
  font-weight: bold;
}

/* BOWLER */
.bowler {
  display: flex;
  justify-content: space-between;
  background: rgba(255,255,255,0.05);
  padding: 8px 16px;
  border-radius: 10px;
  margin-top: 10px;
}

.bowler-name {
  font-weight: bold;
}

.fig {
  color: #00f0ff;
  font-family: monospace;
}
</style>
</head>

<body>

<div class="broadcast-container">

  <!-- TOP -->
  <div class="top-scorebar">
    <div>
      <div class="team-name" id="team">TEAM A</div>
      <div class="meta" id="overs">0.0 Overs</div>
    </div>

    <div class="score" id="score">0/0</div>

    <div class="live">LIVE</div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom-panel">

    <!-- STATS -->
    <div class="stats">
      <div class="crr">CRR: <span class="highlight" id="crr">0.00</span></div>
      <div class="partnership">Partnership: <span class="highlight" id="partnership">0 (0)</span></div>
    </div>

    <!-- BATTERS -->
    <div class="batters">
      <div class="batter">
        <strong id="striker">Striker</strong><br>
        <span class="runs" id="s_runs">0 (0)</span>
      </div>

      <div class="batter">
        <strong id="non_striker">Non Striker</strong><br>
        <span class="runs" id="ns_runs">0 (0)</span>
      </div>
    </div>

    <!-- BOWLER -->
    <div class="bowler">
      <div class="bowler-name" id="bowler">Bowler</div>
      <div class="fig" id="bowler_fig">0-0 (0)</div>
    </div>

  </div>

</div>

<script>
const ws = new WebSocket("ws://127.0.0.1:8000/ws");

ws.onmessage = (e) => {
  const d = JSON.parse(e.data);

  // TOP
  document.getElementById("team").innerText =
    (d.team1 || "TEAM A") + " vs " + (d.team2 || "TEAM B");

  document.getElementById("score").innerText = d.score || "0/0";
  document.getElementById("overs").innerText = (d.overs || "0.0") + " Overs";

  // STATS
  document.getElementById("crr").innerText = d.crr || "0.00";
  document.getElementById("partnership").innerText = d.partnership || "0 (0)";

  // BATTERS
  document.getElementById("striker").innerText = d.striker || "-";
  document.getElementById("s_runs").innerText =
    (d.striker_runs || 0) + " (" + (d.striker_balls || 0) + ")";

  document.getElementById("non_striker").innerText = d.non_striker || "-";
  document.getElementById("ns_runs").innerText =
    (d.non_striker_runs || 0) + " (" + (d.non_striker_balls || 0) + ")";

  // BOWLER
  document.getElementById("bowler").innerText = d.bowler || "-";
  document.getElementById("bowler_fig").innerText = d.bowler_fig || "0-0 (0)";
};
</script>

</body>
</html>
