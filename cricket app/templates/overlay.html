<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Cricket Scoreboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#000;overflow:hidden;}

.broadcast-container{
  width:100%;height:100vh;
  display:flex;flex-direction:column;
  justify-content:space-between;
}

/* TOP */
.top{
  background:linear-gradient(135deg,#1a1f2e,#0f1119);
  border-bottom:2px solid #00f0ff;
  padding:12px 30px;
  display:flex;justify-content:space-between;align-items:center;
}

.team{font-size:26px;font-weight:800;color:#fff;}
.score{font-size:48px;color:#ffd966;font-family:monospace;}
.meta{color:#ccc;}

.live{
  background:#00f0ff;
  padding:6px 14px;
  border-radius:20px;
  font-weight:bold;
}

/* MIDDLE */
.middle{
  flex:1;position:relative;
  display:flex;align-items:center;justify-content:center;
}

.bg-img{
  position:absolute;width:100%;height:100%;
  object-fit:cover;z-index:0;
}

.middle::after{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(to bottom,
    rgba(0,0,0,0.75),
    rgba(0,0,0,0.2),
    rgba(0,0,0,0.75)
  );
  z-index:1;
}

/* TEAM */
.vs-container{
  position:absolute;z-index:2;
  display:flex;align-items:center;gap:80px;
}

.team-box{
  display:flex;flex-direction:column;
  align-items:center;gap:10px;
}

.team-flag{
  width:95px;height:95px;border-radius:50%;
  object-fit:cover;border:3px solid #00f0ff;
  background:#111;
}

.team-label{color:#fff;font-size:22px;font-weight:800;}

.vs-text{font-size:42px;font-weight:900;color:#ffd966;}

.center-text{
  position:absolute;bottom:40px;z-index:3;
  color:#fff;font-size:22px;
  background:rgba(0,0,0,0.6);
  padding:10px 20px;border-radius:10px;
}

/* BOTTOM */
.bottom{
  background:rgba(15,17,25,0.95);
  border-top:2px solid #00f0ff;
  padding:20px;color:#fff;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.stats{
  display:flex;gap:25px;
  background:rgba(0,0,0,0.4);
  padding:8px 20px;border-radius:40px;
}

.highlight{color:#00f0ff;font-weight:bold;}

.batters{display:flex;gap:40px;}

.batter{
  display:flex;gap:10px;align-items:center;
}

.player-img{
  width:45px;height:45px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #00f0ff;
}

.name{font-weight:bold;}
.runs{color:#ffd966;font-family:monospace;}

.bowler{
  background:rgba(0,0,0,0.4);
  padding:8px 20px;
  border-radius:40px;
  display:flex;
  align-items:center;
  gap:10px;
}

.status{
  margin-top:10px;
  font-size:14px;
  color:#00f0ff;
}

</style>
</head>

<body>

<div class="broadcast-container">

<!-- TOP -->
<div class="top">
  <div>
    <div class="team" id="teams">TEAM A vs TEAM B</div>
    <div class="meta" id="overs">0.0 Overs</div>
  </div>

  <div class="score" id="score">0/0</div>
  <div class="live">LIVE</div>
</div>

<!-- MIDDLE -->
<div class="middle">

<img id="bg" class="bg-img" src="/static/stadium.jpg">

<div class="vs-container">
  <div class="team-box">
    <img id="flag_a" class="team-flag">
    <div id="team_a_mid" class="team-label">TEAM A</div>
  </div>

  <div class="vs-text">VS</div>

  <div class="team-box">
    <img id="flag_b" class="team-flag">
    <div id="team_b_mid" class="team-label">TEAM B</div>
  </div>
</div>

<div class="center-text" id="commentary">Live Match Starting...</div>

</div>

<!-- BOTTOM -->
<div class="bottom">

<div class="row">
  <div class="stats">
    <span>CRR: <span class="highlight" id="crr">0.00</span></span>
    <span>P'SHIP: <span class="highlight" id="partnership">0 (0)</span></span>
  </div>
</div>

<div class="row">

  <!-- STRIKER -->
  <div class="batter">
    <img id="striker_img" class="player-img">
    <div>
      <div class="name" id="striker">-</div>
      <div class="runs" id="s_runs">0 (0)</div>
    </div>
  </div>

  <!-- NON STRIKER -->
  <div class="batter">
    <img id="non_striker_img" class="player-img">
    <div>
      <div class="name" id="non_striker">-</div>
      <div class="runs" id="ns_runs">0 (0)</div>
    </div>
  </div>

  <!-- BOWLER -->
  <div class="bowler">
    <img id="bowler_img" class="player-img">
    <div>
      <span id="bowler">-</span> |
      <span id="bowler_fig">0-0 (0)</span>
    </div>
  </div>

</div>

<div class="status" id="status">Match Starting...</div>

</div>

</div>

<script>

function setText(id, val){
  const el = document.getElementById(id);
  if(el) el.innerText = val ?? "-";
}

function setImg(id, src){
  const el = document.getElementById(id);
  if(el) el.src = src || "/static/player.png";
}

const ws = new WebSocket("ws://127.0.0.1:8000/ws");

ws.onmessage = (e)=>{
  const d = JSON.parse(e.data);

  // TEAM INFO
  setText("teams", `${d.team_a} vs ${d.team_b}`);
  setText("score", d.score);
  setText("overs", d.overs + " Overs");

  setText("team_a_mid", d.team_a);
  setText("team_b_mid", d.team_b);

  setText("crr", d.crr);
  setText("partnership", d.partnership);

  // =========================
  // LIVE PLAYERS
  // =========================
  const batsmen = d.live_players?.batsmen || [];
  const bowler = d.live_players?.bowler;

  // STRIKER
  if(batsmen[0]){
    setText("striker", batsmen[0].name);
    setText("s_runs", `${batsmen[0].runs} (${batsmen[0].balls})`);
    setImg("striker_img", batsmen[0].image);
  }

  // NON STRIKER
  if(batsmen[1]){
    setText("non_striker", batsmen[1].name);
    setText("ns_runs", `${batsmen[1].runs} (${batsmen[1].balls})`);
    setImg("non_striker_img", batsmen[1].image);
  }

  // BOWLER
  if(bowler){
    setText("bowler", bowler.name);
    setText("bowler_fig", `${bowler.runs} (${bowler.balls})`);
    setImg("bowler_img", bowler.image);
  }

  setText("status", d.status);
  setText("commentary", d.commentary);
};

</script>

</body>
</html>
