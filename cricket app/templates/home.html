<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>🏏 Cricket AI Broadcast Dashboard</title>

<link
  href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap"
  rel="stylesheet"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#08111f;
  --panel:#111a2e;
  --panel2:#16233b;
  --cyan:#00eaff;
  --green:#00ff99;
  --red:#ff3b3b;
  --text:#ffffff;
  --muted:#94a3b8;
  --gold:#ffd84d;
}

body{
  background:
    radial-gradient(circle at top,#102040 0%,#08111f 60%);
  color:var(--text);
  font-family:'Segoe UI',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* =====================================================
HEADER
===================================================== */

.header{
  height:82px;

  padding:0 28px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  background:rgba(10,18,35,.92);

  border-bottom:2px solid rgba(0,234,255,.25);

  backdrop-filter:blur(12px);

  position:sticky;
  top:0;
  z-index:999;
}

.title-wrap{
  display:flex;
  flex-direction:column;
  gap:3px;
}

.title{
  font-size:28px;
  font-weight:900;
  letter-spacing:.5px;
}

.subtitle{
  color:var(--muted);
  font-size:13px;
}

.live-system{
  display:flex;
  align-items:center;
  gap:10px;
}

.live-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:#ff0033;

  box-shadow:
    0 0 12px #ff0033,
    0 0 24px #ff0033;

  animation:pulse 1s infinite;
}

@keyframes pulse{

  0%,100%{
    transform:scale(1);
    opacity:1;
  }

  50%{
    transform:scale(.7);
    opacity:.4;
  }

}

.badge{
  background:linear-gradient(
    135deg,
    var(--cyan),
    #00bfff
  );

  color:#000;

  padding:8px 16px;

  border-radius:50px;

  font-size:13px;
  font-weight:900;
}

/* =====================================================
LAYOUT
===================================================== */

.container{
  display:grid;
  grid-template-columns:340px 1fr;
  gap:20px;

  padding:20px;
}

/* =====================================================
LEFT PANEL
===================================================== */

.panel{
  background:rgba(17,26,46,.96);

  border-radius:22px;

  border:1px solid rgba(255,255,255,.06);

  padding:22px;

  height:fit-content;

  box-shadow:
    0 10px 40px rgba(0,0,0,.35);
}

.panel h3{
  color:var(--cyan);
  margin-bottom:18px;
  font-size:20px;
}

.label{
  margin-bottom:10px;
  color:#cbd5e1;
  font-size:13px;
}

.input-box{
  margin-bottom:16px;
}

input{
  width:100%;

  padding:15px 16px;

  border:none;
  outline:none;

  border-radius:14px;

  background:#1b2944;

  color:white;

  font-size:15px;

  border:1px solid transparent;

  transition:.25s;
}

input:focus{
  border-color:var(--cyan);

  box-shadow:
    0 0 0 3px rgba(0,234,255,.15);
}

button{
  width:100%;

  border:none;

  padding:15px;

  border-radius:14px;

  font-size:15px;
  font-weight:900;

  cursor:pointer;

  margin-bottom:12px;

  transition:.25s;
}

button:hover{
  transform:translateY(-2px);
}

.start-btn{
  background:
    linear-gradient(
      135deg,
      var(--cyan),
      #00a2ff
    );

  color:#000;
}

.stop-btn{
  background:
    linear-gradient(
      135deg,
      #ff3b3b,
      #ff1744
    );

  color:white;
}

.overlay-btn{
  background:
    linear-gradient(
      135deg,
      #22c55e,
      #16a34a
    );

  color:white;
}

.status-box{
  margin-top:15px;

  padding:14px;

  border-radius:14px;

  background:#0f172a;

  border:1px solid rgba(255,255,255,.06);
}

.status-title{
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
}

#msg{
  font-size:14px;
  color:var(--cyan);
  line-height:1.5;
}

/* =====================================================
RIGHT
===================================================== */

.right-top{
  display:flex;
  align-items:center;
  justify-content:space-between;

  margin-bottom:18px;
}

.right-title{
  font-size:24px;
  font-weight:900;
}

.match-count{
  color:var(--muted);
}

.match-count b{
  color:var(--gold);
}

/* =====================================================
GRID
===================================================== */

.grid{
  display:grid;

  grid-template-columns:
    repeat(auto-fill,minmax(320px,1fr));

  gap:18px;
}

/* =====================================================
CARD
===================================================== */

.card{
  background:
    linear-gradient(
      180deg,
      rgba(17,26,46,.96),
      rgba(15,23,42,.96)
    );

  border-radius:22px;

  padding:18px;

  border:1px solid rgba(255,255,255,.06);

  border-left:4px solid var(--cyan);

  cursor:pointer;

  transition:.25s;

  position:relative;

  overflow:hidden;
}

.card:hover{
  transform:translateY(-4px);

  box-shadow:
    0 10px 35px rgba(0,234,255,.12);
}

.card.active{

  border-left:4px solid #ff1744;

  box-shadow:
    0 0 25px rgba(255,23,68,.35);
}

.card::before{
  content:"";

  position:absolute;
  inset:0;

  background:
    linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,.04),
      transparent
    );

  transform:translateX(-100%);

  animation:shine 5s linear infinite;
}

@keyframes shine{

  from{
    transform:translateX(-100%);
  }

  to{
    transform:translateX(100%);
  }

}

.card-top{
  display:flex;
  align-items:center;
  justify-content:space-between;

  margin-bottom:14px;
}

.live-badge{
  display:flex;
  align-items:center;
  gap:8px;

  font-size:13px;
  font-weight:800;

  color:#ff6b6b;
}

.match-name{
  font-size:18px;
  font-weight:800;

  line-height:1.4;
}

.score{
  margin-top:12px;

  font-size:14px;
  color:#cbd5e1;

  transition:.3s;
}

.flash{
  color:var(--cyan);
  transform:scale(1.05);
}

.links{
  margin-top:18px;

  display:flex;
  gap:10px;
}

.links a{
  flex:1;

  text-align:center;

  padding:10px 12px;

  border-radius:12px;

  text-decoration:none;

  font-size:13px;
  font-weight:700;

  transition:.25s;
}

.main-link{
  background:#1f2e4a;
  color:var(--cyan);
}

.main-link:hover{
  background:var(--cyan);
  color:#000;
}

.overlay-link{
  background:#1f3d2b;
  color:#00ff99;
}

.overlay-link:hover{
  background:#00ff99;
  color:#000;
}

/* =====================================================
NO MATCH
===================================================== */

.no-match{
  padding:40px;

  border-radius:18px;

  text-align:center;

  background:#111a2e;

  color:#94a3b8;

  font-size:18px;
}

/* =====================================================
RESPONSIVE
===================================================== */

@media(max-width:1000px){

  .container{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<!-- =====================================================
HEADER
===================================================== -->

<div class="header">

  <div class="title-wrap">

    <div class="title">
      🏏 Cricket AI Broadcast Dashboard
    </div>

    <div class="subtitle">
      Live Match Controller & Overlay Manager
    </div>

  </div>

  <div class="live-system">

    <div class="live-dot"></div>

    <div class="badge">
      SYSTEM LIVE
    </div>

  </div>

</div>

<!-- =====================================================
MAIN
===================================================== -->

<div class="container">

  <!-- LEFT PANEL -->

  <div class="panel">

    <h3>
      🎮 Broadcast Control
    </h3>

    <div class="input-box">

      <div class="label">
        MATCH URL
      </div>

      <input
        type="text"
        id="url"
        placeholder="Paste CREX live match URL..."
      >

    </div>

    <button
      class="start-btn"
      onclick="startMatch()"
    >
      🚀 START BROADCAST
    </button>

    <button
      class="stop-btn"
      onclick="stopMatch()"
    >
      🛑 STOP BROADCAST
    </button>

    <button
      class="overlay-btn"
      onclick="openOverlay()"
    >
      🎥 OPEN OVERLAY
    </button>

    <div class="status-box">

      <div class="status-title">
        SYSTEM STATUS
      </div>

      <div id="msg">
        Waiting for broadcast...
      </div>

    </div>

  </div>

  <!-- RIGHT -->

  <div>

    <div class="right-top">

      <div class="right-title">
        📡 Live Matches
      </div>

      <div class="match-count">
        Total Matches:
        <b id="count">0</b>
      </div>

    </div>

    <div
      class="grid"
      id="matches"
    ></div>

  </div>

</div>

<script>

/* =====================================================
STATE
===================================================== */

let selectedCard = null;

let prevScores = {};

const OVERLAY_URL =
  "/overlay";

/* =====================================================
STATUS MESSAGE
===================================================== */

function msg(text){

  document.getElementById("msg")
    .innerText = text;

}

/* =====================================================
START MATCH
===================================================== */

async function startMatch(){

  const url =
    document.getElementById("url").value.trim();

  if(!url){

    msg("⚠️ Please enter a match URL");
    return;

  }

  msg("🚀 Starting live scraper...");

  try{

    const res =
      await fetch("/set-url",{

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          url:url
        })

      });

    const data =
      await res.json();

    if(data.success){

      msg("✅ Live broadcast started");

    }else{

      msg("❌ Failed to start");

    }

  }catch(err){

    console.error(err);

    msg("❌ Server connection failed");

  }

}

/* =====================================================
STOP MATCH
===================================================== */

async function stopMatch(){

  try{

    await fetch("/set-url",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({
        url:null
      })

    });

    if(selectedCard){

      selectedCard.classList.remove("active");

      selectedCard = null;

    }

    msg("🛑 Broadcast stopped");

  }catch(err){

    console.error(err);

    msg("❌ Failed to stop");

  }

}

/* =====================================================
OPEN OVERLAY
===================================================== */

function openOverlay(){

  window.open(
    OVERLAY_URL,
    "_blank",
    "width=1920,height=1080"
  );

}

/* =====================================================
SELECT MATCH
===================================================== */

function selectMatch(url,el){

  if(selectedCard){

    selectedCard.classList.remove("active");

  }

  selectedCard = el;

  selectedCard.classList.add("active");

  document.getElementById("url").value =
    url;

  startMatch();

}

/* =====================================================
LOAD MATCHES
===================================================== */

async function loadMatches(){

  try{

    const res =
      await fetch("/api/matches");

    if(!res.ok){

      throw new Error("API Error");

    }

    const data =
      await res.json();

    document.getElementById("count")
      .innerText =
      data.count || 0;

    const box =
      document.getElementById("matches");

    box.innerHTML = "";

    if(
      !data.matches ||
      data.matches.length === 0
    ){

      box.innerHTML = `
        <div class="no-match">
          No live matches available
        </div>
      `;

      return;

    }

    data.matches.forEach(match => {

      const prev =
        prevScores[match.url];

      const flash =
        prev &&
        prev !== match.text
          ? "flash"
          : "";

      prevScores[match.url] =
        match.text;

      const card =
        document.createElement("div");

      card.className = "card";

      card.onclick =
        () => selectMatch(
          match.url,
          card
        );

      card.innerHTML = `

        <div class="card-top">

          <div class="live-badge">

            <span class="live-dot"></span>

            LIVE

          </div>

          <div style="font-size:12px;color:#94a3b8;">
            AUTO
          </div>

        </div>

        <div class="match-name">
          ${match.text || "Cricket Match"}
        </div>

        <div class="score ${flash}">
          Real-time AI Broadcast Ready
        </div>

        <div class="links">

          <a
            class="main-link"
            href="${match.url}"
            target="_blank"
            onclick="event.stopPropagation()"
          >
            🌐 Match
          </a>

          <a
            class="overlay-link"
            href="${OVERLAY_URL}"
            target="_blank"
            onclick="event.stopPropagation()"
          >
            🎥 Overlay
          </a>

        </div>

      `;

      box.appendChild(card);

    });

  }catch(err){

    console.error(
      "Load Match Error:",
      err
    );

    msg("❌ Failed loading matches");

  }

}

/* =====================================================
AUTO REFRESH
===================================================== */

loadMatches();

setInterval(
  loadMatches,
  8000
);

</script>

</body>
</html>
