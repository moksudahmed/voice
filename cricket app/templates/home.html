<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🏏 Cricket AI Broadcast Dashboard</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:#0b1220;
  color:#fff;
}

/* HEADER */
.header{
  padding:18px 25px;
  background:#111a2e;
  border-bottom:2px solid #00f0ff;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title{
  font-size:22px;
  font-weight:800;
}

.badge{
  background:#00f0ff;
  color:#000;
  padding:4px 10px;
  border-radius:20px;
  font-weight:bold;
}

/* MAIN */
.container{
  display:grid;
  grid-template-columns:320px 1fr;
  gap:20px;
  padding:20px;
}

/* LEFT PANEL */
.panel{
  background:#111a2e;
  border-radius:12px;
  padding:15px;
}

.panel h3{
  color:#00f0ff;
}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  margin-bottom:8px;
}

.start{ background:#00f0ff; }
.stop{ background:#ff3b3b; color:#fff; }

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:12px;
}

/* CARD */
.card{
  background:#111a2e;
  padding:14px;
  border-radius:10px;
  border-left:4px solid #00f0ff;
  cursor:pointer;
  transition:0.25s ease;
}

.card:hover{
  transform:translateY(-3px);
}

.card.active{
  border-left:4px solid #ff3b3b;
  box-shadow:0 0 15px rgba(255,0,0,0.4);
}

/* LIVE DOT */
.live-dot{
  width:8px;
  height:8px;
  background:red;
  border-radius:50%;
  display:inline-block;
  animation:pulse 1s infinite;
  margin-right:6px;
}

@keyframes pulse{
  50%{opacity:0.4;}
}

/* SCORE */
.score{
  font-size:16px;
  font-weight:bold;
  margin-top:6px;
  transition:0.3s;
}

.flash{
  color:#00f0ff;
  transform:scale(1.08);
}

/* LINKS */
.links{
  margin-top:8px;
  display:flex;
  gap:10px;
}

.links a{
  font-size:12px;
  padding:4px 8px;
  border-radius:6px;
  text-decoration:none;
  background:#1a2a40;
  color:#00f0ff;
}

.links a:hover{
  background:#00f0ff;
  color:#000;
}

/* STATUS */
#msg{
  font-size:13px;
  margin-top:8px;
  color:#00f0ff;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">🏏 Cricket AI Broadcast</div>
  <div>📡 SYSTEM: <span class="badge">LIVE</span></div>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="panel">
    <h3>🎮 Control Panel</h3>

    <input id="url" placeholder="Paste Match URL">

    <button class="start" onclick="startMatch()">START</button>
    <button class="stop" onclick="stopMatch()">STOP</button>

    <div id="msg"></div>
  </div>

  <!-- RIGHT -->
  <div>
    <div style="margin-bottom:10px;">
      📊 Matches: <b id="count">0</b>
    </div>

    <div class="grid" id="matches"></div>
  </div>

</div>

<script>

let selectedCard = null;
let prevScores = {};
const OVERLAY_URL = "http://127.0.0.1:8000/overlay";

// =========================
// START / STOP
// =========================
async function startMatch(){
  const url = document.getElementById("url").value;

  if(!url){
    msg("⚠️ Enter a match URL");
    return;
  }

  await fetch("/set-url", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({url})
  });

  msg("🚀 Broadcast Started");
}

async function stopMatch(){
  await fetch("/set-url", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({url:null})
  });

  if(selectedCard){
    selectedCard.classList.remove("active");
    selectedCard = null;
  }

  msg("🛑 Broadcast Stopped");
}

function msg(text){
  document.getElementById("msg").innerText = text;
}

// =========================
// SELECT MATCH
// =========================
function selectMatch(url, el){

  if(selectedCard){
    selectedCard.classList.remove("active");
  }

  selectedCard = el;
  el.classList.add("active");

  document.getElementById("url").value = url;

  startMatch();
}

// =========================
// LOAD MATCHES
// =========================
async function loadMatches(){
  try{
    const res = await fetch("/api/matches");

    if(!res.ok) throw new Error("API error");

    const data = await res.json();

    document.getElementById("count").innerText = data.count || 0;

    const box = document.getElementById("matches");
    box.innerHTML = "";

    if(!data.matches || data.matches.length === 0){
      box.innerHTML = "<div class='card'>No live matches</div>";
      return;
    }

    data.matches.forEach(m => {

      const prev = prevScores[m.url];
      const flash = prev && prev !== m.text ? "flash" : "";

      prevScores[m.url] = m.text;

      const card = document.createElement("div");
      card.className = "card";
      card.onclick = () => selectMatch(m.url, card);

      card.innerHTML = `
        <div>
          <span class="live-dot"></span>
          ${m.text || "Match"}
        </div>

        <div class="score ${flash}">LIVE</div>

        <div class="links">
          <a href="${m.url}" target="_blank" onclick="event.stopPropagation()">Main</a>
          <a href="${OVERLAY_URL}" target="_blank" onclick="event.stopPropagation()">Overlay</a>
        </div>
      `;

      box.appendChild(card);
    });

  }catch(err){
    console.error("Load error:", err);
  }
}

// =========================
// AUTO REFRESH
// =========================
loadMatches();
setInterval(loadMatches, 8000);

</script>

</body>
</html>
