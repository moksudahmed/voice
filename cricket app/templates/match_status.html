<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cricket Match Monitor • Stadium Live</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Poppins', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      padding: 20px;
    }

    .stadium-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.35) contrast(1.1);
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, rgba(0,0,0,0.5), rgba(0,5,15,0.85));
      z-index: -1;
    }

    .card {
      width: 650px;
      max-width: 95%;
      background: rgba(30, 41, 59, 0.88);
      backdrop-filter: blur(14px);
      padding: 40px 35px;
      border-radius: 28px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.1) inset;
      border: 1px solid rgba(255,255,255,0.15);
      text-align: center;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    h2 {
      margin-bottom: 30px;
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #facc15);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    h2::before {
      content: "🏏";
      font-size: 2.4rem;
      background: none;
      -webkit-background-clip: unset;
      color: #facc15;
    }

    .status-container {
      padding: 20px 10px;
      border-radius: 20px;
      transition: all 0.3s ease;
      margin-bottom: 20px;
      width: 100%;
    }

    #status-icon {
      font-size: 4.5rem;
      line-height: 1.2;
      display: block;
      margin-bottom: 10px;
    }

    #status-text {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      display: block;
      line-height: 1.3;
      word-break: break-word;
      overflow-wrap: break-word;
      white-space: normal;
      max-width: 100%;
      padding: 0 4px;
    }

    #status-subtext {
      font-size: 1rem;
      color: #94a3b8;
      margin-top: 15px;
      font-weight: 500;
      letter-spacing: 0.5px;
      word-break: break-word;
      overflow-wrap: break-word;
      max-width: 100%;
    }

    .status-live #status-icon { color: #4ade80; }
    .status-live #status-text { color: #4ade80; text-shadow: 0 0 20px rgba(74, 222, 128, 0.3); }
    .status-live { border: 1px solid rgba(74, 222, 128, 0.3); background: rgba(74, 222, 128, 0.05); }

    .status-wait #status-icon { color: #facc15; }
    .status-wait #status-text { color: #facc15; text-shadow: 0 0 20px rgba(250, 204, 21, 0.3); }
    .status-wait { border: 1px solid rgba(250, 204, 21, 0.3); background: rgba(250, 204, 21, 0.05); }

    .status-error #status-icon { color: #f87171; }
    .status-error #status-text { color: #f87171; text-shadow: 0 0 20px rgba(248, 113, 113, 0.3); }
    .status-error { border: 1px solid rgba(248, 113, 113, 0.3); background: rgba(248, 113, 113, 0.05); }

    .status-unknown #status-icon { color: #94a3b8; }
    .status-unknown #status-text { color: #94a3b8; }
    .status-unknown { border: 1px solid rgba(148, 163, 184, 0.2); background: rgba(148, 163, 184, 0.05); }

    .status-info #status-icon { color: #60a5fa; }
    .status-info #status-text { color: #60a5fa; text-shadow: 0 0 20px rgba(96, 165, 250, 0.3); }
    .status-info { border: 1px solid rgba(96, 165, 250, 0.3); background: rgba(96, 165, 250, 0.05); }

    .footer-hint {
      margin-top: 25px;
      text-align: center;
      font-size: 0.9rem;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 500;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 20px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .refresh-dot {
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 6px #22c55e;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @media (max-width: 600px) {
      .card { padding: 25px 20px; }
      h2 { font-size: 1.8rem; }
      h2::before { font-size: 1.8rem; }
      #status-icon { font-size: 3.5rem; }
      #status-text { font-size: 1.8rem; }
      #status-subtext { font-size: 0.9rem; }
      .footer-hint { font-size: 0.7rem; flex-direction: column; gap: 8px; }
    }

    @media (max-width: 400px) {
      .card { padding: 18px 12px; }
      #status-text { font-size: 1.4rem; }
      #status-icon { font-size: 2.8rem; }
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #1e293b;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<video class="stadium-bg" autoplay muted loop playsinline>
  <source src="/static/stadium.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div class="card">
  <h2>Live Cricket Match</h2>

  <div class="status-container status-unknown" id="status-container">
    <span id="status-icon">🏟️</span>
    <span id="status-text">Loading...</span>
    <div id="status-subtext">Fetching match status...</div>
  </div>

  <div class="footer-hint">
    <span>🏟️ Live from Stadium</span>
    <span><span class="refresh-dot"></span> Auto‑update every 7s</span>
  </div>
</div>

<script>
  // ============================================================
  // JavaScript function that mimics the Python status logic
  // ============================================================
  function getMatchDisplay(status, action, apiMessage) {
    // Default fallback
    let display = {
      statusClass: 'unknown',
      icon: '📡',
      main: 'Status Unavailable',
      sub: 'No recent data'
    };

    // If we have an action from the API, use it as a hint
    const actionUpper = (action || '').toUpperCase();

    // --- 1. Abandoned ---
    if (status && status.includes('Abandoned')) {
      return {
        statusClass: 'error',
        icon: '🚫',
        main: 'Match Abandoned',
        sub: 'Match has been called off.'
      };
    }

    // --- 2. Suspended / Deferred ---
    if (status && (status.includes('Suspended') || status.includes('Deferred'))) {
      return {
        statusClass: 'wait',
        icon: '⏸️',
        main: 'Match Suspended',
        sub: 'Play has been suspended.'
      };
    }

    // --- 3. Completed ---
    if (status && status.includes('Completed')) {
      // Extract result if possible (e.g., "Completed - TeamA won by 5 wickets")
      let result = '';
      if (status.includes('-')) {
        result = status.split('-')[1].trim();
      }
      return {
        statusClass: 'info',
        icon: '🏁',
        main: 'Match Completed',
        sub: result || 'Match has finished.'
      };
    }

    // --- 4. Tomorrow ---
    if (status && status.includes('Tomorrow')) {
      return {
        statusClass: 'wait',
        icon: '📅',
        main: 'Match Tomorrow',
        sub: 'Scheduled for tomorrow.'
      };
    }

    // --- 5. Today at (specific time) ---
    if (status && status.includes('Today at')) {
      const timeMatch = status.match(/(\d{1,2}:\d{2}\s*(?:AM|PM))/i);
      const timeStr = timeMatch ? timeMatch[1] : 'scheduled time';
      return {
        statusClass: 'wait',
        icon: '🕐',
        main: `Match starts at ${timeStr}`,
        sub: 'The match will begin shortly.'
      };
    }

    // --- 6. Scheduled / Yet to Start ---
    if (status && (status.includes('Scheduled') || status.includes('Yet to Start'))) {
      return {
        statusClass: 'wait',
        icon: '⏳',
        main: 'Match Not Started',
        sub: 'Waiting for toss or match start.'
      };
    }

    // --- 7. Live / Break ---
    if (status && (status.includes('Live') || status.includes('Break'))) {
      return {
        statusClass: 'live',
        icon: '🔥',
        main: 'Match Live',
        sub: 'Game is currently in progress.'
      };
    }

    // --- 8. Stopped / Rain ---
    if (status && (status.includes('Stoped') || status.includes('Rain') || status.includes('Wet') || status.includes('Outfield'))) {
      return {
        statusClass: 'wait',
        icon: '🌧️',
        main: 'Match Interrupted',
        sub: 'Play stopped due to weather / conditions.'
      };
    }

    // --- 9. Fallback using action ---
    if (actionUpper === 'LIVE') {
      return {
        statusClass: 'live',
        icon: '🔥',
        main: 'Match Live',
        sub: apiMessage || 'Game in progress.'
      };
    } else if (actionUpper === 'WAIT') {
      return {
        statusClass: 'wait',
        icon: '⏳',
        main: 'Waiting',
        sub: apiMessage || 'Match is yet to start or delayed.'
      };
    } else if (actionUpper === 'ERROR' || actionUpper === 'STOP') {
      return {
        statusClass: 'error',
        icon: '⚠️',
        main: 'Error / Stopped',
        sub: apiMessage || 'An issue has occurred.'
      };
    } else if (actionUpper === 'COMPLETE') {
      return {
        statusClass: 'info',
        icon: '🏁',
        main: 'Match Completed',
        sub: apiMessage || 'Match has finished.'
      };
    }

    // --- 10. Unknown status but we have a status string ---
    if (status) {
      // Clean up status: replace underscores, capitalize
      let cleaned = status.replace(/_/g, ' ');
      // If it's all caps, convert to title case
      if (cleaned === cleaned.toUpperCase()) {
        cleaned = cleaned.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
      }
      return {
        statusClass: 'info',
        icon: '📋',
        main: cleaned,
        sub: apiMessage || 'Latest update from the stadium.'
      };
    }

    // Final fallback
    return display;
  }

  // ============================================================
  // Fetch and update UI
  // ============================================================
  let isFetching = false;
  let intervalId = null;

  const statusContainer = document.getElementById('status-container');
  const statusIcon = document.getElementById('status-icon');
  const statusText = document.getElementById('status-text');
  const statusSubtext = document.getElementById('status-subtext');

  async function fetchMatchStatus() {
    if (isFetching) return;
    isFetching = true;

    try {
      const res = await fetch("/api/match-status", {
        method: "GET",
        cache: "no-store",
        headers: { "Accept": "application/json" }
      });

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}: ${res.statusText}`);
      }

      const data = await res.json();

      // Extract values from API response
      const status = data.status || '';
      const action = data.action || '';
      const apiMessage = data.message || '';

      // Use our new function to determine display
      const display = getMatchDisplay(status, action, apiMessage);

      // Apply to DOM
      statusContainer.className = `status-container status-${display.statusClass}`;
      statusIcon.textContent = display.icon;
      statusText.textContent = display.main;
      statusSubtext.textContent = display.sub;

    } catch (err) {
      console.error("Fetch error:", err);
      statusContainer.className = 'status-container status-error';
      statusIcon.textContent = '🔌';
      statusText.textContent = 'Connection Error';
      statusSubtext.textContent = err.message || 'Failed to connect to the server.';
    } finally {
      isFetching = false;
    }
  }

  // -------- INITIAL LOAD ----------
  fetchMatchStatus();

  // -------- AUTO REFRESH (every 7 seconds) ----------
  intervalId = setInterval(() => {
    fetchMatchStatus();
  }, 7000);

  // Clean up interval on page unload
  window.addEventListener('beforeunload', () => {
    if (intervalId) {
      clearInterval(intervalId);
    }
  });

  // Video background fallback handler
  const bgVideo = document.querySelector('.stadium-bg');
  if (bgVideo) {
    bgVideo.addEventListener('error', () => {
      console.log('Stadium video not found — using gradient overlay');
      bgVideo.style.display = 'none';
    });
    bgVideo.play().catch(e => console.log('Video autoplay restricted, background overlay active'));
  }

  // Double-click card to force manual refresh
  const cardElement = document.querySelector('.card');
  if (cardElement) {
    cardElement.addEventListener('dblclick', () => {
      fetchMatchStatus();
      const footerHint = document.querySelector('.footer-hint');
      if (footerHint) {
        footerHint.style.opacity = '0.6';
        setTimeout(() => { footerHint.style.opacity = '1'; }, 300);
      }
    });
  }

  console.log('🏏 Cricket Match Monitor Active (Status-driven display) | Endpoint: /api/match-status | Auto-refresh: 7s');
</script>

</body>
</html>
