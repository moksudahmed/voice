<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🏏 Cricket AI Broadcast Dashboard | Team Details & Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #050b16;
      --bg2: #08111f;
      --panel: #111a2e;
      --panel2: #18263d;
      --cyan: #00eaff;
      --cyan2: #00b7ff;
      --green: #00ff99;
      --red: #ff3b3b;
      --gold: #ffd84d;
      --purple: #9b5cff;
      --text: #ffffff;
      --muted: #8fa3c1;
      --border: rgba(255, 255, 255, 0.08);
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #112447 0%, #08111f 55%, #050b16 100%);
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
    }

    /* bg fx */
    .bg-effects {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: -1;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.16;
      animation: floatGlow 10s infinite alternate ease-in-out;
    }

    .glow1 { width: 500px; height: 500px; background: #00eaff; top: -120px; left: -100px; }
    .glow2 { width: 500px; height: 500px; background: #ff0066; right: -120px; bottom: -100px; animation-delay: 2s; }
    .glow3 { width: 400px; height: 400px; background: #7b00ff; left: 40%; top: 25%; animation-delay: 4s; }

    @keyframes floatGlow {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(50px) scale(1.08); }
    }

    /* header */
    .header {
      height: 90px;
      padding: 0 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(7, 12, 24, 0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .title-wrap {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .title {
      font-size: 30px;
      font-weight: 900;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #ffffff, #00eaff, #00a6ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    .live-system {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .live-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ff0033;
      box-shadow: 0 0 12px #ff0033, 0 0 24px #ff0033;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.75); opacity: 0.5; }
    }

    .badge {
      padding: 10px 18px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 800;
      color: #000;
      background: linear-gradient(135deg, var(--cyan), var(--cyan2));
    }

    /* layout */
    .container {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 22px;
      padding: 22px;
    }

    /* panels */
    .panel {
      background: linear-gradient(180deg, rgba(17, 26, 46, 0.96), rgba(11, 17, 30, 0.96));
      border-radius: 28px;
      border: 1px solid var(--border);
      padding: 24px;
      height: fit-content;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .panel h3 {
      font-size: 22px;
      color: var(--cyan);
      margin-bottom: 22px;
      letter-spacing: -0.2px;
    }

    .section {
      margin-bottom: 22px;
    }

    .label {
      font-size: 13px;
      color: #d6e0ee;
      margin-bottom: 10px;
      font-weight: 600;
    }

    input, textarea {
      width: 100%;
      border: none;
      outline: none;
      border-radius: 18px;
      background: #1a2943;
      color: white;
      padding: 16px;
      font-size: 14px;
      border: 1px solid transparent;
      transition: 0.25s;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
      line-height: 1.6;
    }

    input:focus, textarea:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 4px rgba(0, 234, 255, 0.14);
    }

    /* buttons */
    .btn {
      width: 100%;
      border: none;
      padding: 15px;
      border-radius: 18px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 900;
      margin-bottom: 12px;
      transition: 0.25s;
      font-family: 'Poppins', sans-serif;
    }

    .btn:hover { transform: translateY(-3px); filter: brightness(1.05); }
    .start-btn { background: linear-gradient(135deg, var(--cyan), #00a2ff); color: #000; }
    .commentary-btn { background: linear-gradient(135deg, #ffd84d, #ff9800); color: #000; }
    .loop-btn { background: linear-gradient(135deg, #9b5cff, #6a11cb); color: #fff; }
    .loop-active { background: linear-gradient(135deg, #ff3b3b, #e91e63); color: #fff; box-shadow: 0 0 12px #ff3b3b; }
    .overlay-btn { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
    .players-btn { background: linear-gradient(135deg, #00ff99, #00b7ff); color: #000; }
    .stop-btn { background: linear-gradient(135deg, #ff3b3b, #ff1744); color: #fff; }
    .swap-btn { background: linear-gradient(135deg, #00eaff, #00ff99); color: #000; margin-bottom: 12px; }

    /* team panel */
    .team-panel {
      margin-top: 20px;
      padding: 15px;
      border-radius: 16px;
      background: #0f1a2e;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .team-row {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      background: #16243d;
      cursor: pointer;
      transition: all 0.3s;
    }

    .team-row:hover {
      background: #1e3153;
      transform: translateX(5px);
    }

    .team-label { font-weight: 700; color: #00eaff; }
    .team-status { font-weight: 600; color: #ffd84d; }

    /* status box */
    .status-box {
      margin-top: 22px;
      background: #0d1627;
      border-radius: 18px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .status-title { font-size: 12px; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; }
    #msg { font-size: 14px; line-height: 1.6; color: var(--cyan); word-break: break-word; }

    /* right section */
    .right { min-width: 0; }
    .right-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .right-title { font-size: 28px; font-weight: 900; }
    .match-count { color: var(--muted); }
    .match-count b { color: var(--gold); }

    /* grid + cards */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }

    .card {
      position: relative;
      overflow: hidden;
      padding: 22px;
      border-radius: 26px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: linear-gradient(180deg, rgba(17, 26, 46, 0.95), rgba(10, 16, 30, 0.95));
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 40px rgba(0, 234, 255, 0.14);
    }

    .card.active {
      border-color: rgba(255, 0, 85, 0.6);
      box-shadow: 0 0 30px rgba(255, 0, 85, 0.3);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
      transform: translateX(-120%);
      animation: shine 5s linear infinite;
      pointer-events: none;
    }

    @keyframes shine {
      from { transform: translateX(-120%); }
      to { transform: translateX(120%); }
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ff6b6b;
      font-size: 13px;
      font-weight: 800;
    }

    .match-name {
      font-size: 19px;
      font-weight: 800;
      line-height: 1.5;
    }

    .score {
      margin-top: 12px;
      font-size: 14px;
      color: #d6e0ee;
    }

    .flash {
      color: var(--cyan);
      transform: scale(1.02);
      transition: 0.2s;
    }

    .links {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .links a {
      flex: 1;
      text-align: center;
      text-decoration: none;
      padding: 11px 12px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 800;
      transition: 0.25s;
    }

    .main-link { background: #1b2f4c; color: var(--cyan); }
    .main-link:hover { background: var(--cyan); color: #000; }
    .overlay-link { background: #173826; color: #00ff99; }
    .overlay-link:hover { background: #00ff99; color: #000; }

    .no-match {
      padding: 45px;
      border-radius: 24px;
      text-align: center;
      background: #111a2e;
      color: #8ea2be;
      font-size: 18px;
    }

    .swap-animate {
      animation: swapFlash 0.6s ease;
    }

    @keyframes swapFlash {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); background: #1b2f4c; }
      100% { transform: scale(1); }
    }

    /* MODAL STYLES - Team Details Page */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      z-index: 10000;
      overflow-y: auto;
      animation: modalFadeIn 0.3s ease;
    }

    @keyframes modalFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      max-width: 1400px;
      margin: 40px auto;
      background: linear-gradient(135deg, #0a1225, #0c1428);
      border-radius: 40px;
      border: 1px solid rgba(0, 234, 255, 0.3);
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      padding: 30px 40px;
      background: linear-gradient(135deg, rgba(0, 234, 255, 0.1), rgba(0, 255, 153, 0.05));
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #00eaff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .close-modal {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: white;
      font-size: 32px;
      cursor: pointer;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-modal:hover {
      background: #ff3b3b;
      transform: rotate(90deg);
    }

    .team-details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      padding: 40px;
    }

    .team-card-detail {
      background: rgba(17, 26, 46, 0.8);
      border-radius: 28px;
      padding: 30px;
      border: 1px solid rgba(0, 234, 255, 0.2);
      transition: 0.3s;
    }

    .team-card-detail:hover {
      transform: translateY(-5px);
      border-color: var(--cyan);
      box-shadow: 0 10px 30px rgba(0, 234, 255, 0.2);
    }

    .team-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
    }

    .team-icon {
      font-size: 64px;
    }

    .team-name {
      font-size: 28px;
      font-weight: 800;
      color: var(--cyan);
    }

    .team-role {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, var(--gold), #ff9800);
      color: #000;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 800;
      margin-top: 10px;
    }

    .player-list {
      margin-top: 20px;
    }

    .player-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      margin: 8px 0;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      transition: 0.2s;
    }

    .player-item:hover {
      background: rgba(0, 234, 255, 0.1);
      transform: translateX(5px);
    }

    .player-name {
      font-weight: 600;
      font-size: 16px;
    }

    .player-role {
      font-size: 12px;
      color: var(--muted);
      background: rgba(0,0,0,0.3);
      padding: 4px 10px;
      border-radius: 12px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 20px;
    }

    .stat-card {
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      border-radius: 16px;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--gold);
    }

    .match-info {
      grid-column: span 2;
      background: rgba(0, 234, 255, 0.05);
      border-radius: 28px;
      padding: 25px;
      margin-top: 20px;
      text-align: center;
    }

    @media (max-width: 968px) {
      .team-details-grid { grid-template-columns: 1fr; }
      .container { grid-template-columns: 1fr; }
      .modal-content { margin: 20px; }
    }
  </style>
</head>
<body>

<div class="bg-effects">
  <div class="glow glow1"></div>
  <div class="glow glow2"></div>
  <div class="glow glow3"></div>
</div>

<div class="header">
  <div class="title-wrap">
    <div class="title">🏏 Cricket AI Broadcast Dashboard</div>
    <div class="subtitle">Real-time AI Commentary • Overlay Control • Live Match Automation</div>
  </div>
  <div class="live-system">
    <div class="live-dot"></div>
    <div class="badge">SYSTEM LIVE</div>
  </div>
</div>

<div class="container">
  <!-- LEFT PANEL (UNIFIED) -->
  <div class="panel">
    <h3>🎮 Broadcast Control</h3>

    <div class="section">
      <div class="label">📌 MATCH URL</div>
      <input type="text" id="url" placeholder="Paste CREX live match URL...">
    </div>

    <div class="section">
      <div class="label">🎙️ WELCOME COMMENTARY</div>
      <textarea id="welcomeCommentary" placeholder="Enter welcome commentary speech..."></textarea>
    </div>

    <button class="btn start-btn" onclick="startMatch()">🚀 START BROADCAST</button>
    <button class="btn commentary-btn" onclick="playWelcomeCommentary()">🎙️ PLAY COMMENTARY</button>
    <button class="btn loop-btn" id="loopBtn" onclick="toggleLoop()">🔁 START LOOP</button>
    <button class="btn overlay-btn" onclick="openOverlay()">🎥 OPEN OVERLAY</button>
    <button class="btn players-btn" onclick="openPlayers()">👥 OPEN PLAYING XI</button>
    <button class="btn stop-btn" onclick="stopAllSystems()">🛑 STOP ALL</button>

    <!-- Team swap panel (integrated) -->
    <div style="margin-top: 16px;">
      <button class="btn swap-btn" onclick="swapTeams()">🔄 SWAP BATTING ↔ FIELDING</button>
      <div class="team-panel">
        <div class="team-row" id="teamABox" onclick="showTeamDetails('Team A')">
          <span class="team-label">🏏 TEAM A</span>
          <span class="team-status" id="teamAStatus">Batting</span>
        </div>
        <div class="team-row" id="teamBBox" onclick="showTeamDetails('Team B')">
          <span class="team-label">⚡ TEAM B</span>
          <span class="team-status" id="teamBStatus">Fielding</span>
        </div>
      </div>
    </div>    

    <div class="status-box">
      <div class="status-title">📡 SYSTEM STATUS</div>
      <div id="msg">Waiting for broadcast...</div>
      <div id="loopStatus" style="font-size:12px; margin-top:8px; color:#00eaff80;"></div>
    </div>
  </div>

  <!-- RIGHT SECTION: LIVE MATCHES -->
  <div class="right">
    <div class="right-top">
      <div class="right-title">📡 Live Matches</div>
      <div class="match-count">Total Matches: <b id="count">0</b></div>
    </div>
    <div class="grid" id="matches"></div>
  </div>
</div>

<!-- TEAM DETAILS MODAL -->
<div id="teamModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>🏏 Team Details & Lineup</h2>
      <button class="close-modal" onclick="closeTeamModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
  // ======================= STATE =======================
  let selectedCard = null;
  let prevScores = {};
  let commentaryLoop = null;
  let isLooping = false;
  let loopIntervalSeconds = 30;
  const OVERLAY_URL = "/overlay";

  // Team state (batting/fielding)
  let teamState = {
    teamA: "Batting",
    teamB: "Fielding"
  };

  // Mock player data for demonstration
  const teamPlayers = {
    "Team A": {
      name: "Royal Challengers",
      players: [
        { name: "Virat Kohli", role: "Batsman (Captain)" },
        { name: "Faf du Plessis", role: "Batsman" },
        { name: "Glenn Maxwell", role: "All-rounder" },
        { name: "Dinesh Karthik", role: "Wicket-keeper" },
        { name: "Mohammed Siraj", role: "Bowler" }
      ],
      stats: { runs: "245/3", overs: "18.2", rr: "13.36" }
    },
    "Team B": {
      name: "Mumbai Indians",
      players: [
        { name: "Rohit Sharma", role: "Batsman (Captain)" },
        { name: "Ishan Kishan", role: "Wicket-keeper" },
        { name: "Suryakumar Yadav", role: "Batsman" },
        { name: "Hardik Pandya", role: "All-rounder" },
        { name: "Jasprit Bumrah", role: "Bowler" }
      ],
      stats: { runs: "189/4", overs: "15.0", rr: "12.60" }
    }
  };

  // ======================= UTILS =======================
  function msg(text) {
    const msgDiv = document.getElementById("msg");
    if (msgDiv) msgDiv.innerText = text;
  }
  
  function updateLoopStatusUI() {
    const loopStatusDiv = document.getElementById("loopStatus");
    const loopBtn = document.getElementById("loopBtn");
    if (isLooping) {
      if (loopStatusDiv) loopStatusDiv.innerHTML = `🔊 LOOP ACTIVE • Every ${loopIntervalSeconds}s <span style="display:inline-block;width:8px;height:8px;background:#ffd84d;border-radius:50%;animation:pulse 0.8s infinite;"></span>`;
      if (loopBtn) {
        loopBtn.innerText = "⏹️ STOP LOOP";
        loopBtn.classList.add("loop-active");
      }
    } else {
      if (loopStatusDiv) loopStatusDiv.innerHTML = "";
      if (loopBtn) {
        loopBtn.innerText = "🔁 START LOOP";
        loopBtn.classList.remove("loop-active");
      }
    }
  }

  // ======================= TEAM DETAILS MODAL =======================
  function showTeamDetails(teamName) {
  const team = teamPlayers[teamName];
  const role = teamName === "Team A" ? teamState.teamA : teamState.teamB;
  
  const modalBody = document.getElementById("modalBody");
  modalBody.innerHTML = `
    <div class="team-details-grid">
      <div class="team-card-detail">
        <div class="team-header">
          <div class="team-icon">🏏</div>
          <div style="flex: 1;">
            <div class="team-name" style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
              <span>${team.name}</span>
              <span style="font-size: 20px; color: #ffd84d;">|</span>
              <span style="font-size: 18px; background: linear-gradient(135deg, #00eaff, #00ff99); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
                ${team.banglaName || 'দলের নাম'}
              </span>
            </div>
            <div class="team-role">${role}</div>
          </div>
        </div>
        
        <!-- Bangla Team Name Input Field -->
        <div style="margin-bottom: 20px; padding: 15px; background: rgba(0, 234, 255, 0.1); border-radius: 16px;">
          <label style="display: block; margin-bottom: 8px; font-size: 14px; color: #00eaff; font-weight: 600;">
            🇧🇩 দলের নাম (Team Name in Bangla)
          </label>
          <div style="display: flex; gap: 10px;">
            <input 
              type="text" 
              id="banglaTeamName" 
              value="${team.banglaName || ''}" 
              placeholder="যেমন: রয়্যাল চ্যালেঞ্জার্স ব্যাঙ্গালোর"
              style="flex: 1; background: #1a2943; border: 1px solid #00eaff; color: white; padding: 12px; border-radius: 12px; font-size: 16px; font-family: 'Poppins', sans-serif;"
            >
            <button 
              onclick="updateBanglaTeamName('${teamName}')" 
              style="background: linear-gradient(135deg, #00eaff, #00a2ff); color: #000; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 800;"
            >
              💾 সংরক্ষণ
            </button>
          </div>
          <div style="margin-top: 8px; font-size: 12px; color: #8fa3c1;">
            💡 Tip: Enter team name in Bengali script
          </div>
        </div>

              <span style="color: #00ff99; font-weight: 800;">${team.stats.overs}</span>

            <div style="display: flex; justify-content: space-between; padding: 8px 0;">

        <div style="margin-top: 20px;">
          <h4>🎯 Key Players</h4>

        <p style="margin-top: 10px; color: #00eaff;">⚡ Live AI Commentary Active • Real-time Updates</p>
        
        <!-- Bangla Match Info Display -->

          <p style="margin-top: 10px; font-size: 14px;" id="banglaMatchInfo">
            ${team.banglaName ? `${team.banglaName} ${role === 'Batting' ? 'ব্যাটিং করছে' : 'ফিল্ডিং করছে'}` : 'দলের নাম সেট করুন'}

}
// Function to update Bangla team name
function updateBanglaTeamName(teamName) {
  const banglaNameInput = document.getElementById("banglaTeamName");
  const banglaName = banglaNameInput.value.trim();
  
  if (!banglaName) {
    msg("⚠️ Please enter a team name in Bangla");
    return;
  }
  
  // Update the teamPlayers object with Bangla name
  if (teamPlayers[teamName]) {
    teamPlayers[teamName].banglaName = banglaName;
    
    // Also update the match info text in Bangla
    const role = teamName === "Team A" ? teamState.teamA : teamState.teamB;
    const banglaRole = role === "Batting" ? "ব্যাটিং করছে" : "ফিল্ডিং করছে";
    
    // Update the displayed Bangla match info
    const banglaMatchInfo = document.getElementById("banglaMatchInfo");
    if (banglaMatchInfo) {
      banglaMatchInfo.innerHTML = `${banglaName} ${banglaRole}`;
    }
    
    // Update the team name display in header
    const teamNameElements = document.querySelectorAll(".team-name span:last-child");
    if (teamNameElements.length > 0) {
      const lastElement = teamNameElements[teamNameElements.length - 1];
      if (lastElement && lastElement.parentElement === document.querySelector(".team-name")) {
        lastElement.textContent = banglaName;
      }
    }
    
    msg(`✅ Team name updated to: ${banglaName}`);
    
    // Optional: Send to backend
    saveBanglaTeamNameToBackend(teamName, banglaName);
  }
}

// Function to save Bangla team name to backend
async function saveBanglaTeamNameToBackend(teamName, banglaName) {
  try {
    const response = await fetch("/api/update-bangla-team-name", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        team: teamName,
        bangla_name: banglaName
      })
    });
    
    if (response.ok) {
      console.log("Bangla team name saved to backend");
    }
  } catch (error) {
    console.error("Failed to save to backend:", error);
  }
}
  function closeTeamModal() {
    document.getElementById("teamModal").style.display = "none";
  }

  // Close modal when clicking outside
  window.onclick = function(event) {
    const modal = document.getElementById("teamModal");
    if (event.target === modal) {
      modal.style.display = "none";
    }
  }

  // ======================= START MATCH =======================
  async function startMatch() {
    const url = document.getElementById("url").value.trim();
    if (!url) {
      msg("⚠️ Please enter a match URL");
      return;
    }
    msg("🚀 Starting live broadcast...");
    try {
      const res = await fetch("/set-url", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: url })
      });
      const data = await res.json();
      if (data.success) {
        msg("✅ Broadcast started successfully");
      } else {
        msg("❌ Failed to start broadcast");
      }
    } catch (err) {
      console.error(err);
      msg("❌ Server connection failed");
    }
  }

  // ======================= PLAY WELCOME COMMENTARY =======================
  async function playWelcomeCommentary() {
    const commentary = document.getElementById("welcomeCommentary").value.trim();
    if (!commentary) {
      msg("⚠️ Please enter commentary text");
      return false;
    }
    msg("🎙️ Playing commentary...");
    try {
      const res = await fetch("/play-welcome-commentary", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: commentary })
      });
      if (!res.ok) throw new Error("Request failed");
      const data = await res.json();
      if (data.success) {
        msg("✅ Commentary played successfully");
        return true;
      } else {
        msg("❌ Failed to play commentary");
        return false;
      }
    } catch (err) {
      console.error(err);
      msg("❌ Commentary server error");
      return false;
    }
  }

  // ======================= LOOP COMMENTARY =======================
  function toggleLoop() {
    if (isLooping) {
      stopLoop();
      return;
    }
    const commentary = document.getElementById("welcomeCommentary").value.trim();
    if (!commentary) {
      msg("⚠️ Please enter commentary before starting loop");
      return;
    }
    isLooping = true;
    updateLoopStatusUI();
    msg("🔁 Commentary loop started — playing every " + loopIntervalSeconds + " seconds");
    
    playWelcomeCommentary().then(() => {
      scheduleNextLoop();
    }).catch(() => {
      scheduleNextLoop();
    });
  }
  
  function scheduleNextLoop() {
    if (!isLooping) return;
    if (commentaryLoop) clearTimeout(commentaryLoop);
    commentaryLoop = setTimeout(() => {
      if (isLooping) {
        playWelcomeCommentary().finally(() => {
          scheduleNextLoop();
        });
      }
    }, loopIntervalSeconds * 1000);
  }
  
  function stopLoop() {
    if (commentaryLoop) {
      clearTimeout(commentaryLoop);
      commentaryLoop = null;
    }
    isLooping = false;
    updateLoopStatusUI();
    msg("⏹️ Commentary loop stopped");
  }

  // ======================= STOP ALL SYSTEMS =======================
  async function stopAllSystems() {
    try {
      stopLoop();
      await fetch("/set-url", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: null })
      });
      await fetch("/stop-commentary", { method: "POST" }).catch(() => {});
      if (selectedCard) {
        selectedCard.classList.remove("active");
        selectedCard = null;
      }
      msg("🛑 All systems stopped");
    } catch (err) {
      console.error(err);
      msg("❌ Failed stopping systems");
    }
  }

  // ======================= OPEN OVERLAY / PLAYERS =======================
  function openOverlay() {
    window.open(OVERLAY_URL, "_blank", "width=1920,height=1080");
  }

  function openPlayers() {
    window.open("http://127.0.0.1:8000/players", "_blank");
  }

  // ======================= SWAP TEAMS =======================
  function swapTeams() {
    let temp = teamState.teamA;
    teamState.teamA = teamState.teamB;
    teamState.teamB = temp;

    const teamAStatus = document.getElementById("teamAStatus");
    const teamBStatus = document.getElementById("teamBStatus");
    if (teamAStatus) teamAStatus.innerText = teamState.teamA;
    if (teamBStatus) teamBStatus.innerText = teamState.teamB;

    const teamABox = document.getElementById("teamABox");
    const teamBBox = document.getElementById("teamBBox");
    if (teamABox) teamABox.classList.add("swap-animate");
    if (teamBBox) teamBBox.classList.add("swap-animate");
    setTimeout(() => {
      if (teamABox) teamABox.classList.remove("swap-animate");
      if (teamBBox) teamBBox.classList.remove("swap-animate");
    }, 600);
    msg(`🔄 Teams swapped: ${teamState.teamA} batting, ${teamState.teamB} fielding`);
  }

  // ======================= SELECT MATCH =======================
  function selectMatch(url, element, matchName) {
    if (selectedCard) {
      selectedCard.classList.remove("active");
    }
    selectedCard = element;
    selectedCard.classList.add("active");
    document.getElementById("url").value = url;
    startMatch();
  }

  // ======================= LOAD MATCHES =======================
  async function loadMatches() {
    try {
      const res = await fetch("/api/matches");
      if (!res.ok) throw new Error("API Error");
      const data = await res.json();
      document.getElementById("count").innerText = data.count || 0;
      const container = document.getElementById("matches");
      if (!container) return;
      container.innerHTML = "";

      if (!data.matches || data.matches.length === 0) {
        container.innerHTML = `<div class="no-match">No live matches available</div>`;
        return;
      }

      data.matches.forEach(match => {
        const previous = prevScores[match.url];
        const hasFlash = previous && previous !== match.text;
        if (hasFlash) prevScores[match.url] = match.text;
        else if (!previous) prevScores[match.url] = match.text;

        const card = document.createElement("div");
        card.className = "card";
        card.onclick = (e) => {
          if (e.target.tagName === 'A') return;
          selectMatch(match.url, card, match.text);
        };
        card.innerHTML = `
          <div class="card-top">
            <div class="live-badge">
              <span class="live-dot"></span>
              LIVE
            </div>
            <div style="font-size:12px;color:#94a3b8;">AUTO</div>
          </div>
          <div class="match-name">${escapeHtml(match.text) || "Cricket Match"}</div>
          <div class="score ${hasFlash ? 'flash' : ''}">
            ${hasFlash ? '⚡ New update • ' : ''}Click to view team details
          </div>
          <div class="links">
            <a class="main-link" href="${match.url}" target="_blank" onclick="event.stopPropagation()">🌐 Match</a>
            <a class="overlay-link" href="${OVERLAY_URL}" target="_blank" onclick="event.stopPropagation()">🎥 Overlay</a>
          </div>
        `;
        container.appendChild(card);
      });
    } catch (err) {
      console.error("Load Match Error:", err);
      msg("❌ Failed loading matches");
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Auto-refresh matches
  loadMatches();
  setInterval(loadMatches, 8000);

  // expose global functions
  window.startMatch = startMatch;
  window.playWelcomeCommentary = playWelcomeCommentary;
  window.toggleLoop = toggleLoop;
  window.openOverlay = openOverlay;
  window.openPlayers = openPlayers;
  window.stopAllSystems = stopAllSystems;
  window.swapTeams = swapTeams;
  window.selectMatch = selectMatch;
  window.showTeamDetails = showTeamDetails;
  window.closeTeamModal = closeTeamModal;

  // initial team UI sync
  if (document.getElementById("teamAStatus")) {
    document.getElementById("teamAStatus").innerText = teamState.teamA;
    document.getElementById("teamBStatus").innerText = teamState.teamB;
  }
  updateLoopStatusUI();
</script>
