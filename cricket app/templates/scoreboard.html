<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Scorecard – Asia Pacific Champions Trophy 2026</title>
  <meta http-equiv="refresh" content="300" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow', sans-serif;
      padding: 32px 16px;
      position: relative;
      overflow-x: hidden;
      margin: 0;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      overflow: hidden;
      background: #0a1628;
    }

    .video-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.45;
      filter: brightness(0.7) saturate(1.2);
      transform: scale(1.02);
    }

    .video-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, rgba(8, 21, 36, 0.55) 0%, rgba(2, 10, 22, 0.75) 90%);
      backdrop-filter: blur(1.5px);
      z-index: 1;
    }

    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 900px;
      border-radius: 28px;
      overflow: hidden;
      background: rgba(10, 28, 40, 0.20);
      backdrop-filter: blur(10px) saturate(1.3);
      -webkit-backdrop-filter: blur(10px) saturate(1.3);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      border: 1px solid rgba(255, 255, 255, 0.04);
      margin: 0 auto;
    }

    /* ── HEADER (single team dynamic) ──────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 32px 14px;
      background: rgba(0, 20, 40, 0.10);
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(2px);
      flex-wrap: wrap;
      min-height: 80px;
    }

    .team-display {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 0 1 auto;
      min-width: 140px;
      transition: opacity 0.4s ease;
    }

    .team-display.hidden {
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      width: 0;
      overflow: hidden;
      margin: 0;
      padding: 0;
      flex: 0 0 0;
      gap: 0;
      min-width: 0;
    }

    .team-display .team-flag {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      padding: 2px;
      border: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }

    .team-display .team-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 1.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      white-space: nowrap;
    }

    .team-display .team-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #a0d8b0;
      background: rgba(0,0,0,0.2);
      padding: 2px 12px;
      border-radius: 20px;
      margin-left: 4px;
      white-space: nowrap;
    }

    .team-display .team-full {
      font-size: 13px;
      font-weight: 400;
      color: #8aacd0;
      letter-spacing: 0.3px;
      margin-top: -2px;
    }

    .team-display .team-info-group {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .match-info {
      text-align: center;
      flex: 1 1 auto;
      padding: 0 8px;
    }

    .match-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #ffd966;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      line-height: 1.2;
    }

    .match-sub {
      font-size: 14px;
      font-weight: 400;
      color: #a0d8b0;
      letter-spacing: 0.5px;
      margin-top: 2px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .slide-indicator-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.05);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── SLIDES WRAPPER ────────────────────────────────────── */
    .slides-wrapper {
      position: relative;
      width: 100%;
      min-height: 420px;
      overflow: hidden;
    }

    .slide {
      display: none;
      width: 100%;
      animation: fadeSlide 0.5s cubic-bezier(0.2, 0.9, 0.3, 1);
      padding: 0;
      margin: 0;
    }

    .slide.active {
      display: block;
    }

    @keyframes fadeSlide {
      0% { opacity: 0.2; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ── COLUMN LABELS ──────────────────────────────────────── */
    .col-labels {
      display: grid;
      padding: 12px 32px;
      background: rgba(0, 0, 0, 0.08);
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
      gap: 8px;
      backdrop-filter: blur(1px);
      width: 100%;
    }

    .col-labels span {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #a0d8b0;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .col-labels span:last-child,
    .col-labels span:nth-last-child(2) {
      text-align: right;
    }

    .labels-batting {
      grid-template-columns: 1.2fr 1.5fr 100px 100px;
    }

    .labels-bowling {
      grid-template-columns: 1.2fr 80px 80px 80px 80px 80px;
    }

    /* ── TABLE ──────────────────────────────────────────────── */
    .scorecard-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .scorecard-table tr { transition: background 0.2s; }

    .scorecard-table tr.even { background: rgba(255,255,255,0.02); }
    .scorecard-table tr.odd  { background: rgba(0,0,0,0.08); }

    .scorecard-table tr.batting {
      background: #e8c800 !important;
      background: linear-gradient(90deg, #f0d000 0%, #d4b800 100%) !important;
      border-left: 6px solid #ffdd44;
      box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.2);
    }
    .scorecard-table tr.batting:hover {
      background: #f5d800 !important;
    }

    .scorecard-table tr.not-out {
      background: rgba(30, 120, 30, 0.25);
      border-left: 6px solid rgba(76, 175, 80, 0.5);
    }
    .scorecard-table tr.not-out:hover {
      background: rgba(40, 140, 40, 0.30);
    }

    .scorecard-table tr.even:hover,
    .scorecard-table tr.odd:hover  { background: rgba(255,255,255,0.05); }

    .scorecard-table td {
      padding: 14px 32px;
      vertical-align: middle;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      word-break: break-word;
    }

    /* ── BATTING COLUMNS ────────────────────────────────────── */
    .col-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow: 0 1px 8px rgba(0,0,0,0.3);
    }

    .col-dismissal {
      font-size: 16px;
      color: #c8e0d0;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .dismissal-type { color: #b0d0b8; }
    .dismissal-catch { color: #c8dec0; }

    .col-runs {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      text-align: right;
      width: 100px;
      min-width: 100px;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.3);
      white-space: nowrap;
    }

    .col-balls {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #b0d0b8;
      text-align: right;
      width: 100px;
      min-width: 100px;
      white-space: nowrap;
    }

    .batting .col-name {
      color: #1a1a1a;
      text-shadow: 0 1px 4px rgba(255, 215, 0, 0.2);
    }
    .batting .col-runs {
      color: #1a1a1a;
      text-shadow: 0 1px 4px rgba(255, 215, 0, 0.2);
    }
    .batting .col-balls {
      color: #333333;
    }
    .batting .dismissal-type {
      color: #1a1a1a;
      font-weight: 700;
    }

    .not-out .col-balls { color: #90d090; }
    .not-out .dismissal-type {
      color: #8fcba0;
      font-weight: 700;
    }
    .not-out .col-runs {
      color: #8fcba0;
    }

    .yet-to-bat td {
      color: #6a8aaa;
      font-style: italic;
    }
    .yet-to-bat .col-name {
      color: #8aacd0;
      font-weight: 600;
      text-transform: uppercase;
      font-style: normal;
    }
    .yet-to-bat .col-dismissal {
      color: #5a7a9a;
      font-style: italic;
    }
    .yet-to-bat .col-runs,
    .yet-to-bat .col-balls {
      color: #4a6a8a;
    }

    /* ── BOWLING COLUMNS ────────────────────────────────────── */
    .col-bowler {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow: 0 1px 8px rgba(0,0,0,0.3);
    }

    .col-overs, .col-maidens, .col-bowling-runs, .col-wickets, .col-economy {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #b0d0b8;
      text-align: right;
      white-space: nowrap;
    }

    .col-wickets { color: #ffd966; font-weight: 700; }
    .col-economy { color: #7ecf96; }

    /* ── SLIDE INDICATORS ──────────────────────────────────── */
    .indicators {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 16px 0 12px;
      background: rgba(0, 0, 0, 0.05);
      border-top: 1px solid rgba(255, 255, 255, 0.02);
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      cursor: pointer;
      transition: all 0.3s;
      border: none;
      padding: 0;
    }

    .dot.active {
      background: #ffd966;
      box-shadow: 0 0 16px rgba(255, 215, 0, 0.4);
      transform: scale(1.2);
    }

    .dot:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* ── FOOTER ─────────────────────────────────────────────── */
    .footer {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      align-items: center;
      padding: 16px 32px;
      background: rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(2px);
      border-top: 1px solid rgba(255, 255, 255, 0.02);
      gap: 12px;
    }

    .footer-block {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .footer-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #a0d8b0;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .footer-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .footer-total {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 40px;
      font-weight: 900;
      color: #ffd966;
      letter-spacing: 1px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    /* ── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      .card { max-width: 100%; border-radius: 20px; }
      .header { padding: 14px 20px; gap: 8px; flex-wrap: wrap; min-height: 70px; }
      .team-display .team-flag { width: 36px; height: 36px; }
      .team-display .team-name { font-size: 20px; }
      .team-display .team-label { font-size: 10px; padding: 1px 10px; }
      .team-display .team-full { font-size: 11px; }
      .team-display { min-width: 100px; gap: 10px; }
      .match-title { font-size: 16px; }
      .match-sub { font-size: 12px; }
      .slide-indicator-label { font-size: 9px; padding: 2px 10px; }
      .col-labels { padding: 8px 16px; gap: 6px; }
      .labels-batting { grid-template-columns: 1fr 1.2fr 70px 70px; }
      .labels-bowling { grid-template-columns: 1.2fr 55px 55px 55px 55px 55px; }
      .col-labels span { font-size: 11px; }
      .scorecard-table td { padding: 10px 16px; }
      .col-name, .col-bowler { font-size: 16px; }
      .col-dismissal { font-size: 13px; }
      .col-runs { font-size: 22px; width: 70px; min-width: 70px; }
      .col-balls { font-size: 16px; width: 70px; min-width: 70px; }
      .col-overs, .col-maidens, .col-bowling-runs, .col-wickets, .col-economy { font-size: 16px; }
      .footer { padding: 12px 16px; gap: 6px; }
      .footer-label { font-size: 13px; }
      .footer-value { font-size: 16px; }
      .footer-total { font-size: 28px; }
    }

    @media (max-width: 480px) {
      .header { flex-direction: column; align-items: center; padding: 12px 16px; gap: 6px; min-height: 60px; }
      .team-display { width: 100%; justify-content: center; min-width: 0; }
      .team-display .team-name { font-size: 18px; }
      .team-display .team-flag { width: 32px; height: 32px; }
      .match-title { font-size: 14px; }
      .match-sub { font-size: 11px; }
      .slide-indicator-label { display: none; }
      .labels-batting { grid-template-columns: 1fr 1fr 55px 55px; }
      .labels-bowling { grid-template-columns: 1fr 40px 40px 40px 40px 40px; }
      .col-labels span { font-size: 9px; letter-spacing: 0.5px; }
      .scorecard-table td { padding: 8px 12px; }
      .col-name, .col-bowler { font-size: 13px; }
      .col-dismissal { font-size: 11px; }
      .col-runs { font-size: 18px; width: 55px; min-width: 55px; }
      .col-balls { font-size: 13px; width: 55px; min-width: 55px; }
      .col-overs, .col-maidens, .col-bowling-runs, .col-wickets, .col-economy { font-size: 13px; }
      .footer { padding: 10px 12px; gap: 4px; }
      .footer-label { font-size: 11px; }
      .footer-value { font-size: 13px; }
      .footer-total { font-size: 22px; }
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 6px; }
  </style>
</head>
<body>

  <div class="video-bg">
    <video autoplay muted loop playsinline>
      <source src="/static/stadium.mp4" type="video/mp4">
    </video>
  </div>

  <div class="card">

    <!-- HEADER (single team dynamic) -->
    <div class="header" id="header">
      <!-- Team display: only one shown at a time -->
      <div class="team-display" id="teamDisplay">
        <img src="" alt="flag" class="team-flag" id="teamFlag" />
        <div class="team-info-group">
          <div style="display:flex; align-items:center; gap:6px;">
            <span class="team-name" id="teamName">—</span>
            <span class="team-label" id="teamLabel">BATTING</span>
          </div>
          <span class="team-full" id="teamFull">—</span>
        </div>
      </div>

      <div class="match-info">
        <div class="match-title" id="matchTitle">Loading match...</div>
        <div class="match-sub" id="matchSub">—</div>
      </div>

      <div class="slide-indicator-label" id="slideLabel">🏏 BATTING</div>
    </div>

    <!-- SLIDES WRAPPER -->
    <div class="slides-wrapper">

      <!-- SLIDE 1: BATTING -->
      <div class="slide active" data-slide="0">
        <div class="col-labels labels-batting">
          <span>Batter</span>
          <span>Dismissal</span>
          <span>R</span>
          <span>B</span>
        </div>
        <table class="scorecard-table">
          <tbody id="battingBody"></tbody>
        </table>
      </div>

      <!-- SLIDE 2: BOWLING -->
      <div class="slide" data-slide="1">
        <div class="col-labels labels-bowling">
          <span>Bowler</span>
          <span>O</span>
          <span>M</span>
          <span>R</span>
          <span>W</span>
          <span>ECO</span>
        </div>
        <table class="scorecard-table">
          <tbody id="bowlingBody"></tbody>
        </table>
      </div>

    </div>

    <!-- INDICATORS -->
    <div class="indicators">
      <button class="dot active" data-slide="0" aria-label="Batting"></button>
      <button class="dot" data-slide="1" aria-label="Bowling"></button>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <div class="footer-block">
        <span class="footer-label">Extras</span>
        <span class="footer-value" id="extrasValue">0</span>
      </div>
      <div class="footer-block">
        <span class="footer-label">Overs</span>
        <span class="footer-value" id="oversValue">0.0</span>
      </div>
      <div class="footer-block">
        <span class="footer-label">Total</span>
      </div>
      <div class="footer-total" id="totalValue">0‑0</div>
    </div>

  </div>

  <script>
    (function() {
      "use strict";

      // DOM refs
      const battingBody = document.getElementById('battingBody');
      const bowlingBody = document.getElementById('bowlingBody');
      const extrasEl = document.getElementById('extrasValue');
      const oversEl = document.getElementById('oversValue');
      const totalEl = document.getElementById('totalValue');

      const teamFlag = document.getElementById('teamFlag');
      const teamName = document.getElementById('teamName');
      const teamFull = document.getElementById('teamFull');
      const teamLabel = document.getElementById('teamLabel');
      const slideLabel = document.getElementById('slideLabel');
      const matchTitle = document.getElementById('matchTitle');
      const matchSub = document.getElementById('matchSub');

      const slides = document.querySelectorAll('.slide');
      const dots = document.querySelectorAll('.dot');
      let currentSlide = 0;
      let slideInterval;

      // Store team data
      let teamsData = {};

      // ── SLIDE NAVIGATION ──────────────────────────────────
      function goToSlide(index) {
        if (index === currentSlide) return;
        slides[currentSlide].classList.remove('active');
        dots[currentSlide].classList.remove('active');
        currentSlide = index;
        slides[currentSlide].classList.add('active');
        dots[currentSlide].classList.add('active');

        // Update header based on active slide
        updateHeaderForSlide(index);
      }

      function updateHeaderForSlide(index) {
        const isBatting = index === 0;
        const label = isBatting ? '🏏 BATTING' : '🎯 BOWLING';
        slideLabel.textContent = label;

        if (!teamsData || !teamsData.team_a_name) {
          teamName.textContent = isBatting ? (teamsData.team_a_name || '—') : (teamsData.team_b_name || '—');
          teamLabel.textContent = isBatting ? 'BATTING' : 'BOWLING';
          return;
        }

        if (isBatting) {
          teamName.textContent = teamsData.team_a_name || '—';
          teamFull.textContent = teamsData.team_a_full_name || '';
          teamLabel.textContent = 'BATTING';
          if (teamsData.team_a_flag) {
            teamFlag.src = teamsData.team_a_flag;
          }
        } else {
          teamName.textContent = teamsData.team_b_name || '—';
          teamFull.textContent = teamsData.team_b_full_name || '';
          teamLabel.textContent = 'BOWLING';
          if (teamsData.team_b_flag) {
            teamFlag.src = teamsData.team_b_flag;
          }
        }
      }

      dots.forEach((dot, idx) => {
        dot.addEventListener('click', function() {
          goToSlide(idx);
          resetSlideTimer();
        });
      });

      function startSlideTimer() {
        slideInterval = setInterval(() => {
          const next = (currentSlide + 1) % slides.length;
          goToSlide(next);
        }, 8000);
      }

      function resetSlideTimer() {
        clearInterval(slideInterval);
        startSlideTimer();
      }

      // ── HELPERS ───────────────────────────────────────────
      function escapeHtml(text) {
        if (!text) return '—';
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return String(text).replace(/[&<>"']/g, function(m) { return map[m]; });
      }

      // ── RENDER DISMISSAL ──────────────────────────────────
      function renderDismissal(dismissal) {
        if (!dismissal || dismissal === "") return "";
        const d = dismissal.toLowerCase().trim();
        if (d === "batting") return `<span class="dismissal-type">Batting</span>`;
        if (d === "not out") return `<span class="dismissal-type">Not Out</span>`;
        if (d.includes("run out")) return `<span class="dismissal-type">Run Out</span>`;
        if (d.startsWith("b ")) return `<span class="dismissal-type">Bowled ${d.substring(2)}</span>`;
        if (d.startsWith("c ")) {
          const match = dismissal.match(/^(c\s.+?)\s+b\s+(.+)$/);
          if (match) {
            return `<span class="dismissal-type">Caught ${match[1].replace('c ', '').trim()} Bowled ${match[2].trim()}</span>`;
          }
          return `<span class="dismissal-type">Caught ${d.substring(2)}</span>`;
        }
        if (d.includes("lbw")) return `<span class="dismissal-type">LBW</span>`;
        if (d.includes("stumped")) return `<span class="dismissal-type">Stumped</span>`;
        if (d.includes("hit wicket")) return `<span class="dismissal-type">Hit Wicket</span>`;
        if (d.includes("retired")) return `<span class="dismissal-type">Retired</span>`;
        if (d.includes("obstructing")) return `<span class="dismissal-type">Obstructing</span>`;
        return `<span class="dismissal-type">${escapeHtml(dismissal)}</span>`;
      }

      // ── RENDER BATTING ────────────────────────────────────
      function renderBatting(batters, yetToBat) {
        let html = '';
        if (batters.length === 0 && yetToBat.length === 0) {
          html = `<tr><td colspan="4" style="text-align:center; color:#a0d8b0; padding:24px; font-size:20px;">No batting data</td></tr>`;
        } else {
          batters.forEach((b, idx) => {
            const isBatting = (b.status && b.status.toLowerCase() === 'batting') ||
                              (b.dismissal && b.dismissal.toLowerCase() === 'batting') ||
                              b.batting === true;
            const isNotOut = !isBatting && (
              (b.status && b.status.toLowerCase() === 'not out') ||
              (b.dismissal && b.dismissal.toLowerCase() === 'not out') ||
              b.notOut === true
            );
            let rowClass = '';
            if (isBatting) rowClass = 'batting';
            else if (isNotOut) rowClass = 'not-out';
            else rowClass = idx % 2 === 0 ? 'even' : 'odd';

            const name = escapeHtml(b.name || '—');
            let dismissalText = b.dismissal || b.status || '';
            if (isBatting) dismissalText = 'Not Out';
            const dismissalHtml = renderDismissal(dismissalText);
            const runs = (b.runs !== undefined && b.runs !== '') ? b.runs : '';
            const balls = (b.balls !== undefined && b.balls !== '') ? b.balls : '';

            html += `
              <tr class="${rowClass}">
                <td class="col-name">${name}</td>
                <td class="col-dismissal">${dismissalHtml}</td>
                <td class="col-runs">${runs}</td>
                <td class="col-balls">${balls}</td>
              </tr>
            `;
          });

          if (yetToBat.length > 0) {
            yetToBat.forEach((player) => {
              const name = escapeHtml(player);
              html += `
                <tr class="yet-to-bat">
                  <td class="col-name">${name}</td>
                  <td class="col-dismissal"></td>
                  <td class="col-runs"></td>
                  <td class="col-balls"></td>
                </tr>
              `;
            });
          }
        }
        battingBody.innerHTML = html;
      }

      // ── RENDER BOWLING ────────────────────────────────────
      function renderBowling(bowlers) {
        let html = '';
        if (!bowlers || bowlers.length === 0) {
          html = `<tr><td colspan="6" style="text-align:center; color:#a0d8b0; padding:24px; font-size:20px;">No bowling data</td></tr>`;
        } else {
          bowlers.forEach((b, idx) => {
            const name = escapeHtml(b.name || '—');
            const overs = b.overs !== undefined ? b.overs : '';
            const maidens = b.maidens !== undefined ? b.maidens : '';
            const runs = b.runs !== undefined ? b.runs : '';
            const wickets = b.wickets !== undefined ? b.wickets : '';
            const economy = b.economy !== undefined ? b.economy : '';
            const rowClass = idx % 2 === 0 ? 'even' : 'odd';

            html += `
              <tr class="${rowClass}">
                <td class="col-bowler">${name}</td>
                <td class="col-overs">${overs}</td>
                <td class="col-maidens">${maidens}</td>
                <td class="col-bowling-runs">${runs}</td>
                <td class="col-wickets">${wickets}</td>
                <td class="col-economy">${economy}</td>
              </tr>
            `;
          });
        }
        bowlingBody.innerHTML = html;
      }

      // ── UPDATE HEADER WITH TEAM DATA ─────────────────────
      function updateHeader(teams) {
        if (!teams) return;
        teamsData = teams;

        const aName = teams.team_a_name || '—';
        const bName = teams.team_b_name || '—';
        const aFull = teams.team_a_full_name || '';
        const bFull = teams.team_b_full_name || '';
        const aFlag = teams.team_a_flag || '';
        const bFlag = teams.team_b_flag || '';
        const match = teams.match_info || 'Match';

        matchTitle.textContent = match;
        matchSub.textContent = `${aFull} vs ${bFull}`;

        // Update current slide's team display
        updateHeaderForSlide(currentSlide);
      }

      // ── RENDER SCORECARD ──────────────────────────────────
      function renderScorecard(data) {
        const batters = data.batters || [];
        const yetToBat = data.yet_to_bat || [];
        const bowlers = data.bowlers || [];
        const score = data.score || {};
        const extras = data.extras || {};
        const teams = data.teams || {};

        // Update header
        updateHeader(teams);

        renderBatting(batters, yetToBat);
        renderBowling(bowlers);

        extrasEl.textContent = extras.total ?? 0;
        oversEl.textContent = score.overs ?? '0.0';
        totalEl.textContent = `${score.runs ?? 0}‑${score.wickets ?? 0}`;
      }

      // ── FETCH DATA ─────────────────────────────────────────
      async function loadScoreboard() {
        try {
          const resp = await fetch('/api/scoreboard');
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();
          renderScorecard(data);
        } catch (err) {
          console.warn('Fetch error:', err.message);
          battingBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#ff6b6b; padding:24px; font-size:20px;">⚠️ Unable to load data</td></tr>`;
          bowlingBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#ff6b6b; padding:24px; font-size:20px;">⚠️ Unable to load data</td></tr>`;
        }
      }

      // ── INIT ───────────────────────────────────────────────
      loadScoreboard();
      setInterval(loadScoreboard, 4000);
      startSlideTimer();

    })();
  </script>

</body>
</html>
