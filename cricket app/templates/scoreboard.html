<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Scorecard – ICC Champions Trophy 2025</title>
  <meta http-equiv="refresh" content="300" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow', sans-serif;
      padding: 32px 16px;
      position: relative;
      overflow-x: hidden;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
      background: #0a1628;
    }

    .video-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.45;
      filter: brightness(0.7) saturate(1.2);
      transform: scale(1.02);
    }

    .video-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, rgba(8, 21, 36, 0.55) 0%, rgba(2, 10, 22, 0.75) 90%);
      backdrop-filter: blur(1.5px);
      z-index: 1;
    }

    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 900px;
      border-radius: 28px;
      overflow: hidden;
      background: rgba(10, 28, 40, 0.20);
      backdrop-filter: blur(10px) saturate(1.3);
      -webkit-backdrop-filter: blur(10px) saturate(1.3);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 24px 32px 20px;
      background: rgba(0, 20, 40, 0.10);
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(2px);
    }

    .badge-ring {
      flex-shrink: 0;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: 3px solid rgba(255, 215, 0, 0.3);
      box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.08), 0 4px 16px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .badge-ring svg { width: 70px; height: 70px; }

    .header-title h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 48px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 4px;
      text-transform: uppercase;
      line-height: 1;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .header-title p {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #a0d8b0;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-top: 4px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.2);
    }

    .col-labels {
      display: grid;
      grid-template-columns: 1.2fr 1.5fr 80px 80px;
      padding: 12px 32px;
      background: rgba(0, 0, 0, 0.08);
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
      gap: 8px;
      backdrop-filter: blur(1px);
    }

    .col-labels span {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #a0d8b0;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .col-labels span:nth-child(3),
    .col-labels span:nth-child(4) {
      text-align: right;
    }

    .scorecard-table {
      width: 100%;
      border-collapse: collapse;
    }

    .scorecard-table tr { transition: background 0.2s; }

    .scorecard-table tr.even { background: rgba(255,255,255,0.02); }
    .scorecard-table tr.odd  { background: rgba(0,0,0,0.08); }

    /* ── BATTING HIGHLIGHT ────────────────────────────────── */
    .scorecard-table tr.batting {
      background: #e8c800 !important;
      background: linear-gradient(90deg, #f0d000 0%, #d4b800 100%) !important;
      border-left: 6px solid #ffdd44;
      box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.2);
    }

    .scorecard-table tr.batting:hover {
      background: #f5d800 !important;
    }

    .scorecard-table tr.not-out {
      background: rgba(30, 120, 30, 0.25);
      border-left: 6px solid rgba(76, 175, 80, 0.5);
    }

    .scorecard-table tr.not-out:hover {
      background: rgba(40, 140, 40, 0.30);
    }

    .scorecard-table tr.even:hover,
    .scorecard-table tr.odd:hover  { background: rgba(255,255,255,0.05); }

    .scorecard-table td {
      padding: 14px 32px;
      vertical-align: middle;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .col-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow: 0 1px 8px rgba(0,0,0,0.3);
    }

    .col-dismissal {
      font-size: 16px;
      color: #c8e0d0;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .dismissal-type { color: #b0d0b8; }
    .dismissal-catch { color: #c8dec0; }

    .col-runs {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      text-align: right;
      width: 80px;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.3);
    }

    .col-balls {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #b0d0b8;
      text-align: right;
      width: 80px;
    }

    /* ── batting row text colors ──────────────────────────── */
    .batting .col-name {
      color: #1a1a1a;
      text-shadow: 0 1px 4px rgba(255, 215, 0, 0.2);
    }
    .batting .col-runs {
      color: #1a1a1a;
      text-shadow: 0 1px 4px rgba(255, 215, 0, 0.2);
    }
    .batting .col-balls {
      color: #333333;
    }
    .batting .dismissal-type {
      color: #1a1a1a;
      font-weight: 700;
    }

    .not-out .col-balls { color: #90d090; }
    .not-out .dismissal-type {
      color: #8fcba0;
      font-weight: 700;
    }
    .not-out .col-runs {
      color: #8fcba0;
    }

    .footer {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      align-items: center;
      padding: 16px 32px;
      background: rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(2px);
      border-top: 1px solid rgba(255, 255, 255, 0.02);
      gap: 12px;
    }

    .footer-block {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .footer-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #a0d8b0;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .footer-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .footer-total {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 40px;
      font-weight: 900;
      color: #ffd966;
      letter-spacing: 1px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    @media (max-width: 768px) {
      .card { max-width: 100%; border-radius: 20px; }
      .header { padding: 18px 20px; gap: 16px; }
      .badge-ring { width: 60px; height: 60px; }
      .badge-ring svg { width: 50px; height: 50px; }
      .header-title h1 { font-size: 32px; letter-spacing: 2px; }
      .header-title p { font-size: 13px; }
      .col-labels {
        grid-template-columns: 1fr 1.2fr 60px 60px;
        padding: 8px 16px;
        gap: 6px;
      }
      .col-labels span { font-size: 11px; }
      .scorecard-table td { padding: 10px 16px; }
      .col-name { font-size: 16px; }
      .col-dismissal { font-size: 13px; }
      .col-runs { font-size: 22px; width: 60px; }
      .col-balls { font-size: 16px; width: 60px; }
      .footer { padding: 12px 16px; gap: 6px; }
      .footer-label { font-size: 13px; }
      .footer-value { font-size: 16px; }
      .footer-total { font-size: 28px; }
    }

    @media (max-width: 480px) {
      .header { flex-wrap: wrap; gap: 10px; padding: 14px 16px; }
      .header-title h1 { font-size: 24px; }
      .badge-ring { width: 48px; height: 48px; }
      .badge-ring svg { width: 38px; height: 38px; }
      .col-labels {
        grid-template-columns: 1fr 1fr 45px 45px;
        padding: 6px 12px;
        gap: 4px;
      }
      .col-labels span { font-size: 9px; letter-spacing: 0.5px; }
      .scorecard-table td { padding: 8px 12px; }
      .col-name { font-size: 13px; }
      .col-dismissal { font-size: 11px; }
      .col-runs { font-size: 18px; width: 45px; }
      .col-balls { font-size: 13px; width: 45px; }
      .footer { padding: 10px 12px; gap: 4px; }
      .footer-label { font-size: 11px; }
      .footer-value { font-size: 13px; }
      .footer-total { font-size: 22px; }
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 6px; }
  </style>
</head>
<body>

  <div class="video-bg">
    <video autoplay muted loop playsinline>
      <source src="/static/stadium.mp4" type="video/mp4">
    </video>
  </div>

  <div class="card">

    <div class="header">
      <div class="badge-ring">
        <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
          <circle cx="30" cy="30" r="30" fill="#007A4D"/>
          <polygon points="0,15 60,15 60,0 0,0" fill="#DE3831"/>
          <polygon points="0,45 60,45 60,60 0,60" fill="#002395"/>
          <polygon points="0,0 0,60 20,30" fill="#FFB612"/>
          <polygon points="0,0 0,60 22,30" fill="#000" opacity="0.18"/>
          <ellipse cx="30" cy="30" r="10" fill="#007A4D" opacity="0.6"/>
          <rect x="28" y="20" width="4" height="14" rx="2" fill="#FFB612"/>
          <ellipse cx="30" cy="35" rx="5" ry="4" fill="#FFB612"/>
          <circle cx="30" cy="30" r="28" fill="none" stroke="#FFB612" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="header-title">
        <h1>South Africa</h1>
        <p>ICC Champions Trophy 2025</p>
      </div>
    </div>

    <div class="col-labels">
      <span>Batter</span>
      <span>Dismissal</span>
      <span>R</span>
      <span>B</span>
    </div>

    <table class="scorecard-table">
      <tbody id="scorecardBody">
      </tbody>
    </table>

    <div class="footer">
      <div class="footer-block">
        <span class="footer-label">Extras</span>
        <span class="footer-value" id="extrasValue">0</span>
      </div>
      <div class="footer-block">
        <span class="footer-label">Overs</span>
        <span class="footer-value" id="oversValue">0.0</span>
      </div>
      <div class="footer-block">
        <span class="footer-label">Total</span>
      </div>
      <div class="footer-total" id="totalValue">0‑0</div>
    </div>

  </div>

  <script>
    (function() {
      "use strict";

      const tbody = document.getElementById('scorecardBody');
      const extrasEl = document.getElementById('extrasValue');
      const oversEl = document.getElementById('oversValue');
      const totalEl = document.getElementById('totalValue');

      function escapeHtml(text) {
        if (!text) return '—';
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return String(text).replace(/[&<>"']/g, function(m) { return map[m]; });
      }

      function renderDismissal(dismissal) {
        if (!dismissal || dismissal === "") return "";
        const d = dismissal.toLowerCase().trim();

        if (d === "batting") {
          return `<span class="dismissal-type">Batting</span>`;
        }
        if (d === "not out") {
          return `<span class="dismissal-type">Not Out</span>`;
        }
        if (d.includes("run out")) {
          return `<span class="dismissal-type">Run Out</span>`;
        }
        if (d.startsWith("b ")) {
          return `<span class="dismissal-type">Bowled ${d.substring(2)}</span>`;
        }
        if (d.startsWith("c ")) {
          const match = dismissal.match(/^(c\s.+?)\s+b\s+(.+)$/);
          if (match) {
            return `<span class="dismissal-type">Caught ${match[1].replace('c ', '').trim()} Bowled ${match[2].trim()}</span>`;
          }
          return `<span class="dismissal-type">Caught ${d.substring(2)}</span>`;
        }
        if (d.includes("lbw")) {
          return `<span class="dismissal-type">LBW</span>`;
        }
        if (d.includes("stumped")) {
          return `<span class="dismissal-type">Stumped</span>`;
        }
        if (d.includes("hit wicket")) {
          return `<span class="dismissal-type">Hit Wicket</span>`;
        }
        if (d.includes("retired")) {
          return `<span class="dismissal-type">Retired</span>`;
        }
        if (d.includes("obstructing")) {
          return `<span class="dismissal-type">Obstructing</span>`;
        }
        return `<span class="dismissal-type">${escapeHtml(dismissal)}</span>`;
      }

      function getRowClass(index, isBatting, isNotOut) {
        if (isBatting) return 'batting';
        if (isNotOut) return 'not-out';
        return index % 2 === 0 ? 'even' : 'odd';
      }

      function renderScorecard(data) {
        const batters = data.batters || [];
        const score = data.score || {};
        const extras = data.extras || {};

        let html = '';
        if (batters.length === 0) {
          html = `<tr><td colspan="4" style="text-align:center; color:#a0d8b0; padding:24px; font-family:'Barlow Condensed',sans-serif; font-size:20px;">No batting data</td></tr>`;
        } else {
          batters.forEach((b, idx) => {
            const isBatting = (b.status && b.status.toLowerCase() === 'batting') ||
                              (b.dismissal && b.dismissal.toLowerCase() === 'batting') ||
                              b.batting === true;
            const isNotOut = !isBatting && (
              (b.status && b.status.toLowerCase() === 'not out') ||
              (b.dismissal && b.dismissal.toLowerCase() === 'not out') ||
              b.notOut === true
            );
            const rowClass = getRowClass(idx, isBatting, isNotOut);
            const name = escapeHtml(b.name || '—');
            let dismissalText = b.dismissal || b.status || '';
            if (isBatting) dismissalText = 'Not Out';
            const dismissalHtml = renderDismissal(dismissalText);
            const runs = b.runs !== undefined && b.runs !== '' ? b.runs : '';
            const balls = b.balls !== undefined && b.balls !== '' ? b.balls : '';

            html += `
              <tr class="${rowClass}">
                <td class="col-name">${name}</td>
                <td class="col-dismissal">${dismissalHtml}</td>
                <td class="col-runs">${runs}</td>
                <td class="col-balls">${balls}</td>
              </tr>
            `;
          });
        }

        tbody.innerHTML = html;

        extrasEl.textContent = extras.total ?? 0;
        oversEl.textContent = score.overs ?? '0.0';
        totalEl.textContent = `${score.runs ?? 0}‑${score.wickets ?? 0}`;
      }

      async function loadScoreboard() {
        try {
          const resp = await fetch('/api/scoreboard');
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();
          renderScorecard(data);
        } catch (err) {
          console.warn('Fetch error:', err.message);
          tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#ff6b6b; padding:24px; font-family:'Barlow Condensed',sans-serif; font-size:20px;">⚠️ Unable to load scoreboard data</td></tr>`;
        }
      }

      loadScoreboard();
      setInterval(loadScoreboard, 4000);

    })();
  </script>

</body>
</html>
