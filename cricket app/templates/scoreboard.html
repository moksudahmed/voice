<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Cricket Scoreboard | Pro</title>
    <!-- Meta refresh for full page reload every 5 minutes (optional) -->
    <meta http-equiv="refresh" content="300">
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0b1a2b;
            color: #f0f4fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
        }

        /* ----- BACKGROUND VIDEO (professional overlay) ----- */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: #0b1a2b; /* fallback */
        }

        .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.30;          /* subtle, professional transparency */
            filter: brightness(0.6) saturate(1.2);
            transform: scale(1.02); /* smooth edge coverage */
        }

        /* dark overlay to enhance readability */
        .video-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(8, 21, 36, 0.7) 0%, rgba(2, 10, 22, 0.85) 90%);
            backdrop-filter: blur(1px);
            z-index: 1;
        }

        /* ----- MAIN CARD (glassmorphism) ----- */
        .scoreboard-card {
            position: relative;
            z-index: 10;
            max-width: 1300px;
            width: 100%;
            background: rgba(12, 27, 46, 0.70);
            backdrop-filter: blur(12px) saturate(1.2);
            -webkit-backdrop-filter: blur(12px) saturate(1.2);
            border-radius: 40px;
            padding: 32px 34px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.2s;
        }

        /* ----- TYPOGRAPHY & SPACING ----- */
        .score-header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .score-main {
            display: flex;
            align-items: baseline;
            gap: 16px;
            flex-wrap: wrap;
        }

        .score-number {
            font-size: 4.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 0%, #b8d0e6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
            text-shadow: 0 0 30px rgba(30, 144, 255, 0.2);
        }

        .overs-badge {
            font-size: 1.4rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.06);
            padding: 6px 18px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #b4ccf0;
            letter-spacing: 0.3px;
        }

        .status-message {
            font-size: 1rem;
            color: #f8b4b4;
            background: rgba(255, 70, 70, 0.08);
            padding: 6px 16px;
            border-radius: 40px;
            border-left: 3px solid #ff7a7a;
        }

        /* ----- GRID LAYOUT (professional) ----- */
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 12px;
        }

        @media (max-width: 820px) {
            .grid-2col {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .score-number {
                font-size: 3.2rem;
            }
            .scoreboard-card {
                padding: 24px 18px;
            }
        }

        /* ----- MODULE CARDS (elevated) ----- */
        .module {
            background: rgba(8, 24, 44, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 20px 20px 18px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.15s;
        }

        .module:hover {
            border-color: rgba(70, 150, 255, 0.15);
            box-shadow: 0 12px 30px rgba(0, 20, 50, 0.5);
        }

        .module h2 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            color: #aac3e6;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .module h2 i {
            font-style: normal;
            font-size: 1.1rem;
            opacity: 0.5;
        }

        /* ----- TABLES (clean & readable) ----- */
        .table-wrap {
            overflow-x: auto;
            border-radius: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            min-width: 300px;
        }

        th {
            text-align: left;
            padding: 12px 8px 8px 8px;
            font-weight: 500;
            color: #9bb6da;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.8rem;
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }

        td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: #e7effa;
            font-weight: 400;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .highlight-name {
            font-weight: 500;
            color: #d6e6ff;
        }

        /* ----- BADGE (wickets, players) ----- */
        .badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 12px;
            margin-top: 6px;
        }

        .badge {
            background: rgba(30, 80, 140, 0.35);
            backdrop-filter: blur(4px);
            padding: 6px 18px 6px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 450;
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #d0e2ff;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.2px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .badge .sep {
            opacity: 0.3;
            margin: 0 2px;
        }

        .badge strong {
            font-weight: 600;
            color: white;
        }

        .extras-line {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 22px;
            background: rgba(0, 20, 40, 0.2);
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            font-size: 0.95rem;
        }

        .extras-line span {
            color: #bdd2f0;
        }

        .extras-line .num {
            color: white;
            font-weight: 500;
            margin-left: 4px;
        }

        /* ----- RESPONSIVE fine-tune ----- */
        @media (max-width: 600px) {
            .score-header {
                flex-direction: column;
                gap: 12px;
            }
            .score-number {
                font-size: 2.8rem;
            }
            .overs-badge {
                font-size: 1.1rem;
            }
            .module {
                padding: 16px 14px;
            }
        }

        /* scroll styling */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(100, 180, 255, 0.3);
            border-radius: 8px;
        }
        .table-wrap::-webkit-scrollbar {
            height: 4px;
        }
    </style>
</head>
<body>

    <!-- Background Video (professional, subtle) -->
    <div class="video-bg">
        <video autoplay muted loop playsinline>
            <source src="/static/stadium.mp4" type="video/mp4">
            <!-- fallback: if video missing, solid dark bg -->
        </video>
    </div>

    <!-- MAIN SCOREBOARD CARD -->
    <div class="scoreboard-card">

        <!-- HEADER: score + overs + status -->
        <div class="score-header">
            <div class="score-main">
                <span class="score-number" id="score">0/0</span>
                <span class="overs-badge" id="overs">Overs: 0.0</span>
            </div>
            <div id="status" class="status-message" style="opacity:0.8;">● live</div>
        </div>

        <!-- 2-COLUMN GRID: Batters + Bowlers -->
        <div class="grid-2col">
            <!-- BATTERS -->
            <div class="module">
                <h2>🏏 Batters</h2>
                <div class="table-wrap">
                    <table id="batters">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>R</th>
                                <th>B</th>
                                <th>4s</th>
                                <th>6s</th>
                                <th>SR</th>
                            </tr>
                        </thead>
                        <tbody id="batters-body">
                            <!-- dynamic -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- BOWLERS -->
            <div class="module">
                <h2>🎯 Bowlers</h2>
                <div class="table-wrap">
                    <table id="bowlers">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>O</th>
                                <th>M</th>
                                <th>R</th>
                                <th>W</th>
                                <th>ECO</th>
                            </tr>
                        </thead>
                        <tbody id="bowlers-body">
                            <!-- dynamic -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 3 REMAINING MODULES in a row (responsive) -->
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 24px;">
            <!-- FALL OF WICKETS -->
            <div class="module">
                <h2>⚡ Fall of wkts</h2>
                <div id="fow" class="badge-container"></div>
            </div>

            <!-- EXTRAS -->
            <div class="module">
                <h2>📊 Extras</h2>
                <div id="extras" class="extras-line"></div>
            </div>

            <!-- YET TO BAT -->
            <div class="module">
                <h2>⏳ Yet to bat</h2>
                <div id="ytb" class="badge-container"></div>
            </div>
        </div>

        <!-- small footer note (optional) -->
        <div style="margin-top: 28px; text-align: right; opacity: 0.2; font-size: 0.7rem; letter-spacing: 1px; border-top: 1px solid rgba(255,255,255,0.02); padding-top: 12px;">
            PRO SCORE • LIVE
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // DOM refs
            const scoreEl = document.getElementById('score');
            const oversEl = document.getElementById('overs');
            const statusEl = document.getElementById('status');

            const battersBody = document.getElementById('batters-body');
            const bowlersBody = document.getElementById('bowlers-body');
            const fowContainer = document.getElementById('fow');
            const extrasContainer = document.getElementById('extras');
            const ytbContainer = document.getElementById('ytb');

            // ----- helper to build table rows safely -----
            function buildBatterRows(batters) {
                if (!batters || batters.length === 0) {
                    return `<tr><td colspan="6" style="text-align:center; color:#6f8db0; padding:18px;">No batters data</td></tr>`;
                }
                return batters.map(b => `
                    <tr>
                        <td class="highlight-name">${escapeHtml(b.name || '—')}</td>
                        <td>${b.runs ?? 0}</td>
                        <td>${b.balls ?? 0}</td>
                        <td>${b.fours ?? 0}</td>
                        <td>${b.sixes ?? 0}</td>
                        <td>${b.strike_rate ?? 0}</td>
                    </tr>
                `).join('');
            }

            function buildBowlerRows(bowlers) {
                if (!bowlers || bowlers.length === 0) {
                    return `<tr><td colspan="6" style="text-align:center; color:#6f8db0; padding:18px;">No bowlers data</td></tr>`;
                }
                return bowlers.map(b => `
                    <tr>
                        <td class="highlight-name">${escapeHtml(b.name || '—')}</td>
                        <td>${b.overs ?? 0}</td>
                        <td>${b.maidens ?? 0}</td>
                        <td>${b.runs ?? 0}</td>
                        <td>${b.wickets ?? 0}</td>
                        <td>${b.economy ?? 0}</td>
                    </tr>
                `).join('');
            }

            // simple escape (prevent XSS)
            function escapeHtml(text) {
                if (!text) return '—';
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return String(text).replace(/[&<>"']/g, function(m) { return map[m]; });
            }

            // ----- render FOW as badges -----
            function renderFow(fallOfWickets) {
                if (!fallOfWickets || fallOfWickets.length === 0) {
                    return `<div class="badge" style="background:rgba(255,255,255,0.02); color:#6f8db0;">— no wickets yet</div>`;
                }
                return fallOfWickets.map(w => {
                    const player = escapeHtml(w.player || '');
                    const score = w.score ?? '';
                    const over = w.over ?? '';
                    return `<div class="badge"><strong>${score}</strong> <span class="sep">•</span> ${player} <span class="sep">•</span> ${over} ov</div>`;
                }).join('');
            }

            // ----- render extras -----
            function renderExtras(extras) {
                if (!extras) extras = {};
                const total = extras.total ?? 0;
                const byes = extras.byes ?? 0;
                const legByes = extras.leg_byes ?? 0;
                const wides = extras.wides ?? 0;
                const noBalls = extras.no_balls ?? 0;
                return `
                    <span>Total <span class="num">${total}</span></span>
                    <span>B <span class="num">${byes}</span></span>
                    <span>LB <span class="num">${legByes}</span></span>
                    <span>W <span class="num">${wides}</span></span>
                    <span>NB <span class="num">${noBalls}</span></span>
                `;
            }

            // ----- render yet to bat -----
            function renderYtb(players) {
                if (!players || players.length === 0) {
                    return `<div class="badge" style="background:rgba(255,255,255,0.02); color:#6f8db0;">— all out / no data</div>`;
                }
                return players.map(p => `<div class="badge">${escapeHtml(p)}</div>`).join('');
            }

            // ----- MAIN FETCH & UPDATE -----
            async function loadScoreboard() {
                try {
                    const response = await fetch('/api/scoreboard');
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    const data = await response.json();

                    // score & overs
                    const score = data.score || {};
                    const runs = score.runs ?? 0;
                    const wickets = score.wickets ?? 0;
                    scoreEl.innerText = `${runs}/${wickets}`;
                    oversEl.innerText = `Overs: ${score.overs ?? '0.0'}`;
                    statusEl.innerText = '● live';
                    statusEl.style.color = '#a0e0a0';
                    statusEl.style.borderLeftColor = '#5fc75f';

                    // batters
                    battersBody.innerHTML = buildBatterRows(data.batters);

                    // bowlers
                    bowlersBody.innerHTML = buildBowlerRows(data.bowlers);

                    // FOW
                    fowContainer.innerHTML = renderFow(data.fall_of_wickets);

                    // extras
                    extrasContainer.innerHTML = renderExtras(data.extras);

                    // yet to bat
                    ytbContainer.innerHTML = renderYtb(data.yet_to_bat);

                } catch (error) {
                    // graceful error display
                    statusEl.innerText = '⚠️ connection error';
                    statusEl.style.color = '#f8b4b4';
                    statusEl.style.borderLeftColor = '#ff7a7a';
                    // keep last data, but we can show fallback
                    console.warn('Scoreboard fetch error:', error.message);
                }
            }

            // initial load
            loadScoreboard();

            // auto refresh every 3 seconds
            const interval = setInterval(loadScoreboard, 3000);

            // clean interval on page hide (optional)
            window.addEventListener('beforeunload', function() {
                clearInterval(interval);
            });

        })();
    </script>

</body>
</html>
